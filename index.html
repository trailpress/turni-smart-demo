    try {
      var blob = new Blob([swCode], {type:'application/javascript'});
      var url = URL.createObjectURL(blob);

        URL.revokeObjectURL(url);
      }).catch(function(){});
    } catch(e) {}
  }
})();
</script>

function p2(n) { return String(n).padStart(2,"0"); }
function toIso(d) { return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate()); }
function toFmt(d) { return p2(d.getDate())+"/"+p2(d.getMonth()+1)+"/"+d.getFullYear(); }
function toWd(d) { var i = d.getDay(); return WK[i===0?6:i-1]; }
function fT(s) {
  if (!s) return "";
  var h = parseInt(s.slice(0,2)), m = s.slice(2);
  return h >= 24 ? p2(h-24)+":"+m : p2(h)+":"+m;
}
function fD(s) { if (!s) return ""; return parseInt(s.slice(0,2))+"h "+s.slice(2)+"m"; }
function hhmm2min(s) { if (!s||s.length<4) return 0; return parseInt(s.slice(0,2))*60+parseInt(s.slice(2)); }
function hm2min(s) { if (!s) return 0; var p=s.split(":"); return parseInt(p[0])*60+parseInt(p[1]); }
function fmtGap(m) { if (m<60) return m+"min"; var h=Math.floor(m/60),r=m%60; return r>0?h+"h "+r+"min":h+"h"; }
function calcGap(endStr,startStr) { var e=hm2min(endStr),s=hm2min(startStr),g=s-e; if(g<0)g+=1440; return g; }
function isRealSpezzato(segs) { return segs.length >= 2; }
function buildDevKey(v) {
  if (v.t!=="turno") return null;
  var tn=parseInt(v.n);
  if(isNaN(tn))return null;
  var ln=v.l||"";
  // Genera tutte le varianti possibili della chiave linea
  // es. "5B" → ["05B", "5B"], "05" → ["05", "5"], "38" → ["38"]
  var lnNum=parseInt(ln);
  var suffix=ln.replace(/^\d+/,""); // es. "B" da "5B"
  var variants=[];
  if(!isNaN(lnNum)){
    variants.push(String(lnNum).padStart(2,'0')+suffix); // "05B"
    variants.push(String(lnNum)+suffix);                  // "5B"
    if(!suffix){
      variants.push(String(lnNum).padStart(2,'0'));        // "05"
      variants.push(String(lnNum));                        // "5"
    }
  } else {
    variants.push(ln);
  }
  // Chiave preferita (prima variante)
  return variants[0]+' '+String(tn);
}
function buildDevKeyAll(v) {
  // Restituisce tutte le varianti di chiave per cercare negli orari
  if (v.t!=="turno") return [];
  var tn=parseInt(v.n);
  if(isNaN(tn))return [];
  var ln=v.l||"";
  var lnNum=parseInt(ln);
  var suffix=ln.replace(/^\d+/,"");
  var variants=[];
  if(!isNaN(lnNum)){
    variants.push(String(lnNum).padStart(2,'0')+suffix);
    variants.push(String(lnNum)+suffix);
    if(!suffix){
      variants.push(String(lnNum).padStart(2,'0'));
      variants.push(String(lnNum));
    }
  } else {
    variants.push(ln);
  }
  return variants.map(function(l){return l+' '+String(tn);});
}
function isNotturno(v) {
  if (v.t!=="turno"||!v.i||!v.e) return false;
  var ini=hhmm2min(v.i),ter=hhmm2min(v.e);
  return ini>=1020||ter>1440||(ter>0&&ter<=165);
}
function checkRiposoBreve(days,iso) {
  var v=days[iso]; if(!v||v.t!=="turno"||!v.e) return false;
  var d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+1);
  var nv=days[toIso(d)]; if(!nv||nv.t!=="turno"||!nv.i) return false;
  var terM=hhmm2min(v.e),ni=hhmm2min(nv.i);
  var gap=terM>1440?ni-(terM-1440):(1440-terM)+ni;
  return gap>0&&gap<660;
}
function parseInput(txt,refY) {
  var t=txt.trim().toLowerCase().replace(/^che turno faccio il\s*/,"").replace(/\?$/,"").trim();
  var m=t.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?$/);
  if(m) return new Date(m[3]?+m[3]:refY,+m[2]-1,+m[1]);
  m=t.match(/^(\d{1,2})\s+([a-z\u00e0-\u00fa]+)$/);
  if(m) { var mo=IM[m[2]]; if(mo) return new Date(refY,mo-1,+m[1]); }
  m=t.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  return null;
}

function precoKey(y,m) { return "ts_preco_"+y+"-"+p2(m); }
function orariKey(y,m) { return "ts_orari_"+y+"-"+p2(m); }

    dIn:d.dIn?d.dIn.toISOString():null,dTe:d.dTe?d.dTe.toISOString():null};
}
function deserializePreco(j) {

    dIn:j.dIn?new Date(j.dIn):null,dTe:j.dTe?new Date(j.dTe):null,rawText:""};

function updateIndex(type,key,nome,y,m) {
  var idx=DB.get("ts_index")||[],found=false;
  idx.forEach(function(e){if(e.key===key){e.savedAt=new Date().toISOString();if(nome)e.nome=nome;found=true;}});
  if(!found) idx.push({type:type,key:key,nome:nome,year:y,month:m,savedAt:new Date().toISOString()});
  idx.sort(function(a,b){return(b.year*100+b.month)-(a.year*100+a.month);});
  DB.set("ts_index",idx);
}
function savePreco(data) {
  if(!data||!data.dIn) return;
  var y=data.dIn.getFullYear(),m=data.dIn.getMonth()+1,k=precoKey(y,m);
  DB.set(k,serializePreco(data)); DB.set("ts_last_preco",k);
  updateIndex("preco",k,data.nome||"",y,m);
}
function saveOrari(devs,precoData,forceY,forceM) {
  if(!Object.keys(devs).length) return false;
  var y,m;
  if(forceY&&forceM){y=forceY;m=forceM;}
  else if(precoData&&precoData.dIn){y=precoData.dIn.getFullYear();m=precoData.dIn.getMonth()+1;}
  else return false;
  var k=orariKey(y,m);
  // Gestione localStorage pieno: rimuovi vecchie entry se necessario
  var ok=false;
  try{ok=DB.set(k,devs);}catch(e){ok=false;}
  if(!ok){
    // localStorage pieno: elimina entry più vecchie
    try{
      var idx=DB.get("ts_index")||[];
      var orariOld=idx.filter(function(e){return e.type==="orari";}).sort(function(a,b){return (a.savedAt||"")>(b.savedAt||"")?1:-1;});
      for(var i=0;i<orariOld.length&&!ok;i++){DB.del(orariOld[i].key);ok=DB.set(k,devs);}
    }catch(e2){}
  }
  if(ok){DB.set("ts_last_orari",k);updateIndex("orari",k,"",y,m);}
  return ok;
}
function loadLastPreco() { var k=DB.get("ts_last_preco"); if(!k)return null; return deserializePreco(DB.get(k)); }
function loadOrariByKey(k) {

}

/* ===== RIPOSI CYCLE ===== */
function calcRiposiCycle(data) {
  if(!data||!data.days) return null;
  var rpDates=[];
  Object.keys(data.days).forEach(function(iso){var v=data.days[iso];if(v&&REST_CODES[v.t])rpDates.push(iso);});
  rpDates.sort();
  if(rpDates.length<2) return null;
  var anchor=null;
  for(var i=0;i<rpDates.length;i++){
    if(i>0){var prev=new Date(rpDates[i-1]+"T00:00:00"),curr=new Date(rpDates[i]+"T00:00:00");
      if(Math.round((curr-prev)/86400000)===1) continue;}
    anchor=rpDates[i]; break;
  }
  return {anchor:anchor,cycle:6};
}
function projectRiposi(rc,yr,mo) {
  if(!rc||!rc.anchor) return {};
  var set={},anc=new Date(rc.anchor+"T12:00:00");
  var diffDays=Math.floor((new Date(yr,mo-1,1).getTime()-anc.getTime())/86400000);
  var steps=Math.floor(diffDays/6)-2;
  for(var i=steps;i<steps+10;i++){
    var d=new Date(anc.getTime());d.setDate(d.getDate()+i*6);
    var dow=d.getDay(),addArr=dow===6?[0,1]:dow===0?[-1,0]:dow===1?[-1,0]:[0];
    addArr.forEach(function(off){
      var dd=new Date(d.getTime());dd.setDate(dd.getDate()+off);
      if(dd.getMonth()===mo-1&&dd.getFullYear()===yr) set[toIso(dd)]=1;
    });
  }
  return set;
}
function saveRiposiCycle(data){var rc=calcRiposiCycle(data);if(rc)DB.set("ts_riposi_cycle",rc);}
function loadRiposiCycle(){return DB.get("ts_riposi_cycle");}

/* ===== PARSERS ===== */
var RE_LINE=/(\d{2}\/\d{2}\/\d{4})\s+(DOM|LUN|MAR|MER|GIO|VEN|SAB)\s+(.*)/;
function parseDMY(s){var p=s.split("/");return new Date(+p[2],+p[1]-1,+p[0]);}
function parseShift(rest){
  var tk=rest.split(/\s+/);if(tk.length<8)return null;
  var geIdx=-1;for(var i=0;i<tk.length;i++){if(tk[i]==="GE"){geIdx=i;break;}}
  if(geIdx<0||geIdx+2>=tk.length)return null;
  var turno=tk[geIdx+1],cod=tk[geIdx+2],after=tk.slice(geIdx+3);
  var times=[],locs=[],dirs=[];
  after.forEach(function(t){
    if(/^\d{4}$/.test(t))times.push(t);
    else if(/^[A-Z]{2,4}$/.test(t)){locs.push(t);dirs.push("");}
    else if(/^[AR]$/.test(t)){if(dirs.length>0)dirs[dirs.length-1]=t;}
  });
  return{t:"turno",l:tk[0],n:turno,c:cod,i:times[0]||"",li:locs[0]||"",di:dirs[0]||"",e:times[1]||"",le:locs[1]||"",de:dirs[1]||"",d:times[2]||""};
}
function parseShiftFromPaste(text){
  if(!text)return null;
  var clean=text.replace(/[\r\n\t]/g," ").replace(/\u00a0/g," ").replace(/\s+/g," ").trim();
  clean=clean.replace(/^\d{2}[.\/]\d{2}[.\/]\d{4}\s*/,"");
  var tk=clean.split(" ");
  var geIdx=-1;for(var i=0;i<tk.length;i++){if(tk[i]==="GE"){geIdx=i;break;}}
  if(geIdx<0)return null;
  var nums=[];for(var j=0;j<geIdx;j++){if(/^\d+$/.test(tk[j]))nums.push(tk[j]);}
  if(nums.length<2)return null;
  var linea=nums[nums.length-2],turnoN=nums[nums.length-1];
  var after=tk.slice(geIdx+1),times=[],locs=[],dirs=[];
  after.forEach(function(t){
    if(/^\d{4}$/.test(t))times.push(t);
    else if(/^[A-Z]{2,4}$/.test(t)){locs.push(t);dirs.push("");}
    else if(/^[AR]$/.test(t)){if(dirs.length>0)dirs[dirs.length-1]=t;}
  });
  if(times.length<2)return null;
  return{t:"turno",l:linea,n:turnoN,c:"",i:times[0],li:locs[0]||"",di:dirs[0]||"",e:times[1],le:locs[1]||"",de:dirs[1]||"",d:times[2]||"",g:"",_pasted:true};
}
function parsePreconoscenza(text){
  var lines=text.split("\n"),days={},nome="",matricola="",dIn=null,dTe=null;
  var allText=text.replace(/\n/g," ");
  var mn=allText.match(/Nominativo[:\s]+([A-Z][A-Z\s]+?)(?:\s{2,}|\s*$)/i);if(mn)nome=mn[1].trim();
  if(!nome){mn=allText.match(/Nominativo[:\s]+(.+?)(?:Stabilimento|Data|Gr\.|$)/i);if(mn)nome=mn[1].trim();}
  if(!nome){lines.forEach(function(raw){if(nome)return;var m=raw.match(/Nominativo[:\s]+([A-Z][A-Za-z\s]+)/i);if(m)nome=m[1].trim();});}
  var mm=allText.match(/Codice\s*Personale[:\s]*(\d+)/i);if(mm)matricola=mm[1];
  if(!matricola){lines.forEach(function(raw){if(matricola)return;var m=raw.match(/Codice\s*Personale[:\s]*(\d+)/i);if(m)matricola=m[1];});}
  lines.forEach(function(raw){
    var line=raw.trim();
    var mi=line.match(/Data\s*Inizio:?\s*(\d{2}\/\d{2}\/\d{4})/i);if(mi)dIn=parseDMY(mi[1]);
    var mt=line.match(/Data\s*Termine:?\s*(\d{2}\/\d{2}\/\d{4})/i);if(mt)dTe=parseDMY(mt[1]);
  });
  lines.forEach(function(raw){
    var line=raw.trim(),lm=line.match(RE_LINE);if(!lm)return;
    var dateStr=lm[1],gg=lm[2],rest=lm[3].trim(),date;
    try{date=parseDMY(dateStr);}catch(e){return;}
    var iso=toIso(date),tokens=rest.split(/\s+/),first=tokens[0]?tokens[0].toUpperCase():"";
    if(SPECIAL[first]){
      var entry={t:first,g:gg,x:tokens.slice(1).join(" ")};
      if(first==="RIS"){
        var bc="";
        for(var bi=1;bi<tokens.length;bi++){
          if(/^B\d{2}$/.test(tokens[bi])){bc=tokens[bi];break;}
          // Gestisce "B B03" separato: token "B" seguito da token "\d{2}" o "B\d{2}"
          if(tokens[bi]==="B"&&bi+1<tokens.length){
            if(/^\d{2}$/.test(tokens[bi+1])){bc="B"+tokens[bi+1];break;}
            if(/^B\d{2}$/.test(tokens[bi+1])){bc=tokens[bi+1];break;}
          }
          // Gestisce "B03" senza B iniziale separato
          if(/^\d{2}$/.test(tokens[bi])&&bi>0&&tokens[bi-1]==="B"){bc="B"+tokens[bi];break;}
        }
        entry.ball=bc;
      }
      days[iso]=entry;
    }else{var shift=parseShift(rest);if(shift){shift.g=gg;days[iso]=shift;}}
  });
  if(!dIn){var sorted=Object.keys(days).sort();if(sorted.length){dIn=new Date(sorted[0]+"T00:00:00");dTe=new Date(sorted[sorted.length-1]+"T00:00:00");}}
  return{days:days,nome:nome,matricola:matricola,dIn:dIn,dTe:dTe,rawText:text};
}

/* ===== PARSER ORARI (stitching iterativo) ===== */
var RE_SEG_STR = "(?:([A-Z0-9]{2}\\s+\\d{3})\\s+)?([A-Z0-9]+)\\s*/\\s*(\\d+)\\s+(\\d{2}\\.\\d{2})\\s+([A-Z]{2,4})\\s+([AR-])\\s+(\\d{2}\\.\\d{2})\\s+([A-Z]{2,4})";
function parseOrariPageLines(fullText,gt,ver,devs){
  var lines=fullText.split("\n"),pageSegs=[];
  lines.forEach(function(line){
    var lineMid=line.length/2;
    var codeLine=line.trim().match(/^([A-Z0-9]{2})\s+(\d{3})$/);
    if(codeLine){return;} // intestazione standalone, ignorata
    var re=new RegExp(RE_SEG_STR,"g"),m;
    while((m=re.exec(line))!==null){
      var code=m[1]?m[1].replace(/\s+/g," ").trim():null;
      var seg={ln:m[2],vett:m[3],start:m[4].replace(".",":"),loc_s:m[5],dir:m[6]!=="-"?m[6]:"",end:m[7].replace(".",":"),loc_e:m[8],gt:gt,ver:ver};
      pageSegs.push({code:code,seg:seg,done:false});
    }
  });

  /* PASSATA 1: segmenti con codice esplicito + orfani immediatamente successivi */
  var codeEnds={};
  var runCounters={};
  var lastExplicitCode=null; // ultimo codice esplicito visto nel testo

  pageSegs.forEach(function(ps){
    if(ps.code){
      // Segmento con codice esplicito
      var parts=ps.code.split(" ");
      var nc=parts.length===2?p2(parseInt(parts[0]))+" "+String(parseInt(parts[1])):ps.code;
      // Gestisce suffisso lettera (5B → 05B)
      var lnRaw=parts[0],lnNum=parseInt(lnRaw),lnSuf=lnRaw.replace(/^\d+/,"");
      if(!isNaN(lnNum))nc=String(lnNum).padStart(2,"0")+lnSuf+" "+String(parseInt(parts[1]));
      ps.normCode=nc;
      var tnNum=parseInt(nc.split(" ")[1]||"999");
      var isSpez=tnNum<100;
      var prev=codeEnds[nc];
      var gapOk=false;
      if(prev&&ps.seg.start){
        var pe=prev.e,ns=ps.seg.start;
        var gapMin=hm2min(ns)-hm2min(pe);
        if(gapMin<0)gapMin+=1440;
        gapOk=(gapMin<=480);
      }
      var runId;
      if(isSpez&&prev&&gapOk){
        runId=prev.run_id;
      } else {
        runCounters[nc]=(runCounters[nc]||0)+1;
        runId=runCounters[nc];
      }
      ps.seg.run_id=runId;
      ps.done=true;
      devs[nc]=devs[nc]||[];
      devs[nc].push(ps.seg);
      codeEnds[nc]={e:ps.seg.end,l:ps.seg.loc_e,run_id:runId};
      lastExplicitCode=nc;
    } else if(lastExplicitCode){
      // Orfano: assegna al turno IMMEDIATAMENTE PRECEDENTE nel testo
      // solo se è spezzato (num<100) e gap ragionevole (<4h)
      var tnNum2=parseInt(lastExplicitCode.split(" ")[1]||"999");
      var isSpez2=tnNum2<100;
      var prev2=codeEnds[lastExplicitCode];
      var gapOk2=false;
      if(isSpez2&&prev2&&ps.seg.start){
        var gapMin2=hm2min(ps.seg.start)-hm2min(prev2.e);
        if(gapMin2<0)gapMin2+=1440;
        gapOk2=(gapMin2>=0&&gapMin2<=240);
      }
      // Gap > 4h ma stesso luogo: potrebbe essere turno spezzato con pausa lunga
      if(!gapOk2&&isSpez2&&prev2&&ps.seg.start){
        var gapMin2b=hm2min(ps.seg.start)-hm2min(prev2.e);
        if(gapMin2b<0)gapMin2b+=1440;
        // Accetta se gap < 8h E stesso luogo di fine/inizio
        gapOk2=(gapMin2b>=0&&gapMin2b<=480&&prev2.l===ps.seg.loc_s);
      }
      if(gapOk2){
        ps.seg.run_id=codeEnds[lastExplicitCode].run_id;
        ps.done=true;
        devs[lastExplicitCode]=devs[lastExplicitCode]||[];
        devs[lastExplicitCode].push(ps.seg);
        codeEnds[lastExplicitCode]={e:ps.seg.end,l:ps.seg.loc_e,run_id:ps.seg.run_id};
      }
      // Se non assegnato, lo stitching passata 2 lo gestirà
    }
  });

  /* PASSATA 2: stitching per orfani rimasti */
  var changed=true,maxIter=15;
  while(changed&&maxIter-->0){
    changed=false;
    pageSegs.forEach(function(ps){
      if(ps.done)return;
      var best=null,ks=Object.keys(codeEnds);
      for(var i=0;i<ks.length;i++){if(codeEnds[ks[i]].e===ps.seg.start&&codeEnds[ks[i]].l===ps.seg.loc_s){best=ks[i];break;}}
      if(!best){for(var j=0;j<ks.length;j++){if(codeEnds[ks[j]].e===ps.seg.start){best=ks[j];break;}}}
      if(best){
        // Non aggiungere a turni spezzati che hanno già 2+ segmenti (evita segmenti rubati)
        var tnNum3=parseInt(best.split(" ")[1]||"999");
        if(tnNum3<100&&devs[best]&&devs[best].length>=2)return;
        ps.done=true;changed=true;
        ps.seg.run_id=codeEnds[best].run_id;
        devs[best]=devs[best]||[];
        devs[best].push(ps.seg);
        codeEnds[best]={e:ps.seg.end,l:ps.seg.loc_e,run_id:codeEnds[best].run_id};
      }
    });
  }
}

function mergeDevs(target,source){
  Object.keys(source).forEach(function(code){
    if(!target[code])target[code]=[];
    source[code].forEach(function(seg){
      if(!target[code].some(function(e){return e.start===seg.start&&e.loc_s===seg.loc_s&&e.end===seg.end&&e.gt===seg.gt&&e.ln===seg.ln;}))
        target[code].push(seg);
    });
  });
}

// Festivi nazionali italiani fissi (giorno/mese)
function isFestivoNazionale(date){
  var m=date.getMonth()+1,d=date.getDate();
  // Festivi fissi: 1/1, 6/1, 25/4, 1/5, 2/6, 15/8, 1/11, 8/12, 25/12, 26/12
  var fissi=[[1,1],[6,1],[25,4],[1,5],[2,6],[15,8],[1,11],[8,12],[25,12],[26,12]];
  for(var i=0;i<fissi.length;i++){if(fissi[i][0]===d&&fissi[i][1]===m)return true;}
  return false;
}

// Rileva se il turno termina con una "disposizione" al deposito
// (es: 18:31 GERB - 18:46 GERB con dir="-" e durata breve)
function isDisposizioneFinale(devSegs){
  if(!devSegs||devSegs.length<2)return null;
  var last=devSegs[devSegs.length-1];
  if(!last)return null;
  // Condizioni: stesso luogo inizio/fine, direzione "-", durata < 30min
  if(last.loc_s===last.loc_e && (last.dir==="-"||!last.dir)){
    var sM=hm2min(last.start),eM=hm2min(last.end);
    if(eM-sM<=30){
      return last.loc_e; // es. "GERB"
    }
  }
  return null;
}

function getFilteredDevSegs(devs,v,date){
  if(v&&v._pasted&&(!devs||Object.keys(devs).length===0)) return [];
  // Prova tutte le varianti di chiave (gestisce linee tipo 5B, 38B ecc.)
  var segs=[];
  var keys=buildDevKeyAll(v);
  for(var ki=0;ki<keys.length;ki++){
    if(devs[keys[ki]]&&devs[keys[ki]].length>0){segs=devs[keys[ki]];break;}
  }
  // Fallback generico: controlla tutti i mesi precaricati
  // Se un mese precaricato ha più segmenti per lo stesso turno, usali
  if(typeof ORARI_PRECARICATI!=="undefined"){
    var preMonths=Object.keys(ORARI_PRECARICATI);
    for(var pm=0;pm<preMonths.length;pm++){
      var preMonth=ORARI_PRECARICATI[preMonths[pm]]||{};
      for(var ki2=0;ki2<keys.length;ki2++){
        if(preMonth[keys[ki2]]&&preMonth[keys[ki2]].length>segs.length){
          segs=preMonth[keys[ki2]];
        }
      }
    }
  }
  var dk=keys[0]||null;
  if(segs.length>0&&date){
    var dow=date.getDay();
    var dt2=dow===0?"FEST":dow===6?"SAB":(isFestivoNazionale(date)?"FEST":"LV");
    segs=segs.filter(function(s){
      var g=(s.gt||"").toUpperCase();
      if(!g)return true;
      var isLV=g.indexOf("LUN")>=0||g.indexOf("MAR")>=0||g.indexOf("MER")>=0||g.indexOf("GIO")>=0||g.indexOf("VEN")>=0||g.indexOf("FERIALE")>=0||g.indexOf("FERIALI")>=0;
      if(dt2==="LV")return isLV;
      if(dt2==="SAB")return g.indexOf("SAB")>=0;
      return g.indexOf("FEST")>=0||g.indexOf("DOM")>=0||g.indexOf("DOMENICA")>=0;
    });
  }
  if(!segs.length) return [];

  // Usa run_id assegnato dal parser per separare corse distinte dello stesso turno
  var hasRunId=segs.some(function(s){return s.run_id!==undefined;});
  if(hasRunId){
    var runs={};
    segs.forEach(function(s){
      var k=s.run_id!==undefined?String(s.run_id):"_";
      if(!runs[k])runs[k]=[];
      runs[k].push(s);
    });
    var runKeys=Object.keys(runs);
    if(runKeys.length>1&&v&&v.i){
      var turnoMin=hm2min(v.i.slice(0,2)+":"+v.i.slice(2));
      var turnoEndMin=v.e?hm2min(v.e.slice(0,2)+":"+v.e.slice(2)):99999;
      // Controlla se i segmenti di tutti i run formano un turno spezzato continuo
      // (l'orario preconoscenza copre tutti i segmenti)
      var allSegsFlat=segs.slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});
      var firstStart=hm2min(allSegsFlat[0].start);
      var lastEnd=hm2min(allSegsFlat[allSegsFlat.length-1].end);
      var spannedByPreco=(firstStart>=turnoMin-30)&&(lastEnd<=turnoEndMin+30);
      if(spannedByPreco){
        // Tutti i segmenti appartengono a questo turno — restituiscili tutti
        return allSegsFlat;
      }
      // Altrimenti scegli il run più vicino all'orario di inizio
      var best=runKeys[0],bestDiff=99999;
      runKeys.forEach(function(k){
        var s0=runs[k].slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);})[0];
        var diff=Math.abs(hm2min(s0.start)-turnoMin);
        if(diff<bestDiff){bestDiff=diff;best=k;}
      });
      return runs[best].slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});
    }
    return (runs[runKeys[0]]||segs).slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});
  }

  // Fallback gap temporale
  var sorted=segs.slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});
  if(sorted.length<=1) return sorted;
  var corse=[],corsaCorrente=[sorted[0]];
  for(var i=1;i<sorted.length;i++){
    var gap=hm2min(sorted[i].start)-hm2min(sorted[i-1].end);
    if(gap<0||gap>5){corse.push(corsaCorrente);corsaCorrente=[sorted[i]];}
    else{corsaCorrente.push(sorted[i]);}
  }
  corse.push(corsaCorrente);
  if(corse.length===1) return corse[0];
  if(v&&v.i){
    var tMin=hm2min(v.i.slice(0,2)+":"+v.i.slice(2));
    var bestC=corse[0],bestD=99999;
    corse.forEach(function(c){var d=Math.abs(hm2min(c[0].start)-tMin);if(d<bestD){bestD=d;bestC=c;}});
    return bestC;
  }
  return corse[0];
}

/* ===== CALENDAR ===== */
function calDesc(v,devSegs){
  if(v.t!=="turno"){var inf=TL[v.t]||["",v.t,""];var cd=inf[0];if(v.t==="RIS"&&v.ball)cd+=" "+v.ball+" - "+(BALL_CODES[v.ball]||"");else if(inf[1])cd+="\n"+inf[1];return cd;}
  var d="Linea "+v.l+" Turno "+v.n+"\nCod. "+v.c+"\n"+fT(v.i)+" "+v.li+" -> "+fT(v.e)+" "+v.le;
  if(v.d)d+="\nDurata: "+fD(v.d);
  if(devSegs&&devSegs.length>0){d+="\n\nSviluppo:";devSegs.forEach(function(s,i){d+="\n"+(i+1)+". "+s.start+" "+s.loc_s+" -> "+s.end+" "+s.loc_e;});if(devSegs.length>1)d+="\nSpezzato ("+devSegs.length+" seg)";}
  return d;
}
function gcalDate(date,ts){
  if(!ts||ts.length<4)return null;
  var h=parseInt(ts.slice(0,2)),m=parseInt(ts.slice(2)),d=new Date(date.getTime());
  if(h>=24){h-=24;d.setDate(d.getDate()+1);}
  return d.getFullYear()+p2(d.getMonth()+1)+p2(d.getDate())+"T"+p2(h)+p2(m)+"00";
}
function gcalAllDay(date){
  var d1=date.getFullYear()+p2(date.getMonth()+1)+p2(date.getDate());
  var nx=new Date(date.getTime());nx.setDate(nx.getDate()+1);
  return d1+"/"+nx.getFullYear()+p2(nx.getMonth()+1)+p2(nx.getDate());
}
function buildGcalUrl(date,v,devSegs){
  var base="https://calendar.google.com/calendar/render?action=TEMPLATE";
  var title=v.t==="turno"?"Turno "+v.l+" "+v.n:((TL[v.t]||["",v.t])[0]+(v.ball?" "+v.ball:""));
  var dates=v.t!=="turno"?gcalAllDay(date):(gcalDate(date,v.i)||"")+"/"+(gcalDate(date,v.e)||"");
  return base+"&text="+encodeURIComponent(title)+"&dates="+dates+"&details="+encodeURIComponent(calDesc(v,devSegs));
}
function buildICS(date,v,devSegs){
  var L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//TurniSmart//IT","CALSCALE:GREGORIAN","METHOD:PUBLISH","BEGIN:VEVENT","UID:ts-"+toIso(date)+"-"+Math.random().toString(36).slice(2,8)+"@turnismart"];
  if(v.t!=="turno"){
    var inf=TL[v.t]||["","",""],d1=date.getFullYear()+p2(date.getMonth()+1)+p2(date.getDate());
    var nx=new Date(date.getTime());nx.setDate(nx.getDate()+1);
    L.push("DTSTART;VALUE=DATE:"+d1,"DTEND;VALUE=DATE:"+nx.getFullYear()+p2(nx.getMonth()+1)+p2(nx.getDate()),"SUMMARY:"+inf[0]+(v.ball?" "+v.ball:""));
    var icsD=v.ball?BALL_CODES[v.ball]||"":inf[1]||"";if(icsD)L.push("DESCRIPTION:"+icsD);
  }else{
    var s=gcalDate(date,v.i),e=gcalDate(date,v.e);
    if(s)L.push("DTSTART:"+s);if(e)L.push("DTEND:"+e);
    L.push("SUMMARY:Turno "+v.l+" "+v.n,"DESCRIPTION:"+calDesc(v,devSegs).replace(/\n/g,"\\n"));

  }
  L.push("END:VEVENT","END:VCALENDAR");
  return L.join("\r\n");
}
// Genera testo calendario semplificato per moglie
function buildCalendarioMoglie(data) {
  if(!data||!data.days) return "";
  var GIORNI = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
  var MESI_SHORT = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
  var lines = [];
  var sorted = Object.keys(data.days).sort();
  sorted.forEach(function(iso) {
    var v = data.days[iso];
    if(!v) return;
    var d = new Date(iso+"T12:00:00");
    var gg = GIORNI[d.getDay()];
    var giorno = d.getDate();
    var mese = MESI_SHORT[d.getMonth()];
    if(v.t === "turno") {
      var orario = v.i && v.e ? fT(v.i)+" - "+fT(v.e) : "";
      lines.push(gg+" "+giorno+" "+mese+": "+orario);
    } else if(v.t === "RIS") {
      lines.push(gg+" "+giorno+" "+mese+": Ballottaggio");
    } else if(REST_CODES[v.t]) {
      var desc = TL[v.t] ? TL[v.t][0] : "Riposo";
      lines.push(gg+" "+giorno+" "+mese+": "+desc);
    }
  });
  return lines.join("\n");
}

  doc.setFontSize(8); doc.setFont('helvetica','normal');

  // Linea gialla
  doc.setDrawColor.apply(doc,GIALLO);
  doc.setLineWidth(0.8);
  doc.line(0,22,W,22);

  // Legenda
  var legends=[{c:BLU,l:'Turno'},{c:VERDE,l:'Riposo'},{c:ROSSO,l:'Ballottaggio'},{c:ARANCIO,l:'Spezzato'}];
  var xL=5;
  legends.forEach(function(lg){
    doc.setFillColor.apply(doc,lg.c);
    doc.roundedRect(xL,24,5,5,1,1,'F');
    doc.setTextColor(80,80,80);
    doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text(lg.l,xL+6,28.5);
    xL+=38;
  });

  // Raggruppa per mese — USA SOLO i giorni della preconoscenza
  var byMonth={};
  Object.keys(data.days).sort().forEach(function(iso){
    var m=iso.slice(0,7);
    if(!byMonth[m]) byMonth[m]=[];
    byMonth[m].push({iso:iso,v:data.days[iso]});
  });

  var DAYS_HDR=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  var cellW=(W-10)/7, cellH=20;
  var yOff=32;

  Object.keys(byMonth).sort().forEach(function(mKey,mi){
    if(mi>0){doc.addPage();yOff=10;}
    var yr=parseInt(mKey.slice(0,4)),mo=parseInt(mKey.slice(5,7));
    var mNome=MESI_IT[mo]+' '+yr;

    // Titolo mese
    doc.setFillColor.apply(doc,BLU);
    doc.roundedRect(5,yOff,W-10,8,1,1,'F');
    doc.setTextColor.apply(doc,GIALLO);
    doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text(mNome,W/2,yOff+5.5,{align:'center'});
    yOff+=10;

    // Intestazione giorni
    DAYS_HDR.forEach(function(d,i){
      doc.setFillColor(220,228,240);
      doc.rect(5+i*cellW,yOff,cellW,7,'F');
      doc.setTextColor.apply(doc,BLU);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.text(d,5+i*cellW+cellW/2,yOff+4.8,{align:'center'});
    });
    yOff+=7;

    // Mappa giorni dal mese
    var dmap={};
    byMonth[mKey].forEach(function(g){dmap[g.iso]=g.v;});

    // Itera tutti i giorni del mese — celle grigie per giorni NON in preconoscenza
    var primo=new Date(yr,mo-1,1);
    var startDow=primo.getDay()===0?6:primo.getDay()-1;
    var ndm=new Date(yr,mo,0).getDate();
    var col=startDow, row=0;

    for(var d=1;d<=ndm;d++){
      var iso=yr+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var vv=dmap[iso];
      var x=5+col*cellW;
      var y=yOff+row*cellH;

      var bg, txtC;

      else if(vv&&vv.t==='RIS')    {bg=[255,235,238]; txtC=ROSSO;}
      else if(vv&&REST_CODES[vv.t]){bg=[232,245,233]; txtC=VERDE;}
      else                         {bg=[250,251,252]; txtC=[210,214,220];}

      doc.setFillColor.apply(doc,bg);
      doc.setDrawColor(220,224,230);
      doc.setLineWidth(0.2);
      doc.rect(x,y,cellW,cellH,'FD');

      // Numero giorno
      doc.setTextColor.apply(doc,txtC);
      doc.setFontSize(9); doc.setFont('helvetica',vv?'bold':'normal');
      doc.text(String(d),x+2.5,y+6);

      // Orario solo se turno
      if(vv&&vv.t==='turno'&&vv.i&&vv.e){
        doc.setFontSize(7); doc.setFont('helvetica','bold');
        doc.setTextColor.apply(doc,BLU);
        doc.text(fT(vv.i)+' - '+fT(vv.e),x+cellW/2,y+14,{align:'center'});
      } else if(vv&&vv.t==='RIS'){
        doc.setFontSize(6.5); doc.setFont('helvetica','bold');
        doc.setTextColor.apply(doc,ROSSO);
        doc.text('Ballot.',x+cellW/2,y+14,{align:'center'});
      } else if(vv&&REST_CODES[vv.t]){
        var rl=(TL[vv.t]||[vv.t])[0].slice(0,7);
        doc.setFontSize(6.5); doc.setFont('helvetica','normal');
        doc.setTextColor.apply(doc,VERDE);
        doc.text(rl,x+cellW/2,y+14,{align:'center'});
      }

      // Pallino colorato
      if(vv){
        var dotC=vv.t==='turno'?BLU:vv.t==='RIS'?ROSSO:VERDE;
        doc.setFillColor.apply(doc,dotC);
        doc.circle(x+cellW-2.5,y+3,1.8,'F');
      }

      col++;
      if(col>=7){col=0;row++;}
    }
    yOff+=(row+1)*cellH+8;
  });
  // Footer
  doc.setFillColor.apply(doc,GRIGIO2);
  doc.rect(0,H-10,W,10,'F');
  doc.setTextColor(150,150,150);
  doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.text('Generato da Turni Smart v5 · GTT Deposito Gerbido',W/2,H-3.5,{align:'center'});

  return doc;
}

    XLSX.utils.book_append_sheet(wb, ws, "Turni");
    XLSX.writeFile(wb, "turni-smart-backup.xlsx");
  } catch(err) {
    // Fallback CSV
    var csv = rows.map(function(r){return r.join(",");}).join("
");

function buildBallottaggiICS(data){

  if(effDir==="R")return gps[4]||0;
  if(effDir==="A")return gps[3]||0;

function fireAlarm(label){

  alert("SVEGLIA! "+label);
}

function renderPageToJpeg(page, scale){

/* ===== CLAUDE API OCR per tabella turni ===== */
/* Manda un batch di immagini pagine a Claude e riceve i dati strutturati */
function ocrBatchPages(images, gt, progressCb){
  var prompt = "Queste sono pagine di tabelle turni GTT Torino (gruppo di servizio: " + gt + ").\n" +
    "Per ogni riga della tabella turni estrai:\n" +
    "- codice: numero linea + numero turno (es '02 081', '38 304')\n" +
    "- start: ora inizio formato HH.MM (es '10.53')\n" +
    "- loc_s: luogo inizio (es 'PITA', 'GERB')\n" +
    "- dir: direzione A o R o vuoto\n" +
    "- end: ora fine formato HH.MM (es '13.37')\n" +
    "- loc_e: luogo fine\n" +
    "- vett: numero vettura (es '31')\n\n" +
    "Includi TUTTE le righe, anche le continuazioni senza codice turno (code=null).\n" +
    "IMPORTANTE: le righe di continuazione (senza codice linea/turno) hanno code=null.\n" +
    "Rispondi SOLO con JSON array: [{code,start,loc_s,dir,end,loc_e,vett},...]\n" +
    "Nessun testo aggiuntivo, solo JSON valido.";

  var content = [{type:"text", text: prompt}];
  images.forEach(function(b64){
    content.push({type:"image", source:{type:"base64", media_type:"image/jpeg", data:b64}});
  });

  return fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:4000,
      messages:[{role:"user", content:content}]
    })
  }).then(function(r){return r.json();}).then(function(data){
    var text = (data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
    // Estrai JSON dalla risposta
    var clean = text.replace(/```json|```/g,"").trim();
    // Trova il primo '[' e l'ultimo ']'
    var start = clean.indexOf('['), end = clean.lastIndexOf(']');
    if(start>=0 && end>start) clean = clean.slice(start, end+1);
    try{ return JSON.parse(clean); }catch(e){ return []; }
  }).catch(function(){ return []; });
}

/* ===== CONVERTE RISULTATI OCR IN STRUTTURA devs ===== */
function ocrResultsToDevs(results, gt, devs){
  // results = [{code, start, loc_s, dir, end, loc_e, vett}, ...]
  // Stessa logica stitching del parser testo
  var pageSegs = results.map(function(r){
    return {
      code: r.code ? normKey(r.code) : null,
      seg: {
        ln: r.code ? r.code.split(' ')[0] : '',
        vett: r.vett||'',
        start: (r.start||'').replace('.',':'),
        loc_s: r.loc_s||'',
        dir: r.dir||'',
        end: (r.end||'').replace('.',':'),
        loc_e: r.loc_e||'',
        gt: gt, ver:''
      },
      done: false
    };
  });

  var codeEnds = {};
  pageSegs.forEach(function(ps){
    if(ps.code){
      ps.done=true;
      devs[ps.code]=devs[ps.code]||[];
      devs[ps.code].push(ps.seg);
      codeEnds[ps.code]={e:ps.seg.end,l:ps.seg.loc_e};
    }
  });

  var changed=true, maxIter=15;
  while(changed&&maxIter-->0){
    changed=false;
    pageSegs.forEach(function(ps){
      if(ps.done)return;
      var best=null, ks=Object.keys(codeEnds);
      for(var i=0;i<ks.length;i++){
        if(codeEnds[ks[i]].e===ps.seg.start&&codeEnds[ks[i]].l===ps.seg.loc_s){best=ks[i];break;}
      }
      if(!best){for(var j=0;j<ks.length;j++){if(codeEnds[ks[j]].e===ps.seg.start){best=ks[j];break;}}}
      if(best){ps.done=true;changed=true;devs[best]=devs[best]||[];devs[best].push(ps.seg);codeEnds[best]={e:ps.seg.end,l:ps.seg.loc_e};}
    });
  }
}

function normKey(code){
  if(!code)return null;
  var parts=code.trim().split(/\s+/);
  if(parts.length>=2){
    var ln=parts[0], tn=parseInt(parts[1]);
    if(!isNaN(tn)){
      var lnNum=parseInt(ln);
      var suffix=ln.replace(/^\d+/,""); // es. "B" da "5B"
      var lnStr=isNaN(lnNum)?ln:String(lnNum).padStart(2,'0')+suffix;
      return lnStr+' '+String(tn);
    }
  }
  return code;
}

function extractText(page){
  // Prova entrambe le modalità di getTextContent e usa quella con più match
  var RE_EVAL=/(?:[A-Z0-9]{2}\s+\d{3}\s+)?[A-Z0-9]+\s*\/\s*\d+\s+\d{2}\.\d{2}\s+[A-Z]{2,4}\s+[AR-]\s+\d{2}\.\d{2}\s+[A-Z]{2,4}/g;
  function countMatches(text){return(text.match(RE_EVAL)||[]).length;}

  function buildText(items, rotation, pageW, pageH){
    if(!items.length)return"";
    function byX(its){
      var rowMap={};
      its.forEach(function(it){
        var found=null,keys=Object.keys(rowMap);
        for(var i=0;i<keys.length;i++){if(Math.abs(parseInt(keys[i])-it.x)<=8){found=keys[i];break;}}
        if(!found){found=String(it.x);rowMap[found]=[];}
        rowMap[found].push(it);
      });
      var xKeys=Object.keys(rowMap).map(Number).sort(function(a,b){return b-a;});
      var lines=[];
      xKeys.forEach(function(xk){
        var row=rowMap[String(xk)].slice().sort(function(a,b){return a.y-b.y;});
        var s=row.map(function(r){return r.str;}).join(" ").trim();
        if(s)lines.push(s);
      });
      return lines.join("\n");
    }
    function byY(its){
      var rowMap={};
      its.forEach(function(it){
        var found=null,keys=Object.keys(rowMap);
        for(var i=0;i<keys.length;i++){if(Math.abs(parseInt(keys[i])-it.y)<=8){found=keys[i];break;}}
        if(!found){found=String(it.y);rowMap[found]=[];}
        rowMap[found].push(it);
      });
      var yKeys=Object.keys(rowMap).map(Number).sort(function(a,b){return b-a;});
      var lines=[];
      yKeys.forEach(function(yk){
        var row=rowMap[String(yk)].slice().sort(function(a,b){return a.x-b.x;});
        var s=row.map(function(r){return r.str;}).join(" ").trim();
        if(s)lines.push(s);
      });
      return lines.join("\n");
    }
    function byYtop(its){
      its.forEach(function(it){it.yTop=pageH-it.y;});
      its.sort(function(a,b){var dy=a.yTop-b.yTop;if(Math.abs(dy)>5)return dy;return a.x-b.x;});
      var lines=[],curY=null,curLine=[];
      its.forEach(function(it){
        var tol=Math.max(3,(it.h||10)*0.4);
        if(curY===null||Math.abs(it.yTop-curY)>tol){if(curLine.length)lines.push(curLine.slice());curLine=[it];curY=it.yTop;}
        else{curLine.push(it);}
      });
      if(curLine.length)lines.push(curLine);
      return lines.map(function(ln){return ln.sort(function(a,b){return a.x-b.x;}).map(function(r){return r.str;}).join(" ");}).join("\n");
    }

    var primary,secondary,tertiary;
    if(rotation===90||rotation===270){primary=byX;secondary=byY;tertiary=byYtop;}
    else if(pageW>pageH){primary=byY;secondary=byX;tertiary=byYtop;}
    else{primary=byYtop;secondary=byY;tertiary=byX;}

    var tA=primary(items.slice()),mA=countMatches(tA);if(mA>0)return tA;
    var tB=secondary(items.slice()),mB=countMatches(tB);if(mB>mA)return tB;
    var tC=tertiary(items.slice()),mC=countMatches(tC);if(mC>mB)return tC;
    return tA||tB||tC;
  }

  function getItems(c){
    var items=[];
    c.items.forEach(function(it){
      if(!it.str||!it.str.trim())return;
      items.push({x:Math.round(it.transform[4]),y:Math.round(it.transform[5]),str:it.str.trim(),h:it.height||10});
    });
    return items;
  }

  var rotation=page.rotate||0;
  var vp=page.view,pageW=vp?(vp[2]-vp[0]):595,pageH=vp?(vp[3]-vp[1]):842;

  // Prova con disableCombineTextItems=true
  return page.getTextContent({disableCombineTextItems:true}).then(function(c1){
    var items1=getItems(c1);
    var text1=buildText(items1,rotation,pageW,pageH);
    var m1=countMatches(text1);

    // Prova anche senza disableCombineTextItems
    return page.getTextContent({disableCombineTextItems:false}).then(function(c2){
      var items2=getItems(c2);
      var text2=buildText(items2,rotation,pageW,pageH);
      var m2=countMatches(text2);

      return m2>m1?text2:text1;
    }).catch(function(){return text1;});
  });
}

</script>

function BusProgress({vi, ve, date}) {
  var sm = hhmm2min(vi);

  var dur = em - sm;
  var td  = toIso(new Date());

  var pct, label, done, notyet;

    pct    = Math.min(100, Math.max(0, (nm-sm)/dur*100));

  else if(notyet) {
    var ts = sm-nm;
    label = "Inizia tra "+(ts>=60?Math.floor(ts/60)+"h "+(ts%60?ts%60+"m":""):ts+"m");
  } else {
    var tr = em-nm;
    label = "Mancano "+(tr>=60?Math.floor(tr/60)+"h "+(tr%60?tr%60+"m":""):tr+"m");
  }
  var mainCol  = done?"#2e7d32":notyet?"#aab5c2":"#003366";
  var lightCol = done?"#e8f5e9":notyet?"#f4f6f9":"#e8eef8";
  var busPos   = Math.min(pct, 92);

    <div style={{margin:"16px 0 12px",padding:"14px 16px",background:"#f8f9fb",borderRadius:14,border:"1px solid #edf0f4"}}>

            padding:"5px 16px",borderRadius:20,

          }}>{label}</span>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:16,fontWeight:800,color:"#003366",letterSpacing:"-0.02em"}}>{fT(ve)}</div>
          <div style={{fontSize:10,color:"#aab5c2",fontWeight:600,marginTop:1}}>Fine</div>
        </div>
      </div>

      {/* Track FlightRadar */}
      <div style={{position:"relative",height:44,display:"flex",alignItems:"center"}}>

        {/* Linea grigia (sfondo) */}

          position:"absolute",left:20,right:20,top:"50%",
          height:3,background:"#dde1e8",borderRadius:2,
          transform:"translateY(-50%)"
        }}/>

        {/* Linea colorata (percorso fatto) */}
        <div style={{
          position:"absolute",left:20,top:"50%",
          width:"calc("+(busPos)+"% * (100% - 40px) / 100)",
          height:3,background:mainCol,borderRadius:2,
          transform:"translateY(-50%)",
          transition:"width 0.8s ease"
        }}/>

        {/* Cerchio partenza */}
        <div style={{
          position:"absolute",left:20,top:"50%",
          width:10,height:10,borderRadius:"50%",
          background:mainCol,border:"2px solid #fff",
          transform:"translate(-50%,-50%)",
          boxShadow:"0 1px 4px rgba(0,0,0,0.15)"

// ── SwipeCard — wrapper con rilevamento swipe ────────────
function SwipeCard({children, onSwipeLeft, onSwipeRight, swipeKey}) {
  var startX = React.useRef(null);
  var startY = React.useRef(null);
  var isDragging = React.useRef(false);
  var cardRef = React.useRef(null);

  function onTouchStart(e) {
    startX.current = e.touches[0].clientX;
    startY.current = e.touches[0].clientY;
    isDragging.current = false;
    if(cardRef.current) cardRef.current.style.transition = "none";
  }

  function onTouchMove(e) {
    if(startX.current === null) return;
    var dx = e.touches[0].clientX - startX.current;
    var dy = e.touches[0].clientY - startY.current;
    // Solo swipe orizzontale
    if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
      isDragging.current = true;
      if(cardRef.current) {
        cardRef.current.style.transform = "translateX("+dx+"px)";
        cardRef.current.style.opacity = String(1 - Math.abs(dx)/400);
      }
    }
  }

  function onTouchEnd(e) {
    if(startX.current === null) return;
    var dx = e.changedTouches[0].clientX - startX.current;
    if(cardRef.current) {
      cardRef.current.style.transition = "transform 0.25s ease, opacity 0.25s ease";
    }
    if(isDragging.current && Math.abs(dx) > 60) {
      // Swipe completato — anima uscita e cambia
      var dir = dx < 0 ? -1 : 1;
      if(cardRef.current) {
        cardRef.current.style.transform = "translateX("+(dir > 0 ? "100%" : "-100%")+")";
        cardRef.current.style.opacity = "0";
      }
      setTimeout(function() {
        if(dir < 0) { if(onSwipeLeft) onSwipeLeft(); }
        else         { if(onSwipeRight) onSwipeRight(); }
      }, 220);
    } else {
      // Swipe troppo corto — torna alla posizione originale
      if(cardRef.current) {
        cardRef.current.style.transform = "translateX(0)";
        cardRef.current.style.opacity = "1";
      }
    }
    startX.current = null;
    isDragging.current = false;
  }

  return (
    <div
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
      style={{position:"relative", borderRadius:14, overflow:"visible"}}
    >
      {/* Zona sinistra — liquid glass hint */}
      {onSwipeRight && (
        <div style={{
          position:"absolute", left:-2, top:0, bottom:0, width:36,
          zIndex:10, pointerEvents:"none",
          display:"flex", alignItems:"center", justifyContent:"center",
          borderRadius:"14px 0 0 14px",
        }}>
          {/* Glass pill */}
          <div style={{
            position:"absolute", inset:0,
            background:"linear-gradient(90deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.06) 100%)",
            backdropFilter:"blur(8px)",
            WebkitBackdropFilter:"blur(8px)",
            borderRadius:"14px 0 0 14px",
            border:"1px solid rgba(255,255,255,0.25)",
            borderRight:"none",
            animation:"swipeHintL 2.8s ease-in-out infinite",
          }}/>
          {/* Chevron */}
          <svg width="14" height="24" viewBox="0 0 14 24" fill="none"
            style={{position:"relative",zIndex:2,animation:"swipeChevronR 2.8s ease-in-out infinite"}}>
            <polyline points="10,4 4,12 10,20" stroke="rgba(0,51,102,0.6)"
              strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      )}

      {/* Zona destra — liquid glass hint */}
      {onSwipeLeft && (
        <div style={{
          position:"absolute", right:-2, top:0, bottom:0, width:36,
          zIndex:10, pointerEvents:"none",
          display:"flex", alignItems:"center", justifyContent:"center",
          borderRadius:"0 14px 14px 0",
        }}>
          <div style={{
            position:"absolute", inset:0,
            background:"linear-gradient(270deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.06) 100%)",
            backdropFilter:"blur(8px)",
            WebkitBackdropFilter:"blur(8px)",
            borderRadius:"0 14px 14px 0",
            border:"1px solid rgba(255,255,255,0.25)",
            borderLeft:"none",
            animation:"swipeHintR 2.8s ease-in-out infinite 0.4s",
          }}/>
          <svg width="14" height="24" viewBox="0 0 14 24" fill="none"
            style={{position:"relative",zIndex:2,animation:"swipeChevron 2.8s ease-in-out infinite 0.4s"}}>
            <polyline points="4,4 10,12 4,20" stroke="rgba(0,51,102,0.6)"
              strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      )}

      {/* Card */}
      <div
        ref={cardRef}
        key={swipeKey}
        style={{
          transform:"translateX(0)",
          opacity:1,
          transition:"transform 0.3s ease, opacity 0.3s ease",
          willChange:"transform, opacity",
          borderRadius:14,
          overflow:"hidden"
        }}
      >
        {children}
      </div>
    </div>
  );
}

// ── DaySlider ──────────────────────────────────────────
function DaySlider({viewY, viewM, calDays, det, setDet, isCurrentMonth}) {
  var nd = new Date(viewY, viewM, 0).getDate();
  var initDay = det ? det.date.getDate() : (isCurrentMonth ? Math.min(new Date().getDate(), nd) : 1);
  initDay = Math.max(1, Math.min(initDay, nd));

  var sliderRef  = React.useRef(null);
  var busRef     = React.useRef(null);
  var trackRef   = React.useRef(null);
  var dayRef     = React.useRef(null);
  var turnoRef   = React.useRef(null);
  var oraRef     = React.useRef(null);
  var rafRef     = React.useRef(null);
  var lastDay    = React.useRef(initDay);

  function moveBus(day) {
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(function() {
      lastDay.current = day;
      var pct  = nd > 1 ? (day-1)/(nd-1)*100 : 0;
      var left = pct * 0.86 + 4;
      if(busRef.current)   busRef.current.style.left  = left + "%";
      if(trackRef.current) trackRef.current.style.width = (pct * 0.86) + "%";
      if(dayRef.current)   dayRef.current.textContent = day;
      var ds = viewY+"-"+String(viewM).padStart(2,"0")+"-"+String(day).padStart(2,"0");
      var vv = calDays[ds];
      var col = vv ? (vv.t==="turno"?"#003366":vv.t==="RIS"?"#c62828":"#b8860b") : "#8a9ab0";
      if(turnoRef.current) {
        turnoRef.current.textContent = vv
          ? (vv.t==="turno"?vv.l+" "+vv.n:(TL[vv.t]||[vv.t])[0]) : "—";
        turnoRef.current.style.color = col;
      }
      if(oraRef.current)
        oraRef.current.textContent = vv&&vv.t==="turno"&&vv.i&&vv.e
          ? fT(vv.i)+" → "+fT(vv.e) : "";
      if(busRef.current) {
        var inner = busRef.current.firstChild;
        if(inner) inner.style.background = col;
      }
      if(trackRef.current) trackRef.current.style.background = col;
    });
  }

  React.useEffect(function() {
    if(det) moveBus(det.date.getDate());
  }, [det, viewY, viewM]);

  // Touch events diretti sull'input per massima fluidità su iOS
  function handleTouch(e) {
    if(!sliderRef.current) return;
    var rect = sliderRef.current.getBoundingClientRect();
    var touch = e.touches[0] || e.changedTouches[0];
    var x = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
    var day = Math.round(1 + x * (nd-1));
    day = Math.max(1, Math.min(nd, day));
    moveBus(day);
    if(e.type === "touchend") {
      var ds = viewY+"-"+String(viewM).padStart(2,"0")+"-"+String(day).padStart(2,"0");
      var vv = calDays[ds];
      setDet(vv ? {date:new Date(viewY,viewM-1,day), v:vv} : null);
    }
  }

  var sd   = det ? det.date.getDate() : initDay;
  var dStr = viewY+"-"+String(viewM).padStart(2,"0")+"-"+String(sd).padStart(2,"0");
  var vSel = calDays[dStr];
  var bCol = vSel ? (vSel.t==="turno"?"#003366":vSel.t==="RIS"?"#c62828":"#b8860b") : "#8a9ab0";
  var pct0 = nd > 1 ? (sd-1)/(nd-1)*100 : 0;

  return (
    <div style={{marginBottom:16}}>
      {/* Mirino */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
        borderRadius:12,border:"2px solid "+(vSel?bCol:"#e0e5ec"),
        background:vSel?(vSel.t==="turno"?"#eef3ff":vSel.t==="RIS"?"#fef2f2":"#fffde7"):"#f4f6f9",
        marginBottom:14}}>
        <div style={{width:36,height:36,borderRadius:9,background:vSel?bCol:"#e0e5ec",
          display:"flex",alignItems:"center",justifyContent:"center",
          flexShrink:0,fontSize:15,fontWeight:800,
          color:vSel&&vSel.t==="turno"?"#ffd100":"#fff"}}>
          <span ref={dayRef}>{sd}</span>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,color:"#8a9ab0",fontWeight:600,marginBottom:2}}>
            {["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][new Date(viewY,viewM-1,sd).getDay()]}
            {"  "}{sd}{"  "}{MESI_IT[viewM]}
          </div>
          <div ref={turnoRef} style={{fontSize:16,fontWeight:800,color:bCol,letterSpacing:"-0.02em"}}>
            {vSel?(vSel.t==="turno"?vSel.l+" "+vSel.n:(TL[vSel.t]||[vSel.t])[0]):"—"}
          </div>
          <div ref={oraRef} style={{fontSize:11,color:"#8a9ab0",marginTop:1}}>
            {vSel&&vSel.t==="turno"&&vSel.i&&vSel.e?fT(vSel.i)+" → "+fT(vSel.e):""}
          </div>
        </div>
        {vSel&&<div style={{fontSize:18,color:bCol}}>›</div>}
      </div>

      {/* Slider */}
      <div style={{position:"relative",height:52,marginBottom:6,touchAction:"none"}}>
        <div style={{position:"absolute",top:"50%",left:"4%",right:"4%",
          height:5,background:"#e0e5ec",borderRadius:3,transform:"translateY(-50%)"}}/>
        <div ref={trackRef} style={{position:"absolute",top:"50%",left:"4%",
          width:(pct0*0.86)+"%",height:5,background:bCol,borderRadius:3,transform:"translateY(-50%)"}}/>
        {/* Input con touch events diretti */}
        <input ref={sliderRef} type="range" min={1} max={nd} defaultValue={sd}
          onTouchStart={handleTouch}
          onTouchMove={handleTouch}
          onTouchEnd={handleTouch}
          onChange={function(e){
            var day=parseInt(e.target.value);
            moveBus(day);
            var ds=viewY+"-"+String(viewM).padStart(2,"0")+"-"+String(day).padStart(2,"0");
            var vv=calDays[ds];
            setDet(vv?{date:new Date(viewY,viewM-1,day),v:vv}:null);
          }}
          style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",
            opacity:0,cursor:"pointer",margin:0,padding:0,
            WebkitAppearance:"none",zIndex:10,touchAction:"none"}}
        />
        <div ref={busRef} style={{position:"absolute",top:"50%",
          left:(pct0*0.86+4)+"%",
          transform:"translate(-50%,-50%)",pointerEvents:"none",zIndex:5}}>
          <div style={{width:36,height:36,borderRadius:9,background:bCol,
            border:"3px solid #fff",
            boxShadow:"0 2px 8px rgba(0,51,102,0.25)",
            display:"flex",alignItems:"center",justifyContent:"center"}}>

function Card({date, devs={}, allDays={}, onPaste, v: vProp}) {
  const [copied, setCopied] = useState(false);
  const [flipped, setFlipped] = useState(false);
  const [animClass, setAnimClass] = useState("");
  const [showActions, setShowActions] = useState(false);
  const [showVett, setShowVett] = useState(false);
  const [pasteErr, setPasteErr] = useState("");
  const [showPaste, setShowPaste] = useState(false);
  const [pasteTxt, setPasteTxt] = useState("");
  const [localV, setLocalV] = useState(null);
  // Vettura per segmento: {seg_idx: "numero"}, persistito in localStorage
  const loadVett = () => DB.get("ts_vett_"+toIso(date)) || {};
  const [vettMap, setVettMap] = useState(loadVett);
  const vettRefs = React.useRef({});
  const [vettSaved, setVettSaved] = useState(false);


  const v = localV || allDays[toIso(date)] || vProp;
  const devSegs = getFilteredDevSegs(devs, v, date);
  // Rileva se l'ultimo segmento è una disposizione al deposito
  const dispLoc = isDisposizioneFinale(devSegs);
  // Turno spezzato: 2+ segmenti dagli orari, OPPURE numero turno < 100 (regola GTT Gerbido)
  const turnoNum = v && v.n ? parseInt(v.n) : 999;
  const isSpezzatoByRule = !isNaN(turnoNum) && turnoNum < 100;
  // Mostra flip se: 2+ segmenti dagli orari OPPURE numero turno < 100
  const isSpezzato = devSegs.length >= 2 || isSpezzatoByRule;
  const iso = toIso(date);
  const night = isNotturno(v);
  const rb = checkRiposoBreve(allDays, iso);
  const firstVett = devSegs.length > 0 && devSegs[0].vett ? devSegs[0].vett : "";
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const gcalUrl = buildGcalUrl(date, v, devSegs);
  const summary = buildSummary(date, v, devSegs);
  const moovitData = buildMoovitData(date, v);

  const liveUrl = v.t==="turno" ? buildLiveUrlForCard(v) : null;

  // Determina la linea di visualizzazione con eventuale variante (barrato)
  // Regola generica: se uno qualsiasi dei segmenti ha una linea con suffisso
  // alfabetico (es. 58B, 4N, 38B), mostra "58/B" (numero + slash + variante)
  let displayLine = v.l;
  if (devSegs.length > 0) {
    const variants = {};
    devSegs.forEach(s => {
      if (s.ln) {
        const m = String(s.ln).match(/^(\d+)([A-Z]+)$/);
        if (m) variants[m[2]] = m[1];
      }
    });
    const variantKeys = Object.keys(variants);
    if (variantKeys.length > 0) {
      // Usa la prima variante trovata (in genere è una sola per turno)
      const letter = variantKeys[0];
      const baseNum = variants[letter];
      displayLine = baseNum + "/" + letter;
    }
  }
  const code = displayLine+" "+v.n;

  function doCopy(e) {
    if(e)e.stopPropagation();
    const txt=buildSummary(date,v,devSegs);
    try{const ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),1500);}catch(err){}
  }

  function doCalendar() {
    shareToCalendar(date,v,devSegs);
  }



  // Stili base
  const accent="#003366", orange="#e65100";
  const bdr = isSpezzato ? "3px solid "+orange : "3px solid "+accent;
  const cardBase = {background:"#fff",borderRadius:14,boxShadow:"0 2px 12px rgba(0,51,102,0.10)",borderLeft:bdr,padding:"16px 16px 14px"};

  // ─── Azioni card — design minimal Jony Ive ───
  // Azione primaria: sveglia (se mattina) oppure navigazione
  // Secondarie: menu "···" con tutto il resto
  function ActionButtons({stopFlip}) {
    return (
      <div style={{marginTop:16,borderTop:"1px solid #f0f2f5",paddingTop:14}} onClick={e=>e.stopPropagation()}>
        {/* Riga principale: azione primaria + menu */}
        <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
          {/* Azione primaria: sveglia se mattina, navigazione se pomeriggio */}
          {moovitData ? (
            <button onClick={()=>openGMaps(moovitData)}
              style={{flex:1,padding:"13px 0",borderRadius:12,border:"none",
                background:"#003366",color:"#ffd100",
                fontSize:14,fontWeight:700,cursor:"pointer",lineHeight:1.2}}>
              {"Da Gerbido → "+moovitData.locCode}
            </button>
          ) : (
            <button onClick={doCopy}
              style={{flex:1,padding:"13px 0",borderRadius:12,border:"none",
                background:copied?"#f0faf0":"#003366",
                color:copied?"#1b7a3d":"#ffd100",
                fontSize:15,fontWeight:700,cursor:"pointer"}}>
              {copied?"✓ Copiato":"Copia turno"}
            </button>
          )}
          {/* Bottone "···" menu secondario */}
          <button onClick={()=>setShowActions(a=>!a)}
            style={{width:48,padding:"13px 0",borderRadius:12,border:"none",
              background:"#f4f6f9",color:"#5a6b80",
              fontSize:18,fontWeight:700,cursor:"pointer",flexShrink:0}}>
            {showActions?"✕":"···"}
          </button>
        </div>

        {/* Bottone Calendario — sempre visibile */}
        <button onClick={()=>doCalendar()}
          style={{width:"100%",marginTop:6,padding:"11px 0",borderRadius:12,border:"none",
            background:"#f0f4ff",color:"#003366",fontSize:14,fontWeight:700,
            cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Aggiungi al Calendario
        </button>

        {/* Menu azioni secondarie — appaiono su tap "···" */}
        {showActions && (
          <div style={{marginTop:10,background:"#f9fafc",borderRadius:14,overflow:"hidden",border:"1px solid #edf0f4"}}>
            {/* Calendario */}
            <button onClick={()=>{doCalendar();setShowActions(false);}}
              style={{width:"100%",padding:"13px 16px",border:"none",borderBottom:"1px solid #edf0f4",
                background:"transparent",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#003366" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span style={{fontSize:15,fontWeight:600,color:"#1a1a2e"}}>Aggiungi al Calendario</span>
            </button>
            {/* Copia */}
            <button onClick={()=>{doCopy();setTimeout(()=>setShowActions(false),800);}}
              style={{width:"100%",padding:"13px 16px",border:"none",borderBottom:"1px solid #edf0f4",
                background:"transparent",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#003366" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              <span style={{fontSize:15,fontWeight:600,color:"#1a1a2e"}}>{copied?"✓ Copiato":"Copia testo turno"}</span>
            </button>
            {/* WhatsApp */}
            <button onClick={()=>{window.open("https://api.whatsapp.com/send?text="+encodeURIComponent(summary),"_blank","noopener");setShowActions(false);}}
              style={{width:"100%",padding:"13px 16px",border:"none",borderBottom:moovitData?"1px solid #edf0f4":"none",
                background:"transparent",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              <span style={{fontSize:15,fontWeight:600,color:"#1a1a2e"}}>Condividi su WhatsApp</span>
            </button>
            {/* Navigazione */}
            {moovitData && (
              <>
                <button onClick={()=>{openMoovit(moovitData);setShowActions(false);}}
                  style={{width:"100%",padding:"13px 16px",border:"none",borderBottom:"1px solid #edf0f4",
                    background:"transparent",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff6900" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M7 19v2M17 19v2"/><circle cx="7" cy="14" r="1" fill="#ff6900"/><circle cx="17" cy="14" r="1" fill="#ff6900"/></svg>
                  <span style={{fontSize:15,fontWeight:600,color:"#1a1a2e"}}>Moovit <span style={{fontSize:12,color:"#8a9ab0",fontWeight:400}}>(trasporto pubblico)</span></span>
                </button>
                <button onClick={()=>{openGMaps(moovitData);setShowActions(false);}}
                  style={{width:"100%",padding:"13px 16px",border:"none",borderBottom:liveUrl?"1px solid #edf0f4":"none",
                    background:"transparent",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4285f4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
                  <span style={{fontSize:15,fontWeight:600,color:"#1a1a2e"}}>Google Maps <span style={{fontSize:12,color:"#8a9ab0",fontWeight:400}}>(percorso a piedi/TPL)</span></span>
                </button>
              </>
            )}
            {liveUrl && (
              <button onClick={()=>{openLiveMap(liveUrl);setShowActions(false);}}
                style={{width:"100%",padding:"13px 16px",border:"none",
                  background:"transparent",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#003366" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span style={{fontSize:15,fontWeight:600,color:"#1a1a2e"}}>Arrivi linea {parseInt(v.l)}</span>
              </button>
            )}
          </div>
        )}
        {v.t==="turno" && devSegs.length > 0 && (() => {
          const hasVett = Object.keys(vettMap).some(k=>vettMap[k]);
          return (
          <div style={{marginTop:14,borderTop:"1px solid #f0f2f5",paddingTop:10}} onClick={e=>e.stopPropagation()}>
            <button onClick={()=>setShowVett(prev=>!prev)}
              style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"6px 0 8px",background:"transparent",border:"none",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8a9ab0" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M7 19v2M17 19v2"/><circle cx="7" cy="14" r="1" fill="#8a9ab0"/><circle cx="17" cy="14" r="1" fill="#8a9ab0"/></svg>
                <span style={{fontSize:13,fontWeight:600,color:"#8a9ab0",textTransform:"uppercase",letterSpacing:"0.04em"}}>Vettura</span>
                {hasVett && <span style={{fontSize:13,fontWeight:700,color:"#003366",background:"#eef3ff",borderRadius:6,padding:"2px 8px"}}>
                  {devSegs.map((_,si)=>vettMap[si]||"—").join(" · ")}
                </span>}
                {!hasVett && <span style={{fontSize:12,color:"#c0c8d4"}}>Non inserita</span>}
              </div>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c0c8d4" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                {showVett?<polyline points="18 15 12 9 6 15"/>:<polyline points="6 9 12 15 18 9"/>}
              </svg>
            </button>
            {showVett && <div>
            {devSegs.map((seg, si) => {
              const saved = vettMap[si] || "";
              return (
                <div key={si} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:40}}>
                    {devSegs.length > 1 && (
                      <span style={{fontSize:15,fontWeight:700,color:"#fff",background:"#003366",borderRadius:6,padding:"4px 8px",minWidth:22,textAlign:"center"}}>
                        {si+1}
                      </span>
                    )}
                    {seg.vett && (
                      <span style={{fontSize:13,fontWeight:800,color:"#e65100",background:"#fff3e0",border:"1px solid #ffcc80",borderRadius:5,padding:"3px 6px",whiteSpace:"nowrap"}}>
                        Turno Vet. {seg.vett}
                      </span>
                    )}
                  </div>
                  <span style={{fontSize:15,fontWeight:600,color:"#5a6b80",whiteSpace:"nowrap",minWidth:80}}>{seg.start}→{seg.end}</span>
                  <input
                    key={iso+"-"+si}
                    type="text"
                    inputMode="numeric"
                    pattern="[0-9]*"
                    maxLength={4}
                    defaultValue={saved}
                    placeholder={seg.vett||"-"}
                    ref={el=>vettRefs.current[si]=el}
                    style={{
                      width:80,padding:"10px 6px",borderRadius:8,
                      border:"2px solid #003366",
                      background:"#f0f4ff",
                      color:"#003366",fontSize:22,fontWeight:800,
                      outline:"none",textAlign:"center"
                    }}
                  />
                </div>
              );
            })}
            <button
              onClick={()=>{
                const newMap={...vettMap};
                devSegs.forEach((_,si)=>{
                  const el=vettRefs.current[si];
                  if(el){
                    const val=el.value.replace(/[^0-9]/g,"").slice(0,4);
                    newMap[si]=val;
                    el.value=val;
                  }
                });
                setVettMap(newMap);
                DB.set("ts_vett_"+toIso(date),newMap);
                setVettSaved(true);
                setTimeout(()=>setVettSaved(false), 2200);
              }}
              className={vettSaved?"vett-saved":""}
              style={{
                width:"100%",marginTop:10,padding:"12px 0",borderRadius:10,border:"none",
                background:vettSaved?"#1b7a3d":"#003366",
                color:vettSaved?"#fff":"#ffd100",
                fontSize:16,fontWeight:800,cursor:"pointer",
                transition:"background 0.3s, color 0.3s"
              }}>
              {vettSaved
                ? <><span className="vett-save-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Salvato!</>
                : <><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",verticalAlign:"middle",marginRight:5}}><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Salva numeri vettura</>
              }
            </button>
          </div>}
          </div>
          );
        })()}
      </div>
    );
  }

  /* ---- Card speciale: riposo, ballottaggio, ferie ---- */
  if (v.t !== "turno") {
    const info = TL[v.t] || ["Sconosciuto","","#666"];
    return (
      <div style={Object.assign({},cardBase,{marginBottom:10})}>
        <div style={{fontSize:14,color:"#8a9ab0",marginBottom:6}}>{toWd(date)} {toFmt(date)}</div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{background:info[2],color:v.t==="RIS"?"#fff":"#003366",fontSize:15,fontWeight:700,padding:"5px 16px",borderRadius:20}}>{info[0]}</span>
          {v.t==="RIS" && v.ball && <span style={{fontFamily:"monospace",fontWeight:700,fontSize:16,color:"#003366"}}>{v.ball} — {BALL_CODES[v.ball]||"da assegnare"}</span>}
        </div>
        {v.t!=="RIS" && info[1] && <div style={{color:"#5a6b80",marginTop:8,fontSize:15}}>{info[1]}</div>}
        {v.t==="RIS" && onPaste && (
          <div style={{marginTop:12}}>
            {!showPaste ? (
              <button onClick={e=>{e.stopPropagation();setShowPaste(true);setPasteErr("");setPasteTxt("");}}
                style={{width:"100%",padding:"12px 0",borderRadius:10,border:"2px solid #003366",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                Incolla turno assegnato
              </button>
            ) : (
              <div onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:13,color:"#8a9ab0",marginBottom:6}}>Incolla la riga — conferma automatica:</div>
                <textarea value={pasteTxt} onInput={e=>setPasteTxt(e.target.value)} onChange={e=>setPasteTxt(e.target.value)}
                  onPaste={e=>{
                    let clip="";
                    try{clip=(e.clipboardData||window.clipboardData).getData("text");}catch(x){}
                    if(!clip){setTimeout(()=>{if(e.target&&e.target.value)clip=e.target.value;if(clip){const parsed=parseShiftFromPaste(clip);if(parsed){parsed.g=toWd(date).toUpperCase().slice(0,3);if(onPaste){onPaste(iso,parsed);}else{setLocalV(parsed);}setShowPaste(false);setPasteTxt("");}else{setPasteTxt(clip);setPasteErr("Formato non riconosciuto.");}}},150);return;}
                    e.preventDefault();
                    const parsed=parseShiftFromPaste(clip);
                    if(parsed){parsed.g=toWd(date).toUpperCase().slice(0,3);if(onPaste){onPaste(iso,parsed);}else{setLocalV(parsed);}setShowPaste(false);setPasteTxt("");}
                    else{setPasteTxt(clip);setPasteErr("Formato non riconosciuto.");}
                  }}
                  placeholder="es. N B 44 107 GE 0713 GERB 1307 OMER R 0554"
                  style={{width:"100%",minHeight:56,padding:"10px 12px",borderRadius:10,border:"2px solid #003366",background:"#fff",color:"#003366",fontSize:15,fontFamily:"monospace",outline:"none",resize:"none",boxSizing:"border-box"}}
                  autoFocus/>
                <button onClick={e=>{e.stopPropagation();setShowPaste(false);setPasteErr("");setPasteTxt("");}}
                  style={{width:"100%",marginTop:6,padding:"9px 0",borderRadius:8,border:"1px solid #dce1e8",background:"transparent",color:"#8a9ab0",fontSize:14,cursor:"pointer"}}>Annulla</button>
                {pasteErr && <div style={{color:"#e53935",fontSize:13,marginTop:4}}>{pasteErr}</div>}
              </div>
            )}
          </div>
        )}
        <ActionButtons stopFlip={false}/>
      </div>
    );
  }

  /* ---- Card turno a una ripresa (no flip) ---- */
  if (!isSpezzato) {
    return (
      <div style={Object.assign({},cardBase,{marginBottom:10})}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:14,color:"#8a9ab0",fontWeight:600}}>{toWd(date)} {toFmt(date)}</span>
          <div style={{display:"flex",gap:4}}>
            {night && <Tag bg={G.purpleBg} color={G.purple}>Serale</Tag>}
            {rb && <Tag bg={G.redBg} color={G.red}>Rip. breve</Tag>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <span style={{fontFamily:"'SF Mono',monospace",fontSize:28,fontWeight:800,color:"#003366",letterSpacing:"-0.02em"}}>{code}</span>
          <span style={{fontSize:15,color:"#8a9ab0"}}>vet. {vettMap[0]||firstVett||"—"}</span>
          
        </div>
        <div style={{background:"#f4f6f9",borderRadius:10,padding:"10px 14px"}}>
          <span style={{fontWeight:800,fontSize:20,color:"#003366"}}>{fT(v.i)}</span>
          <span style={{fontSize:14,color:"#003366",fontWeight:700,marginLeft:6}}>{v.li}</span>
          {v.di==="A"&&<span style={{fontSize:12,color:"#8a9ab0",marginLeft:3,fontWeight:600}}>and.</span>}
          {v.di==="R"&&<span style={{fontSize:12,color:"#8a9ab0",marginLeft:3,fontWeight:600}}>rit.</span>}
          <span style={{color:"#c8d0dc",margin:"0 8px"}}>→</span>
          <span style={{fontWeight:800,fontSize:20,color:"#003366"}}>{fT(v.e)}</span>
          <span style={{fontSize:14,color:"#003366",fontWeight:700,marginLeft:6}}>{v.le}</span>
          {v.de==="A"&&<span style={{fontSize:12,color:"#8a9ab0",marginLeft:3,fontWeight:600}}>and.</span>}
          {v.de==="R"&&<span style={{fontSize:12,color:"#8a9ab0",marginLeft:3,fontWeight:600}}>rit.</span>}
          {v.d && <span style={{marginLeft:10,fontSize:14,color:"#8a9ab0"}}>{fD(v.d)}</span>}
        </div>
        <ActionButtons stopFlip={false}/>
      </div>
    );
  }

  /* ---- Card turno SPEZZATO — con flip animata ---- */
  // Card spezzato: mostra fronte o retro in base a stato
  if (isSpezzato) {
    if (!flipped) {
      // FRONTE
      return (
        <div className={animClass} style={Object.assign({},cardBase,{marginBottom:10})}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:14,color:"#8a9ab0",fontWeight:600}}>{toWd(date)} {toFmt(date)}</span>
            <div style={{display:"flex",gap:4}}>
              {dispLoc

                          const parsed=parseShiftFromPaste(clip);
