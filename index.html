          </div>
          {hasOr ? (
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{
                const d=loadOrariByKey(has.orari.key);
                if(d&&Object.keys(d).length){onLoadOrari(d);}
              }}
                style={{flex:1,padding:"13px 0",borderRadius:10,border:"none",background:G.greenBg,color:G.green,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                Carica orari
              </button>
              <button onClick={()=>{deleteEntry(has.orari.key);reload();}}
                style={{padding:"13px 16px",borderRadius:10,border:"none",background:G.redBg,color:G.red,fontSize:14,cursor:"pointer"}}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          ) : (
            <button onClick={()=>{if(orariRef.current){orariRef.current.value="";orariRef.current.click();}}}
              style={{width:"100%",padding:"14px 0",borderRadius:10,border:"2px dashed "+G.glassBorder,background:"transparent",color:G.t2,fontSize:15,fontWeight:600,cursor:"pointer"}}>
              + Carica PDF orari GTT
            </button>
          )}
        </div>

        {/* Bottone usa mese — carica entrambi e vai al mese */}
        {(hasPr||hasOr) && (
          <button onClick={()=>{
            if(hasPr){const d=loadPrecoByKey(has.preco.key);if(d)onLoadPreco(d);}
            if(hasOr){const d=loadOrariByKey(has.orari.key);if(d&&Object.keys(d).length)onLoadOrari(d);}
            if(onGoToMonth) onGoToMonth(yr, selMonth);
          }}
          style={{width:"100%",padding:"14px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:800,cursor:"pointer",marginTop:4}}>
            Vai al mese →
          </button>
        )}
      </div>
    );
  }

  // Vista griglia mesi
  return (
    <div>
      <input ref={precoRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])onUploadPreco(e.target.files[0],reload);}}/>
      <input ref={orariRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])onUploadOrari(e.target.files[0],reload);}}/>

      {/* Selettore anno */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,marginBottom:18}}>
        <button onClick={()=>setYr(yr-1)} style={arrowBtn}>&lsaquo;</button>
        <span style={{fontSize:24,fontWeight:800,color:G.tw,minWidth:60,textAlign:"center"}}>{yr}</span>
        <button onClick={()=>setYr(yr+1)} style={arrowBtn}>&rsaquo;</button>
      </div>

      {/* Griglia mesi — 2 colonne, più spaziosa */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {months.map(item=>{
          const has=item.data,hasPr=has&&has.preco,hasOr=has&&has.orari;
          const isCurrentMonth=item.month===new Date().getMonth()+1&&yr===new Date().getFullYear();
          return (
            <div key={item.month}
              onClick={()=>setSelMonth(item.month)}
              style={{
                ...glassCard,
                padding:"16px 14px",
                borderColor:hasPr?G.accentBorder:G.glassBorder,
                borderWidth: isCurrentMonth?"2px":"1px",
                cursor:"pointer",
                position:"relative"
              }}>
              {isCurrentMonth && (
                <div style={{position:"absolute",top:8,right:8,fontSize:9,fontWeight:700,color:"#fff",background:"#003366",borderRadius:4,padding:"2px 5px",textTransform:"uppercase"}}>
                  Corrente
                </div>
              )}
              {/* Nome mese */}
              <div style={{fontSize:17,fontWeight:800,color:hasPr?G.tw:G.t2,marginBottom:10}}>
                {MESI_IT[item.month]}
              </div>
              {/* Indicatori stato */}
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:hasPr?"#003366":"#dce1e8",flexShrink:0}}/>
                  <span style={{fontSize:13,color:hasPr?G.tw:G.t3,fontWeight:hasPr?600:400}}>
                    {hasPr?"Preconoscenza ✓":"Preconoscenza —"}
                  </span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:hasOr?"#2e7d32":"#dce1e8",flexShrink:0}}/>
                  <span style={{fontSize:13,color:hasOr?G.green:G.t3,fontWeight:hasOr?600:400}}>
                    {hasOr?"Orari GTT ✓":"Orari GTT —"}
                  </span>
                </div>
              </div>
              {/* Freccia */}
              <div style={{position:"absolute",right:12,bottom:14,color:G.t3}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:16,textAlign:"center",color:G.t3,fontSize:13}}>Tocca un mese per caricare o gestire i documenti</div>
    </div>
  );
}

/* ===== APP ===== */
function App() {
  const fileRef1 = useRef(null), fileRef2 = useRef(null);
  const [tab, setTab] = useState("home");
  const [q, setQ] = useState("");
  const [res, setRes] = useState([]);
  const [msg, setMsg] = useState("");
  const [data, setData] = useState(null);
  const [devs, setDevs] = useState({});
  const [loading1, setLoading1] = useState(false);
  const [loading2, setLoading2] = useState(false);
  const [err, setErr] = useState("");
  const [det, setDet] = useState(null);
  const [overrides, setOverrides] = useState({});
  const [restored, setRestored] = useState(false);
  const [lastSearched, setLastSearched] = useState(null);
  const [calY, setCalY] = useState(null);
  const [calM, setCalM] = useState(null);
  const [calData, setCalData] = useState(null);
  const [calDevs, setCalDevs] = useState(null);
  const [showArchivio, setShowArchivio] = useState(false);

  /* Cache version check on mount */
  useEffect(()=>{
    if(restored)return;
    // Non cancellare più i dati al cambio versione parser — troppo distruttivo
    // Carica preconoscenza
    const d=loadLastPreco();
    if(d&&Object.keys(d.days).length){
      setData(d);
      if(d.dIn){
        const ok=orariKey(d.dIn.getFullYear(),d.dIn.getMonth()+1);
        const od=loadOrariByKey(ok);
        if(od&&Object.keys(od).length)setDevs(od);
        // Ripristina override (turni ballottaggio incollati)
        const ov=DB.get("ts_overrides_"+precoKey(d.dIn.getFullYear(),d.dIn.getMonth()+1));
        if(ov&&Object.keys(ov).length)setOverrides(ov);
      }
    }
    setRestored(true);
    checkPendingAlarms();
  },[restored]);

  const baseDays = data?data.days:{};
  const days = Object.assign({},baseDays,overrides);
  const refY = data&&data.dIn?data.dIn.getFullYear():new Date().getFullYear();
  const refM = data&&data.dIn?data.dIn.getMonth()+1:new Date().getMonth()+1;
  const nDevs = Object.keys(devs).length;
  const hasHistory = getHistory().length>0;
  const viewY = calY!==null?calY:refY;
  const viewM = calM!==null?calM:refM;
  const isCurrentMonth = (viewY===refY&&viewM===refM);

  useEffect(()=>{
    if(isCurrentMonth){setCalData(null);setCalDevs(null);return;}
    const pd=deserializePreco(DB.get(precoKey(viewY,viewM)));setCalData(pd);
    const od=DB.get(orariKey(viewY,viewM));setCalDevs(od&&Object.keys(od).length?od:null);
  },[viewY,viewM,isCurrentMonth]);

  const calDays = isCurrentMonth?days:(calData?Object.assign({},calData.days):{});
  const calDevsActive = isCurrentMonth?devs:(calDevs||{});

  function uploadPreco(file,cb){
    if(!file)return;
    setLoading1(true);setErr("");
    window._loadPdfJs(function(pdfjs){
      const reader=new FileReader();
      reader.onload=function(ev){
        pdfjs.getDocument({data:new Uint8Array(ev.target.result)}).promise.then(function(pdf){
          if(pdf.numPages>20){setErr("Questo sembra gli Orari Linee ("+pdf.numPages+" pag.), non la Preconoscenza.");setLoading1(false);if(cb)cb();return;}
          const pp=[];for(let i=1;i<=pdf.numPages;i++)pp.push(pdf.getPage(i).then(extractText));
          Promise.all(pp).then(function(texts){
            const r=parsePreconoscenza(texts.join("\n"));
            if(!Object.keys(r.days).length){setErr("Nessun turno trovato.");setLoading1(false);if(cb)cb();return;}
            setData(r);savePreco(r);saveRiposiCycle(r);setRes([]);setMsg("");setDet(null);setOverrides({});
            DB.set("ts_last_preco",precoKey(r.dIn.getFullYear(),r.dIn.getMonth()+1));
            if(r.dIn){const ok=orariKey(r.dIn.getFullYear(),r.dIn.getMonth()+1);const od=loadOrariByKey(ok);if(od&&Object.keys(od).length)setDevs(od);else setDevs({});}
            setLoading1(false);if(cb)cb(r);
          });
        }).catch(e=>{setErr("Errore: "+e.message);setLoading1(false);});
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function uploadOrari(file,cb){
    if(!file)return;
    setLoading2(true);setErr("Analisi PDF...");
    window._loadPdfJs(function(pdfjs){
      const reader=new FileReader();
      reader.onload=function(ev){
        pdfjs.getDocument({data:new Uint8Array(ev.target.result)}).promise.then(function(pdf){
          if(pdf.numPages<5){setErr("Questo sembra la Preconoscenza.");setLoading2(false);if(cb)cb();return;}
          var pp=[];
          for(var i=1;i<=pdf.numPages;i++) pp.push(pdf.getPage(i).then(extractText));
          Promise.all(pp).then(function(texts){
            var nd={},lastGt="";
            var zeroPages=[];
            texts.forEach(function(ft,idx){
              var gt="",ver="";
              var vm=ft.match(/gruppo\s+\S+\s*-\s*(.+?)\s*-\s*Versione\s+(\w+)/i);
              if(vm){gt=vm[1].trim();ver=vm[2].trim();}
              if(!gt){
                var h=ft.substring(0,800).toUpperCase();
                if(h.indexOf("MERCOLEDI")>=0)gt="MERCOLEDI'";
                else if(h.indexOf("FESTIVO")>=0)gt="FESTIVO";
                else if(h.indexOf("SABATO")>=0)gt="SABATO";
                else if(h.indexOf("LUN")>=0&&h.indexOf("VEN")>=0)gt="LUN - VEN";
                if(!gt&&ver){var v0=ver[0].toUpperCase();gt=v0==="S"?"SABATO":v0==="F"?"FESTIVO":"LUN - VEN";}
              }
              if(gt)lastGt=gt;else gt=lastGt;
              if(gt){
                var pd={};parseOrariPageLines(ft,gt,ver,pd);
                if(Object.keys(pd).length)mergeDevs(nd,pd);
                else if(ft.indexOf("PROGRAMMAZIONE")>=0||ft.indexOf("TURNI DEL")>=0){
                  // Pagina con tabella turni ma 0 match - problema pdf.js
                  zeroPages.push({p:idx+1,gt:gt,sample:ft.substring(0,50)});
                }
              }
            });
            var saved=false;
            if(Object.keys(nd).length){setDevs(nd);saved=saveOrari(nd,data||{dIn:new Date()});}
            var nTurni=Object.keys(nd).length;
            setLoading2(false);if(cb)cb();
            if(!nTurni)setErr("Nessun turno trovato.");
            else setErr("OK! "+nTurni+" turni caricati e salvati.");
          });
        }).catch(function(e){setErr("Errore: "+e.message);setLoading2(false);});
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function cerca(){
    if(!q.trim())return;
    const d=parseInput(q,refY);
    if(!d){setRes([]);setMsg("Formato non riconosciuto");setLastSearched(null);return;}
    setLastSearched(d);
    const is2=toIso(d);
    if(days[is2]){setRes([{date:d,v:days[is2]}]);setMsg("");}
    else{setRes([]);setMsg("Nessun dato per "+toFmt(d));}
  }
  function msgPerData(d){
    const lm=d.getMonth()+1,ly=d.getFullYear();
    if(lm!==refM||ly!==refY){
      const hasNext=DB.get(precoKey(ly,lm));
      if(!hasNext) return "MANCA_PRECO:"+lm+":"+ly;
    }
    return "nessun_turno";
  }

  function rapido(tipo){
    setMsg("");
    const oggi=new Date();
    if(tipo==="oggi"){
      // Ricarica gli orari del mese corrente se devs è vuoto o è del mese sbagliato
      if(data&&data.dIn){
        const ok=orariKey(data.dIn.getFullYear(),data.dIn.getMonth()+1);
        const od=loadOrariByKey(ok);
        if(od&&Object.keys(od).length&&od!==devs)setDevs(od);
      }
      setLastSearched(oggi);
      const is2=toIso(oggi);
      if(days[is2])setRes([{date:oggi,v:days[is2]}]);
      else{setRes([]);setMsg(msgPerData(oggi));}
    }
    else if(tipo==="domani"){
      const d2=new Date();d2.setDate(d2.getDate()+1);
      setLastSearched(d2);
      const is3=toIso(d2);
      if(days[is3])setRes([{date:d2,v:days[is3]}]);
      else{setRes([]);setMsg(msgPerData(d2));}
    }
    else if(tipo==="week"){
      const r=[];
      for(let j=0;j<7;j++){
        const dd=new Date();dd.setDate(dd.getDate()+j);
        const ii=toIso(dd);
        if(days[ii]) r.push({date:dd,v:days[ii]});
        // Se il giorno è in un mese diverso senza preconoscenza, aggiungi placeholder
        else{
          const lm=dd.getMonth()+1,ly=dd.getFullYear();
          if((lm!==refM||ly!==refY)&&!DB.get(precoKey(ly,lm))){
            r.push({date:dd,v:null,missingPreco:true,month:lm,year:ly});
          }
        }
      }
      setRes(r);
      if(r.length>0)setLastSearched(r[r.length-1].date);
      else{const dd7=new Date();dd7.setDate(dd7.getDate()+6);setLastSearched(dd7);setMsg(msgPerData(dd7));}
    }
  }
  function resetAll(){setData(null);setRes([]);setMsg("");setDet(null);setErr("");setDevs({});if(fileRef1.current)fileRef1.current.value="";if(fileRef2.current)fileRef2.current.value="";}
  // Carica preconoscenza — rimane nello storico, carica orari se disponibili
  function onLoadPreco(d){
    setData(d);
    setRes([]);setMsg("");setDet(null);setOverrides({});
    DB.set("ts_last_preco",precoKey(d.dIn.getFullYear(),d.dIn.getMonth()+1));
    if(d.dIn){
      const ok=orariKey(d.dIn.getFullYear(),d.dIn.getMonth()+1);
      const od=loadOrariByKey(ok);
      setDevs(od&&Object.keys(od).length ? od : {});
    } else {
      setDevs({});
    }
    // NON cambia tab — resta nello Storico
  }

  // Carica orari — rimane nello storico
  function onLoadOrari(d){
    if(!d||!Object.keys(d).length){return;}
    setDevs(d);
    setRes([]);setMsg("");
    // NON cambia tab — resta nello Storico
  }

  // Vai al mese caricato nella vista Mese
  function goToLoadedMonth(d){
    if(!d||!d.dIn){setTab("mese");return;}
    setCalY(d.dIn.getFullYear());
    setCalM(d.dIn.getMonth()+1);
    setDet(null);
    setTab("mese");
  }
  function onPasteTurno(iso,v){
    setOverrides(ov=>{
      const next=Object.assign({},ov,{[iso]:v});
      // Salva persistentemente
      if(data&&data.dIn){
        DB.set("ts_overrides_"+precoKey(data.dIn.getFullYear(),data.dIn.getMonth()+1),next);
      }
      return next;
    });
    setRes(r=>r.map(function(item){
      return toIso(item.date)===iso?{date:item.date,v:v}:item;
    }));
  }

  const inp={width:"100%",padding:"12px 16px",borderRadius:8,border:"2px solid #d0d7de",background:"#ffd100",color:"#1a1a2e",fontSize:17,outline:"none",boxSizing:"border-box"};
  const qb={flex:1,padding:"10px 2px",borderRadius:8,border:"1px solid #d0d7de",background:"#ffd100",color:"#003366",fontSize:14,fontWeight:700,cursor:"pointer"};
  const tbS=n=>({flex:1,padding:"12px 0",textAlign:"center",fontSize:15,fontWeight:700,background:tab===n?"#003366":"#ffffff",color:tab===n?"#ffd100":"#003366",border:"1px solid "+(tab===n?"#003366":"#d0d7de"),borderRadius:8,cursor:"pointer"});

  const ballCount = Object.keys(days).filter(k=>days[k]&&days[k].t==="RIS").length;

  return (
    <div style={{minHeight:"100vh",background:"#f4f6f9",color:"#1a1a2e",fontFamily:"'Segoe UI','SF Pro Display',-apple-system,sans-serif"}}>

      {/* Header — identico v4.3 */}
      <div style={{background:"#003366",padding:"10px 18px",display:"flex",alignItems:"center",gap:12,borderBottom:"3px solid #ffd100",boxShadow:"0 2px 12px rgba(0,51,102,0.20)"}}>
        <svg width="44" height="44" viewBox="0 0 64 64" fill="none">
          <path d="M8 20l12-8 14 6 14-6 12 8v28l-12 8-14-6-14 6L8 48V20z" fill="#e8d44d" stroke="#c4a82a" strokeWidth="1"/>
          <path d="M20 12l14 6v36l-14-6V12z" fill="#b8c94a" stroke="#8fa03a" strokeWidth="0.5"/>
          <path d="M34 18l14-6v36l-14 6V18z" fill="#d4cc5a" stroke="#b0a83a" strokeWidth="0.5"/>
          <path d="M32 6c-6.6 0-12 5-12 11.2C20 25.6 32 38 32 38s12-12.4 12-20.8C44 11 38.6 6 32 6z" fill="#003366"/>
          <circle cx="32" cy="17" r="7.5" fill="#ffffff"/>
          <rect x="26" y="12.5" width="12" height="8" rx="2" fill="#003366"/>
          <rect x="27" y="14" width="4.5" height="3" rx="0.8" fill="#89b4e8"/>
          <rect x="32.5" y="14" width="4.5" height="3" rx="0.8" fill="#89b4e8"/>
          <circle cx="28.5" cy="22" r="1.2" fill="#003366"/>
          <circle cx="35.5" cy="22" r="1.2" fill="#003366"/>
        </svg>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:24,fontWeight:800,color:"#ffffff",letterSpacing:"-0.02em"}}>Turni Smart</span>
            <span style={{fontSize:11,color:"rgba(255,255,255,0.5)",fontWeight:500}}>v5</span>
          </div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.65)",fontWeight:500,marginTop:1}}>Gestione turni GTT &mdash; Deposito Gerbido</div>
        </div>
      </div>

      <div style={{maxWidth:460,margin:"0 auto",padding:"16px 16px"}}>
        <input ref={fileRef1} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])uploadPreco(e.target.files[0]);}}/>
        <input ref={fileRef2} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])uploadOrari(e.target.files[0]);}}/>

        {/* Card autista — gialla, identica v4.3 */}
        <div style={{background:"#ffd100",borderRadius:"10px",boxShadow:"0 1px 4px rgba(0,0,0,0.10)",padding:"16px 18px",marginBottom:14}}>
          {data ? (
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <svg width="46" height="46" viewBox="0 0 64 64" fill="none" style={{flexShrink:0}}>
                <path d="M8 20l12-8 14 6 14-6 12 8v28l-12 8-14-6-14 6L8 48V20z" fill="#e8d44d" stroke="#c4a82a" strokeWidth="1"/>
                <path d="M20 12l14 6v36l-14-6V12z" fill="#b8c94a"/>
                <path d="M34 18l14-6v36l-14 6V18z" fill="#d4cc5a"/>
                <path d="M32 6c-6.6 0-12 5-12 11.2C20 25.6 32 38 32 38s12-12.4 12-20.8C44 11 38.6 6 32 6z" fill="#003366"/>
                <circle cx="32" cy="17" r="7" fill="#fff"/>
                <rect x="26.5" y="13" width="11" height="7.5" rx="2" fill="#003366"/>
                <rect x="27.5" y="14.2" width="4" height="2.8" rx="0.8" fill="#89b4e8"/>
                <rect x="32.5" y="14.2" width="4" height="2.8" rx="0.8" fill="#89b4e8"/>
                <circle cx="29" cy="21.8" r="1.1" fill="#003366"/>
                <circle cx="35" cy="21.8" r="1.1" fill="#003366"/>
              </svg>
              <div style={{flex:1}}>
                <div style={{color:"#003366",fontWeight:800,fontSize:20}}>{data.nome||"Autista"}</div>
                <div style={{color:"#003366",fontSize:15,fontWeight:700,marginTop:2}}>N. caratteristico {data.matricola||""}</div>
                {data.dIn&&data.dTe&&<div style={{color:"#5a4500",fontSize:14,marginTop:2}}>{toFmt(data.dIn)} &mdash; {toFmt(data.dTe)}</div>}
              </div>
            </div>
          ) : (
            <div>
              <div style={{fontSize:22,fontWeight:800,color:"#003366"}}>Turni Smart</div>
              <div style={{fontSize:14,color:"#5a4500",marginTop:2}}>Gestione turni GTT &mdash; Deposito Gerbido</div>
            </div>
          )}
        </div>

        {err && <div style={Object.assign({},glassCard,{padding:"12px 16px",marginBottom:10,borderColor:err.startsWith("OK")?"rgba(27,122,61,0.25)":"rgba(239,83,80,0.25)",color:err.startsWith("OK")?G.green:G.red,fontSize:14,whiteSpace:"pre-wrap"})}>{err}</div>}

        {!data && tab!=="storico" ? (
          <div>
            <div onClick={()=>{if(!loading1&&fileRef1.current)fileRef1.current.click();}} style={Object.assign({},glassCard,{padding:"28px 20px",textAlign:"center",cursor:loading1?"wait":"pointer",marginBottom:14})}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={loading1?G.accent:G.tw} strokeWidth="1.5" style={{marginBottom:6}}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
              <div style={{fontSize:17,fontWeight:600,color:loading1?G.accent:G.tw,marginBottom:3}}>{loading1?"Analisi in corso...":"Carica Preconoscenza"}</div>
              <div style={{color:G.t3,fontSize:14}}>PDF mensile turni personali</div>
            </div>
            {hasHistory ? (
              <div>
                <div style={{fontSize:15,fontWeight:600,color:G.tw,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={G.accent} strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  Storico documenti
                </div>
                <Storico onLoadPreco={onLoadPreco} onLoadOrari={onLoadOrari} onUploadPreco={uploadPreco} onUploadOrari={uploadOrari} onGoToMonth={(y,m)=>{setCalY(y);setCalM(m);setDet(null);setTab("mese");}}/>
              </div>
            ) : <div style={{textAlign:"center",padding:"20px 0",color:G.t3,fontSize:14}}>Carica una preconoscenza per iniziare.</div>}
          </div>
        ) : (
          <div>
            {/* Banner orari */}
            {nDevs>0 ? (
              <div style={{display:"flex",gap:6,marginBottom:12}}>
                <div style={Object.assign({},glassCard,{flex:1,padding:"10px 14px",fontSize:15,display:"flex",justifyContent:"space-between",alignItems:"center",borderColor:G.greenBorder})}>
                  <span style={{color:G.green,fontWeight:600}}>Orari GTT: {nDevs} turni</span>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>{setDevs({});if(data&&data.dIn){DB.del(orariKey(data.dIn.getFullYear(),data.dIn.getMonth()+1));}if(fileRef2.current){fileRef2.current.value="";fileRef2.current.click();}}} style={{padding:"2px 8px",borderRadius:6,border:"1px solid "+G.accentBorder,background:G.accentGlass,color:G.accent,fontSize:12,fontWeight:600,cursor:"pointer"}}>Ricarica</button>
                    <button onClick={()=>setDevs({})} style={{padding:"2px 8px",borderRadius:6,border:"1px solid "+G.cardBorder,background:"transparent",color:G.t3,fontSize:12,cursor:"pointer"}}>&times;</button>
                  </div>
                </div>
                <button onClick={resetAll} style={{padding:"8px 14px",borderRadius:G.rs,border:"1px solid "+G.cardBorder,background:"transparent",color:G.red,fontSize:13,fontWeight:600,cursor:"pointer"}}>Reset</button>
              </div>
            ) : (
              <div style={{marginBottom:12}}>
                <div onClick={()=>{if(!loading2&&fileRef2.current)fileRef2.current.click();}} style={Object.assign({},glassCard,{padding:"24px 20px",textAlign:"center",cursor:loading2?"wait":"pointer",borderStyle:"dashed"})}>
                  <div style={{fontSize:17,fontWeight:600,color:loading2?G.accent:G.tw,marginBottom:5}}>{loading2?"Analisi in corso...":"Carica Orari Linee GTT"}</div>
                  <div style={{color:G.t2,fontSize:15}}>PDF con lo sviluppo turni del deposito</div>
                </div>
                <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                  <button onClick={resetAll} style={{padding:"6px 14px",borderRadius:G.rs,border:"1px solid "+G.cardBorder,background:"transparent",color:G.red,fontSize:13,fontWeight:600,cursor:"pointer"}}>Reset</button>
                </div>
              </div>
            )}

            {/* Tab bar — stile v4.3 */}
            <div style={{display:"flex",gap:4,marginBottom:14}}>
              {[
                {id:"home",    label:"Turni"},
                {id:"mese",    label:"Mese"},
                {id:"riposi",  label:"Riposi"},
                ...(nDevs>0 ? [{id:"linee", label:"Linee"}] : [])
              ].map(t=>(
                <button key={t.id} style={tbS(t.id)} onClick={()=>{setTab(t.id);if(t.id==="mese")setDet(null);}}>
                  {t.label}
                </button>
              ))}
            </div>

            {/* Banner ballottaggi */}
            {ballCount>0 && (
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",marginBottom:12,borderRadius:10,background:"rgba(255,209,0,0.15)",border:"1px solid rgba(255,209,0,0.40)"}}>
                <span style={{color:"#003366",fontSize:14,fontWeight:700}}>{ballCount} ballottaggi</span>
                <button onClick={()=>downloadBallottaggiICS(data)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:G.red,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Salva su Calendario</button>
              </div>
            )}

            {/* Tab: Turni (ex Home) */}
            {tab==="home" && (
              <div>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <input style={Object.assign({},inp,{flex:1,fontSize:16,padding:"12px 14px"})} placeholder="es. 5 marzo, 05/03" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")cerca();}}/>
                  <button onClick={cerca} style={{padding:"0 18px",borderRadius:8,border:"none",background:"#ffd100",color:"#003366",fontWeight:800,fontSize:18,cursor:"pointer"}}>&rarr;</button>
                </div>
                <div style={{display:"flex",gap:5,marginBottom:14}}>
                  <button style={qb} onClick={()=>rapido("oggi")}>Oggi</button>
                  <button style={qb} onClick={()=>rapido("domani")}>Domani</button>
                  <button style={qb} onClick={()=>rapido("week")}>Settimana</button>
                </div>
                {msg && (()=>{
                  if(msg.startsWith("MANCA_PRECO:")){
                    const parts=msg.split(":");
                    const lm=parseInt(parts[1]),ly=parseInt(parts[2]);
                    return (
                      <div style={{padding:"14px 16px",borderRadius:12,background:"rgba(0,51,102,0.05)",border:"2px dashed #003366",marginBottom:10}}>
                        <div style={{fontSize:15,fontWeight:700,color:"#003366",marginBottom:4}}>
                          📄 Preconoscenza {MESI_IT[lm]} {ly} non caricata
                        </div>
                        <div style={{fontSize:14,color:G.t2,marginBottom:12}}>
                          Per vedere i tuoi turni di {MESI_IT[lm]} carica il PDF del nuovo mese.
                        </div>
                        <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                          style={{width:"100%",padding:"12px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:800,cursor:"pointer"}}>
                          Carica Preconoscenza {MESI_IT[lm]} {ly}
                        </button>
                      </div>
                    );
                  }
                  return <div style={Object.assign({},glassCard,{padding:"10px 14px",marginBottom:10,fontSize:15,color:G.t2})}>{msg==="nessun_turno"?"Nessun turno trovato per questa data":msg}</div>;
                })()}
                {(()=>{
                  if(!res.length) return null;
                  const items=[];
                  let lastMonth=-1;
                  let shownMissingBanner={};
                  res.forEach((r,i)=>{
                    const m=r.date.getMonth()+1, y=r.date.getFullYear();
                    // Separatore cambio mese
                    if(m!==lastMonth){
                      if(lastMonth!==-1){
                        items.push(
                          <div key={"sep-"+i} style={{display:"flex",alignItems:"center",gap:8,margin:"10px 0 6px"}}>
                            <div style={{flex:1,height:2,background:"linear-gradient(90deg,#003366 0%,transparent 100%)"}}/>
                            <span style={{fontSize:13,fontWeight:700,color:"#003366",background:"#f4f6f9",padding:"2px 10px",borderRadius:10,whiteSpace:"nowrap"}}>
                              {MESI_IT[m]} {y}
                            </span>
                            <div style={{flex:1,height:2,background:"linear-gradient(90deg,transparent 0%,#003366 100%)"}}/>
                          </div>
                        );
                      }
                      lastMonth=m;
                      // Banner carica preconoscenza per mese senza dati
                      const bannerKey=y+"-"+m;
                      if(r.missingPreco && !shownMissingBanner[bannerKey]){
                        shownMissingBanner[bannerKey]=true;
                        items.push(
                          <div key={"banner-"+bannerKey} style={{padding:"14px 16px",borderRadius:12,background:"rgba(0,51,102,0.05)",border:"2px dashed #003366",marginBottom:10}}>
                            <div style={{fontSize:15,fontWeight:700,color:"#003366",marginBottom:4}}>
                              📄 Preconoscenza {MESI_IT[m]} {y}
                            </div>
                            <div style={{fontSize:14,color:G.t2,marginBottom:10}}>
                              Carica il PDF per vedere i tuoi turni di {MESI_IT[m]}.
                            </div>
                            <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                              style={{width:"100%",padding:"11px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:800,cursor:"pointer"}}>
                              Carica Preconoscenza {MESI_IT[m]} {y}
                            </button>
                          </div>
                        );
                        return; // non aggiungere la card per questo giorno
                      }
                      if(r.missingPreco) return;
                    } else if(r.missingPreco) return;

                    items.push(<Card key={toIso(r.date)} date={r.date} v={r.v} devs={devs} allDays={days} onPaste={onPasteTurno}/>);
                  });
                  return items;
                })()}
                {/* Banner se la data cercata è in un mese senza preconoscenza */}
                {(()=>{
                  const checkDate = res.length>0 ? res[res.length-1].date : lastSearched;
                  if(!checkDate) return null;
                  const lm=checkDate.getMonth()+1, ly=checkDate.getFullYear();
                  if(lm===refM && ly===refY) return null;
                  const hasNextData = DB.get(precoKey(ly,lm));
                  if(hasNextData) return null;
                  return (
                    <div style={{marginTop:10,padding:"14px 16px",borderRadius:12,background:"rgba(0,51,102,0.06)",border:"2px dashed #003366"}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#003366",marginBottom:4}}>
                        📄 Preconoscenza {MESI_IT[lm]} {ly} non caricata
                      </div>
                      <div style={{fontSize:14,color:G.t2,marginBottom:12}}>
                        Per vedere i turni di {MESI_IT[lm]} devi caricare il PDF del nuovo mese.
                      </div>
                      <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                        style={{width:"100%",padding:"12px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:800,cursor:"pointer"}}>
                        Carica Preconoscenza {MESI_IT[lm]} {ly}
                      </button>
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Tab: Mese */}
            {tab==="mese" && (
              <div>
                {/* Navigazione mese */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:12}}>
                  <button onClick={()=>{let nm=viewM-1,ny=viewY;if(nm<1){nm=12;ny--;}setCalY(ny);setCalM(nm);setDet(null);}} style={{padding:"8px 14px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:18,fontWeight:700,cursor:"pointer"}}>&lsaquo;</button>
                  <div style={{textAlign:"center",minWidth:130}}>
                    <div style={{fontSize:19,fontWeight:700,color:G.tw}}>{MESI_IT[viewM]} {viewY}</div>
                    {!isCurrentMonth && <button onClick={()=>{setCalY(null);setCalM(null);setDet(null);}} style={{fontSize:12,color:G.accent,background:"transparent",border:"none",cursor:"pointer",marginTop:2}}>Torna a {MESI_IT[refM]} {refY}</button>}
                  </div>
                  <button onClick={()=>{let nm=viewM+1,ny=viewY;if(nm>12){nm=1;ny++;}setCalY(ny);setCalM(nm);setDet(null);}} style={{padding:"8px 14px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:18,fontWeight:700,cursor:"pointer"}}>&rsaquo;</button>
                </div>

                {/* Bottone Oggi */}
                <button onClick={()=>{setTab("home");rapido("oggi");}} style={{width:"100%",marginBottom:10,padding:"9px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                  {<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",verticalAlign:"middle",marginRight:5}}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>} Vai a Oggi
                </button>

                {/* Indicatori stato documenti mese */}
                {(()=>{
                  const hasPr=Object.keys(calDays).length>0;
                  const hasOr=Object.keys(calDevsActive).length>0;
                  const precoStored=DB.get(precoKey(viewY,viewM));
                  const orariStored=isCurrentMonth?Object.keys(devs).length>0:!!DB.get(orariKey(viewY,viewM));
                  return (
                    <div style={{display:"flex",gap:8,marginBottom:10}}>
                      {/* Stato preconoscenza */}
                      <div style={{flex:1,padding:"10px 12px",borderRadius:10,background:hasPr?"#eef3ff":"#f4f6f9",border:"1px solid "+(hasPr?"#c5d5f5":"#e0e5ec"),display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:hasPr?"#003366":"#d0d7de",flexShrink:0}}/>
                        <div>
                          <div style={{fontSize:11,fontWeight:700,color:hasPr?"#003366":"#8a9ab0",textTransform:"uppercase",letterSpacing:"0.04em"}}>Preconoscenza</div>
                          <div style={{fontSize:12,color:hasPr?"#003366":"#aab5c2",fontWeight:600}}>{hasPr?"Caricata":"Non caricata"}</div>
                        </div>
                      </div>
                      {/* Stato orari */}
                      <div style={{flex:1,padding:"10px 12px",borderRadius:10,background:hasOr?"#f0faf0":"#f4f6f9",border:"1px solid "+(hasOr?"#a5d6a7":"#e0e5ec"),display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:hasOr?"#2e7d32":"#d0d7de",flexShrink:0}}/>
                        <div>
                          <div style={{fontSize:11,fontWeight:700,color:hasOr?"#2e7d32":"#8a9ab0",textTransform:"uppercase",letterSpacing:"0.04em"}}>Orari GTT</div>
                          <div style={{fontSize:12,color:hasOr?"#2e7d32":"#aab5c2",fontWeight:600}}>{hasOr?"Caricati":"Non caricati"}</div>
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {/* Bottoni caricamento documenti */}
                {(()=>{
                  const hasPr=Object.keys(calDays).length>0;
                  const hasOr=Object.keys(calDevsActive).length>0;
                  return (
                    <div style={{display:"flex",gap:8,marginBottom:12}}>
                      <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                        style={{flex:1,padding:"10px 0",borderRadius:10,border:"2px dashed "+(hasPr?"#003366":"#c5d5f5"),background:hasPr?"transparent":"#f8faff",color:"#003366",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        {hasPr?"Ricarica turni":"+ Preconoscenza"}
                      </button>
                      <button onClick={()=>{if(fileRef2.current){fileRef2.current.value="";fileRef2.current.click();}}}
                        style={{flex:1,padding:"10px 0",borderRadius:10,border:"2px dashed "+(hasOr?"#2e7d32":"#a5d6a7"),background:hasOr?"transparent":"#f0faf0",color:"#2e7d32",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                        {hasOr?"Ricarica orari":"+ Orari GTT"}
                      </button>
                    </div>
                  );
                })()}

                {/* Calendario e turno dettaglio */}
                {(()=>{
                  const rc=loadRiposiCycle(),riposiSet=rc?projectRiposi(rc,viewY,viewM):{};
                  const hasDays=Object.keys(calDays).length>0,hasRiposi=Object.keys(riposiSet).length>0;
                  if(!hasDays&&!hasRiposi) return (
                    <div style={{textAlign:"center",padding:"30px 0",color:G.t2}}>
                      <div style={{fontSize:15,fontWeight:600,color:G.tw,marginBottom:4}}>Nessun turno per {MESI_IT[viewM]} {viewY}</div>
                      <div style={{fontSize:13}}>Carica la preconoscenza PDF qui sopra</div>
                    </div>
                  );
                  return(
                    <div>
                      <Grid days={calDays} yr={viewY} mo={viewM} riposiSet={riposiSet} onTap={(d,v)=>setDet({date:d,v:v})}/>
                      {!hasDays&&hasRiposi&&<div style={{fontSize:12,color:G.t3,marginTop:4,textAlign:"center"}}>Riposi proiettati (ciclo {rc.cycle} giorni)</div>}
                      {det&&<div style={{marginTop:12}}><Card date={det.date} v={det.v} devs={calDevsActive} allDays={calDays} onPaste={onPasteTurno}/></div>}
                    </div>
                  );
                })()}
              </div>
            )}

            {tab==="riposi" && (()=>{
              const rc=loadRiposiCycle();
              if(!rc){
                return (
                  <div style={{textAlign:"center",padding:"40px 20px",color:G.t2}}>
                    <div style={{marginBottom:12}}><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#8a9ab0" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
                    <div style={{fontSize:16,fontWeight:700,color:G.tw,marginBottom:8}}>Nessun ciclo riposi rilevato</div>
                    <div style={{fontSize:14,color:G.t2,lineHeight:1.5}}>Carica una preconoscenza con almeno due riposi consecutivi per proiettare il calendario annuale</div>
                  </div>
                );
              }
              // Proietta riposi per i prossimi 12 mesi
              const oggi2=new Date();
              const months=[];
              for(let mi=0;mi<12;mi++){
                let mm=oggi2.getMonth()+mi;
                let yy=oggi2.getFullYear()+Math.floor(mm/12);
                mm=mm%12+1;
                const riposiM=projectRiposi(rc,yy,mm);
                const dates=Object.keys(riposiM).sort();
                if(dates.length>0) months.push({y:yy,m:mm,dates});
              }
              return (
                <div>
                  <div style={{fontSize:15,fontWeight:600,color:G.t2,marginBottom:16,textAlign:"center"}}>
                    Riposi proiettati · ciclo ogni {rc.cycle} giorni
                  </div>
                  {months.map(({y,m,dates})=>(
                    <div key={y+"-"+m} style={{marginBottom:18}}>
                      <div style={{fontSize:15,fontWeight:800,color:G.tw,marginBottom:8,letterSpacing:"0.03em",textTransform:"uppercase"}}>
                        {MESI_IT[m]} {y}
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {dates.map(iso=>{
                          const d=new Date(iso+"T00:00:00");
                          const wd=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][d.getDay()];
                          const isToday=iso===toIso(new Date());
                          return (
                            <div key={iso} style={{
                              padding:"6px 12px",borderRadius:10,
                              background:isToday?"#003366":"#f4f6f9",
                              color:isToday?"#ffd100":G.tw,
                              fontSize:15,fontWeight:700,
                              border:isToday?"2px solid #003366":"1px solid #e0e5ec"
                            }}>
                              {wd} {d.getDate()}/{p2(m)}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              );
            })()}
            {tab==="linee" && nDevs>0 && <LineeBrowser devs={devs}/>}

          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

</body>
</html>
