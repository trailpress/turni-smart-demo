}


/* ===== GRID ===== */
function Grid({days, yr, mo, riposiSet, onTap}) {
  let off = new Date(yr,mo-1,1).getDay(); off = off===0?6:off-1;
  const nd = new Date(yr,mo,0).getDate();
  const cells = [];
  for(let i=0;i<off;i++) cells.push(0);
  for(let i=1;i<=nd;i++) cells.push(i);
  const todayStr = toIso(new Date());
  const WK_SHORT = ["L","M","M","G","V","S","D"];
  return (
    <div>
      {/* Intestazione giorni — minimale */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
        {WK_SHORT.map((w,i)=>(
          <div key={i} style={{textAlign:"center",fontSize:11,fontWeight:500,
            color: i>=5 ? "#c62828" : "#b0b8c8",
            padding:"4px 0",letterSpacing:"0.02em"}}>
            {w}
          </div>
        ))}
      </div>
      {/* Celle giorni */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((day,idx)=>{
          if(!day) return <div key={"e"+idx}/>;
          const dt=new Date(yr,mo-1,day),is2=toIso(dt),v=days[is2];
          const isProjRest=!v&&riposiSet&&riposiSet[is2];
          const today=is2===todayStr;
          const isSatSun=(idx%7)>=5;

          // Determina tipo cella
          let type="empty";
          if(today) type="today";
          else if(v&&v.t==="turno") type="turno";
          else if(v&&v.t==="RIS") type="ballottaggio";
          else if(v&&REST_CODES[v.t]) type="riposo";
          else if(v) type="altro";
          else if(isProjRest) type="riposo_proj";

          const styles = {
            today:       {bg:"#003366", cl:"#ffd100", fw:800, radius:"50%", shadow:"0 2px 8px rgba(0,51,102,0.35)"},
            turno:       {bg:"#003366", cl:"#fff",    fw:700, radius:"10px", shadow:"none"},
            ballottaggio:{bg:"#c62828", cl:"#fff",    fw:700, radius:"10px", shadow:"none"},
            riposo:      {bg:"#ffd100", cl:"#003366", fw:700, radius:"10px", shadow:"none"},
            riposo_proj: {bg:"rgba(255,209,0,0.2)", cl:"#a08010", fw:500, radius:"10px", shadow:"none"},
            altro:       {bg:"#f0f2f5", cl:"#5a6b80", fw:600, radius:"10px", shadow:"none"},
            empty:       {bg:"transparent", cl: isSatSun?"#d0a0a0":"#c8d0dc", fw:400, radius:"10px", shadow:"none"},
          };
          const s = styles[type];

          return (
            <div key={idx}
              onClick={()=>{if(v)onTap(dt,v);else if(isProjRest)onTap(dt,{t:"RP",g:"",x:"Riposo previsto"});}}
              style={{
                textAlign:"center",
                fontSize: today?16:14,
                padding:"0",
                borderRadius:s.radius,
                color:s.cl,
                fontWeight:s.fw,
                background:s.bg,
                cursor:(v||isProjRest)?"pointer":"default",
                height:40,
                display:"flex",
                flexDirection:"column",
                alignItems:"center",
                justifyContent:"center",
                boxShadow: today ? s.shadow : s.shadow,
                outline: today ? "3px solid #ffd100" : "none",
                outlineOffset: today ? "1px" : "0",
                animation: today ? "todayPulse 1.4s step-start infinite" : "none",
                zIndex: today ? 2 : "auto",
                position:"relative",
                transition:"opacity 0.15s",
              }}>
              {day}
              {/* Dot indicatore turno spezzato */}
              {v&&v.t==="turno"&&v.n&&parseInt(v.n)<100&&(
                <div style={{position:"absolute",bottom:3,width:4,height:4,borderRadius:"50%",background:"#e65100"}}/>
              )}
            </div>
          );
        })}
      </div>
      {/* Legenda compatta in basso */}
      <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:12}}>
        {[
          {bg:"#003366",cl:"#ffd100",label:"Oggi",radius:"50%",size:14},
          {bg:"#003366",cl:"#fff",label:"Turno",radius:"6px"},
          {bg:"#ffd100",cl:"#003366",label:"Riposo",radius:"6px"},
          {bg:"#c62828",cl:"#fff",label:"Ballott.",radius:"6px"},
        ].map(({bg,cl,label,radius,size})=>(
          <div key={label} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:size||12,height:size||12,borderRadius:radius,background:bg,
              display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            </div>
            <span style={{fontSize:11,color:"#b0b8c8",fontWeight:500}}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ===== LINEE BROWSER ===== */
function LineeBrowser({devs}) {
  const [linea, setLinea] = useState("");
  const [turno, setTurno] = useState("");
  const [gt, setGt] = useState(()=>{const d=new Date().getDay();return d===0?"FEST":d===6?"SAB":"LV";});

  const lineMap = {};
  Object.keys(devs).forEach(code=>{
    const parts=code.split(" ");if(parts.length!==2)return;
    const ln=parts[0]; // già normalizzato (es. "02")
    if(!lineMap[ln])lineMap[ln]=[];lineMap[ln].push(code);
    (devs[code]||[]).forEach(s=>{
      if(s.ln&&s.ln!==ln){
        // Normalizza anche la variante linea
        var vln=String(parseInt(s.ln)||s.ln).padStart(2,"0");
        if(!lineMap[vln])lineMap[vln]=[];
        if(!lineMap[vln].includes(code))lineMap[vln].push(code);
        // Anche la variante raw (es. "38B")
        if(s.ln!==vln){if(!lineMap[s.ln])lineMap[s.ln]=[];if(!lineMap[s.ln].includes(code))lineMap[s.ln].push(code);}
      }
    });
  });
  const lineNums = Object.keys(lineMap).sort((a,b)=>{const na=parseInt(a),nb=parseInt(b);if(isNaN(na)&&isNaN(nb))return a.localeCompare(b);if(isNaN(na))return 1;if(isNaN(nb))return -1;return na!==nb?na-nb:a.localeCompare(b);});
  const turniForLine = (linea?lineMap[linea]||[]:[ ]).slice().sort();

  function filterSegs(segs) {
    if(!segs||!segs.length)return[];
    if(gt==="ALL")return segs.slice().sort((a,b)=>hm2min(a.start)-hm2min(b.start));
    const f=segs.filter(s=>{
      const g=(s.gt||"").toUpperCase();if(!g)return true;
      const isLV=g.includes("LUN")||g.includes("MAR")||g.includes("MER")||g.includes("GIO")||g.includes("VEN")||g.includes("FERIALE")||g.includes("FERIALI");
      if(gt==="LV")return isLV;if(gt==="SAB")return g.includes("SAB");return g.includes("FEST")||g.includes("DOM")||g.includes("DOMENICA");
    });
    return f.sort((a,b)=>hm2min(a.start)-hm2min(b.start));
  }
  function lineLabel(ln){if(/B$/.test(ln))return ln.replace(/B$/,"/");if(/[A-Z]$/.test(ln)&&ln.length>1)return ln.replace(/[A-Z]$/,"/");const n=parseInt(ln);return isNaN(n)?ln:String(n);}

  const selStyle={width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid "+G.glassBorder,background:"#ffffff",color:G.tw,fontSize:17,outline:"none",appearance:"none",WebkitAppearance:"none"};

  return (
    <div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:14,color:G.t3,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.04em"}}>Seleziona linea</div>
        <select value={linea} onChange={e=>{setLinea(e.target.value);setTurno("");}} style={selStyle}>
          <option value="">-- Scegli linea --</option>
          {lineNums.map(ln=><option key={ln} value={ln}>Linea {lineLabel(ln)} ({lineMap[ln].length} turni)</option>)}
        </select>
      </div>
      {linea ? (
        <div>
          <div style={{display:"flex",gap:4,marginBottom:12}}>
            {["LV","SAB","FEST","ALL"].map(d=>(
              <button key={d} onClick={()=>setGt(d)} style={{flex:1,padding:"8px 0",borderRadius:10,border:gt===d?"1px solid "+G.accentBorder:"1px solid "+G.cardBorder,background:gt===d?G.accentGlass:"transparent",color:gt===d?G.accent:G.t2,fontSize:14,fontWeight:600,cursor:"pointer"}}>
                {d==="LV"?"Lun-Ven":d==="SAB"?"Sabato":d==="FEST"?"Festivo":"Tutti"}
              </button>
            ))}
          </div>
          <select value={turno} onChange={e=>setTurno(e.target.value)} style={Object.assign({},selStyle,{marginBottom:12})}>
            <option value="">Tutti i turni linea {lineLabel(linea)}</option>
            {turniForLine.map(code=><option key={code} value={code}>{code}</option>)}
          </select>
          {(()=>{
            const items=turno?[turno]:turniForLine;
            let visibleCount=0;
            const cards=items.map(code=>{
              const segs=devs[code]||[],filtered=filterSegs(segs);
              if(!filtered.length)return null;
              visibleCount++;
              return <LineeCard key={code+gt} code={code} segs={filtered} isSpezz={isRealSpezzato(filtered)} hasMulti={filtered.length>1}/>;
            });
            return (
              <div>
                {visibleCount>0 && <div style={{fontSize:13,color:G.t2,marginBottom:8,fontWeight:600}}>{visibleCount} turni {gt==="LV"?"feriali":gt==="SAB"?"sabato":gt==="FEST"?"festivi":"totali"}</div>}
                {cards}
                {visibleCount===0 && (
                  <div style={{textAlign:"center",padding:"20px 0"}}>
                    <div style={{color:"#c62828",fontSize:15,fontWeight:600}}>Nessun turno per {gt==="LV"?"Lun-Ven":gt==="SAB"?"Sabato":"Festivo"}</div>
                    <div style={{color:G.t3,fontSize:13,marginTop:6}}>Ricarica il PDF Orari Linee</div>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      ) : (
        <div style={{textAlign:"center",padding:"30px 0",color:G.t3,fontSize:15}}>Seleziona una linea per esplorare i turni</div>
      )}
    </div>
  );
}

function LineeCard({code, segs, isSpezz, hasMulti}) {
  const [flipped, setFlipped] = useState(false);
  const [animClass, setAnimClass] = useState("");

  function doFlip(next) {
    setAnimClass("flip-shrink");
    setTimeout(()=>{ setFlipped(next); setAnimClass("flip-grow"); }, 200);
  }

  // Raggruppa i segmenti per vettura/corsa
  const corsaMap = {};
  segs.forEach(function(s){
    const key = s.vett || s.start;
    if(!corsaMap[key]) corsaMap[key] = [];
    corsaMap[key].push(s);
  });
  const corse = Object.keys(corsaMap).sort(function(a,b){
    return hm2min(corsaMap[a][0].start) - hm2min(corsaMap[b][0].start);
  });
  const isMultiCorsa = corse.length > 1;
  const needsFlip = isSpezz || isMultiCorsa;
  const firstSeg = segs[0];
  const lastSeg = segs[segs.length-1];

  // Bottone apri sviluppo
  const btnApri = (
    <button
      onClick={()=>doFlip(true)}
      style={{width:"100%",marginTop:8,padding:"9px 0",borderRadius:8,border:"2px solid "+(isSpezz?"#e65100":G.accentBorder),background:isSpezz?"rgba(230,81,0,0.06)":"rgba(0,51,102,0.05)",color:isSpezz?"#e65100":G.accent,fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
      {isSpezz?"Spezzato — vedi sviluppo":"Vedi corse"}

      <div style={{display:"flex",gap:4}}>
        {isSpezz && <Tag bg="#fef2f2" color="#c62828">Spezzato</Tag>}
        {isMultiCorsa && !isSpezz && <Tag bg={G.glass} color={G.t2}>{corse.length} corse</Tag>}
        {!needsFlip && firstSeg&&firstSeg.vett && <span style={{fontSize:14,color:G.t2}}>vet. {firstSeg.vett}</span>}
      </div>
    </div>
  );

  // Riga orario complessivo
  const rigaOrario = (
    <div style={{background:"#f4f6f9",borderRadius:8,padding:"8px 12px"}}>
      <span style={{fontWeight:800,fontSize:18,color:G.tw}}>{firstSeg&&firstSeg.start}</span>
      <span style={{fontSize:14,color:G.t2,marginLeft:5}}>{firstSeg&&firstSeg.loc_s}</span>
      <span style={{color:"#aab5c2",margin:"0 6px"}}>→</span>
      <span style={{fontWeight:800,fontSize:18,color:G.tw}}>{lastSeg&&lastSeg.end}</span>
      <span style={{fontSize:14,color:G.t2,marginLeft:5}}>{lastSeg&&lastSeg.loc_e}</span>
    </div>
  );

  // Sviluppo corse (retro)
  const sviluppo = corse.map(function(corsaKey, idx){
    const corsaSegs = corsaMap[corsaKey];
    const gap = idx < corse.length-1 ? calcGap(corsaSegs[corsaSegs.length-1].end, corsaMap[corse[idx+1]][0].start) : 0;
    return (
      <div key={corsaKey}>
        <div style={{background:idx%2===0?"#f4f6f9":"#fff8f0",borderLeft:"3px solid "+(idx%2===0?"#003366":"#e65100"),borderRadius:"0 8px 8px 0",padding:"8px 12px",marginBottom:gap>0?0:6}}>
          {corsaSegs[0].vett && <span style={{fontSize:13,fontWeight:700,color:"#e65100",background:"#fff3e0",border:"1px solid #ffcc80",borderRadius:4,padding:"1px 5px",marginRight:6}}>Turno Vet. {corsaSegs[0].vett}</span>}
          <span style={{fontWeight:800,fontSize:17,color:G.tw}}>{corsaSegs[0].start}</span>
          <span style={{fontSize:13,color:G.t2,marginLeft:4}}>{corsaSegs[0].loc_s}</span>
          <span style={{color:"#aab5c2",margin:"0 5px"}}>→</span>
          <span style={{fontWeight:800,fontSize:17,color:G.tw}}>{corsaSegs[corsaSegs.length-1].end}</span>
          <span style={{fontSize:13,color:G.t2,marginLeft:4}}>{corsaSegs[corsaSegs.length-1].loc_e}</span>
        </div>
        {gap>0&&gap<720&&(
          <div style={{textAlign:"center",padding:"3px 0",marginBottom:6}}>

              {gap>=60?"Cambio":"Pausa"} {fmtGap(gap)}

  if (!flipped) {
    return (
      <div className={animClass} style={Object.assign({},glassCard,{padding:"14px 16px",marginBottom:8,borderLeft:isSpezz?"4px solid #e65100":undefined})}>

        {rigaOrario}

    );
  } else {
    return (
      <div className={animClass} style={Object.assign({},glassCard,{padding:"14px 16px",marginBottom:8,borderLeft:isSpezz?"4px solid #e65100":"4px solid #003366"})}>
        {header(false)}
        {sviluppo}
        {btnChiudi}
      </div>
    );
  }
}

/* ===== STORICO ===== */
function Storico({onLoadPreco, onLoadOrari, onUploadPreco, onUploadOrari, onGoToMonth}) {
  const [hist, setHist] = useState(()=>getHistory());
  const [yr, setYr] = useState(()=>new Date().getFullYear());
  const [selMonth, setSelMonth] = useState(null); // mese selezionato per dettaglio
  const precoRef = useRef(null), orariRef = useRef(null);
  const reload = ()=>setHist(getHistory());

  const groups = {};
  hist.forEach(e=>{
    const gk=e.year+"-"+p2(e.month);
    if(!groups[gk])groups[gk]={year:e.year,month:e.month,preco:null,orari:null};
    if(e.type==="preco")groups[gk].preco=e;
    if(e.type==="orari")groups[gk].orari=e;
  });
  const months = [];
  for(let m=1;m<=12;m++){const gk=yr+"-"+p2(m);months.push({month:m,data:groups[gk]||null});}

  const arrowBtn={padding:"10px 18px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:20,fontWeight:700,cursor:"pointer"};

  // Vista dettaglio mese selezionato
  if(selMonth!==null){
    const item=months[selMonth-1];
    const has=item&&item.data;
    const hasPr=has&&has.preco;
    const hasOr=has&&has.orari;
    const mLabel=MESI_IT[selMonth]+" "+yr;

    const fmtDate = (entry) => {
      if(!entry) return "";
      const d = new Date(entry.savedAt||entry.ts||0);
      return isNaN(d.getTime()) ? "" : "Salvato il "+d.toLocaleDateString("it-IT");
    };

    return (
      <div>
        <input ref={precoRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{
          if(e.target.files[0]){
            onUploadPreco(e.target.files[0],()=>{ reload(); });
          }
        }}/>
        <input ref={orariRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{
          if(e.target.files[0]){
            onUploadOrari(e.target.files[0],()=>{ reload(); });
          }
        }}/>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <button onClick={()=>setSelMonth(null)} style={{padding:"8px 14px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Tutti i mesi
          </button>
          <span style={{fontSize:20,fontWeight:800,color:G.tw}}>{mLabel}</span>
        </div>

        {/* Card Preconoscenza */}
        <div style={Object.assign({},glassCard,{padding:"18px 16px",marginBottom:12,borderLeft:"4px solid "+(hasPr?"#003366":G.glassBorder)})}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:800,color:G.t2,textTransform:"uppercase",letterSpacing:"0.05em"}}>Preconoscenza turni</div>
            {hasPr && <span style={{fontSize:11,color:G.t3}}>{fmtDate(has.preco)}</span>}
          </div>
          {hasPr ? (
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{
                const d=loadPrecoByKey(has.preco.key);
                if(d){
                  onLoadPreco(d);
                  if(onGoToMonth) onGoToMonth(yr, selMonth);
                }
              }}
                style={{flex:1,padding:"13px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                Usa turni → Mese
              </button>
              <button onClick={()=>{deleteEntry(has.preco.key);reload();}}
                style={{padding:"13px 16px",borderRadius:10,border:"none",background:G.redBg,color:G.red,fontSize:14,cursor:"pointer"}}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          ) : (
            <button onClick={()=>{if(precoRef.current){precoRef.current.value="";precoRef.current.click();}}}
              style={{width:"100%",padding:"14px 0",borderRadius:10,border:"2px dashed "+G.glassBorder,background:"transparent",color:G.t2,fontSize:15,fontWeight:600,cursor:"pointer"}}>
              + Carica PDF preconoscenza
            </button>
          )}
        </div>

        {/* Card Orari GTT */}
        <div style={Object.assign({},glassCard,{padding:"18px 16px",marginBottom:12,borderLeft:"4px solid "+(hasOr?"#2e7d32":G.glassBorder)})}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:800,color:G.t2,textTransform:"uppercase",letterSpacing:"0.05em"}}>Orari GTT</div>
            {hasOr && <span style={{fontSize:11,color:G.t3}}>{fmtDate(has.orari)}</span>}
          </div>
          {hasOr ? (
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{
                const d=loadOrariByKey(has.orari.key);
                if(d&&Object.keys(d).length){onLoadOrari(d);}
              }}
                style={{flex:1,padding:"13px 0",borderRadius:10,border:"none",background:G.greenBg,color:G.green,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                Carica orari
              </button>
              <button onClick={()=>{deleteEntry(has.orari.key);reload();}}
                style={{padding:"13px 16px",borderRadius:10,border:"none",background:G.redBg,color:G.red,fontSize:14,cursor:"pointer"}}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          ) : (
            <button onClick={()=>{if(orariRef.current){orariRef.current.value="";orariRef.current.click();}}}
              style={{width:"100%",padding:"14px 0",borderRadius:10,border:"2px dashed "+G.glassBorder,background:"transparent",color:G.t2,fontSize:15,fontWeight:600,cursor:"pointer"}}>
              + Carica PDF orari GTT
            </button>
          )}
        </div>

        {/* Bottone usa mese — carica entrambi e vai al mese */}
        {(hasPr||hasOr) && (
          <button onClick={()=>{
            if(hasPr){const d=loadPrecoByKey(has.preco.key);if(d)onLoadPreco(d);}
            if(hasOr){const d=loadOrariByKey(has.orari.key);if(d&&Object.keys(d).length)onLoadOrari(d);}
            if(onGoToMonth) onGoToMonth(yr, selMonth);
          }}
          style={{width:"100%",padding:"14px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:800,cursor:"pointer",marginTop:4}}>
            Vai al mese →
          </button>
        )}
      </div>
    );
  }

  // Vista griglia mesi
  return (
    <div>
      <input ref={precoRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])onUploadPreco(e.target.files[0],reload);}}/>
      <input ref={orariRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])onUploadOrari(e.target.files[0],reload);}}/>

      {/* Selettore anno */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,marginBottom:18}}>
        <button onClick={()=>setYr(yr-1)} style={arrowBtn}>&lsaquo;</button>
        <span style={{fontSize:24,fontWeight:800,color:G.tw,minWidth:60,textAlign:"center"}}>{yr}</span>
        <button onClick={()=>setYr(yr+1)} style={arrowBtn}>&rsaquo;</button>
      </div>

      {/* Griglia mesi — 2 colonne, più spaziosa */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {months.map(item=>{
          const has=item.data,hasPr=has&&has.preco,hasOr=has&&has.orari;
          const isCurrentMonth=item.month===new Date().getMonth()+1&&yr===new Date().getFullYear();
          return (
            <div key={item.month}
              onClick={()=>setSelMonth(item.month)}
              style={{
                ...glassCard,
                padding:"16px 14px",
                borderColor:hasPr?G.accentBorder:G.glassBorder,
                borderWidth: isCurrentMonth?"2px":"1px",
                cursor:"pointer",
                position:"relative"
              }}>
              {isCurrentMonth && (
                <div style={{position:"absolute",top:8,right:8,fontSize:9,fontWeight:700,color:"#fff",background:"#003366",borderRadius:4,padding:"2px 5px",textTransform:"uppercase"}}>
                  Corrente
                </div>
              )}
              {/* Nome mese */}
              <div style={{fontSize:17,fontWeight:800,color:hasPr?G.tw:G.t2,marginBottom:10}}>
                {MESI_IT[item.month]}
              </div>
              {/* Indicatori stato */}
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:hasPr?"#003366":"#dce1e8",flexShrink:0}}/>
                  <span style={{fontSize:13,color:hasPr?G.tw:G.t3,fontWeight:hasPr?600:400}}>
                    {hasPr?"Preconoscenza ✓":"Preconoscenza —"}
                  </span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:hasOr?"#2e7d32":"#dce1e8",flexShrink:0}}/>
                  <span style={{fontSize:13,color:hasOr?G.green:G.t3,fontWeight:hasOr?600:400}}>
                    {hasOr?"Orari GTT ✓":"Orari GTT —"}
                  </span>
                </div>
              </div>
              {/* Freccia */}
              <div style={{position:"absolute",right:12,bottom:14,color:G.t3}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:16,textAlign:"center",color:G.t3,fontSize:13}}>Tocca un mese per caricare o gestire i documenti</div>
    </div>
  );
}

/* ===== APP ===== */
function App() {
  const fileRef1 = useRef(null), fileRef2 = useRef(null);
  const [tab, setTab] = useState("home");
  const [q, setQ] = useState("");
  const [res, setRes] = useState([]);
  const [msg, setMsg] = useState("");
  const [data, setData] = useState(null);
  const [devs, setDevs] = useState({});
  const [loading1, setLoading1] = useState(false);
  const [loading2, setLoading2] = useState(false);
  const [err, setErr] = useState("");
  const [det, setDet] = useState(null);
  const [resIdx, setResIdx] = useState(0);
  const [vistaType, setVistaType] = useState("giorno"); // "giorno" o "week"
  const [overrides, setOverrides] = useState({});
  const [restored, setRestored] = useState(false);
  const [lastSearched, setLastSearched] = useState(null);
  const [calY, setCalY] = useState(null);
  const [calM, setCalM] = useState(null);
  const [calData, setCalData] = useState(null);
  const [calDevs, setCalDevs] = useState(null);
  const [orariVer, setOrariVer] = useState(0); // incrementa per forzare re-render Card
  const [showArchivio, setShowArchivio] = useState(false);

  /* Cache version check on mount */
  useEffect(()=>{
    if(restored)return;
    // Non cancellare più i dati al cambio versione parser — troppo distruttivo
    // Carica preconoscenza
    const d=loadLastPreco();
    if(d&&Object.keys(d.days).length){
      setData(d);
      if(d.dIn){
        const ok=orariKey(d.dIn.getFullYear(),d.dIn.getMonth()+1);
        const od=loadOrariByKey(ok);
        if(od&&Object.keys(od).length)setDevs(od);
        // Ripristina override (turni ballottaggio incollati)
        const ov=DB.get("ts_overrides_"+precoKey(d.dIn.getFullYear(),d.dIn.getMonth()+1));
        if(ov&&Object.keys(ov).length)setOverrides(ov);
      }
    }
    setRestored(true);
    checkPendingAlarms();
  },[restored]);

  const baseDays = data?data.days:{};
  const days = Object.assign({},baseDays,overrides);
  const refY = data&&data.dIn?data.dIn.getFullYear():new Date().getFullYear();
  const refM = data&&data.dIn?data.dIn.getMonth()+1:new Date().getMonth()+1;
  const nDevs = Object.keys(devs).length;
  const hasHistory = getHistory().length>0;
  const viewY = calY!==null?calY:refY;
  const viewM = calM!==null?calM:refM;
  const isCurrentMonth = (viewY===refY&&viewM===refM);

  useEffect(()=>{
    if(isCurrentMonth){setCalData(null);setCalDevs(null);return;}
    const pd=deserializePreco(DB.get(precoKey(viewY,viewM)));setCalData(pd);
    const od=loadOrariByKey(orariKey(viewY,viewM));setCalDevs(od&&Object.keys(od).length?od:null);
  },[viewY,viewM,isCurrentMonth]);

  const calDays = isCurrentMonth?days:(calData?Object.assign({},calData.days):{});
  const calDevsActive = isCurrentMonth?devs:(calDevs||{});

  function uploadPreco(file,cb){
    if(!file)return;
    setLoading1(true);setErr("");
    window._loadPdfJs(function(pdfjs){
      const reader=new FileReader();
      reader.onload=function(ev){
        pdfjs.getDocument({data:new Uint8Array(ev.target.result)}).promise.then(function(pdf){
          if(pdf.numPages>20){setErr("Questo sembra gli Orari Linee ("+pdf.numPages+" pag.), non la Preconoscenza.");setLoading1(false);if(cb)cb();return;}
          const pp=[];for(let i=1;i<=pdf.numPages;i++)pp.push(pdf.getPage(i).then(extractText));
          Promise.all(pp).then(function(texts){
            const r=parsePreconoscenza(texts.join("\n"));
            if(!Object.keys(r.days).length){setErr("Nessun turno trovato.");setLoading1(false);if(cb)cb();return;}
            setData(r);savePreco(r);saveRiposiCycle(r);setRes([]);setMsg("");setDet(null);setOverrides({});
            DB.set("ts_last_preco",precoKey(r.dIn.getFullYear(),r.dIn.getMonth()+1));
            if(r.dIn){const ok=orariKey(r.dIn.getFullYear(),r.dIn.getMonth()+1);const od=loadOrariByKey(ok);if(od&&Object.keys(od).length)setDevs(od);else setDevs({});}
            setLoading1(false);if(cb)cb(r);
          });
        }).catch(e=>{setErr("Errore: "+e.message);setLoading1(false);});
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function uploadOrari(file,cb){
    if(!file)return;
    setLoading2(true);setErr("Analisi PDF...");
    window._loadPdfJs(function(pdfjs){
      const reader=new FileReader();
      reader.onload=function(ev){
        pdfjs.getDocument({data:new Uint8Array(ev.target.result)}).promise.then(function(pdf){
          if(pdf.numPages<5){setErr("Questo sembra la Preconoscenza.");setLoading2(false);if(cb)cb();return;}
          var pp=[];
          for(var i=1;i<=pdf.numPages;i++) pp.push(pdf.getPage(i).then(extractText));
          Promise.all(pp).then(function(texts){
            var nd={},lastGt="";
            var zeroPages=[];
            texts.forEach(function(ft,idx){
              var gt="",ver="";
              var vm=ft.match(/gruppo\s+\S+\s*-\s*(.+?)\s*-\s*Versione\s+(\w+)/i);
              if(vm){gt=vm[1].trim();ver=vm[2].trim();}
              if(!gt){
                var h=ft.substring(0,800).toUpperCase();
                if(h.indexOf("MERCOLEDI")>=0)gt="MERCOLEDI'";
                else if(h.indexOf("FESTIVO")>=0)gt="FESTIVO";
                else if(h.indexOf("SABATO")>=0)gt="SABATO";
                else if(h.indexOf("LUN")>=0&&h.indexOf("VEN")>=0)gt="LUN - VEN";
                if(!gt&&ver){var v0=ver[0].toUpperCase();gt=v0==="S"?"SABATO":v0==="F"?"FESTIVO":"LUN - VEN";}
              }
              if(gt)lastGt=gt;else gt=lastGt;
              if(gt){
                var pd={};parseOrariPageLines(ft,gt,ver,pd);
                if(Object.keys(pd).length)mergeDevs(nd,pd);
                else if(ft.indexOf("PROGRAMMAZIONE")>=0||ft.indexOf("TURNI DEL")>=0){
                  // Pagina con tabella turni ma 0 match - problema pdf.js
                  zeroPages.push({p:idx+1,gt:gt,sample:ft.substring(0,50)});
                }
              }
            });
            var saved=false;
            if(Object.keys(nd).length){
              var fy=window._uploadOrariY,fm=window._uploadOrariM;
              if(fy&&fm){
                saved=saveOrari(nd,null,fy,fm);
                // Aggiorna devs solo se è il mese della preco corrente
                if(data&&data.dIn&&data.dIn.getFullYear()===fy&&data.dIn.getMonth()+1===fm){
                  setDevs(nd);
                }
                // Altrimenti NON toccare devs globali
              } else {
                saved=saveOrari(nd,data||{dIn:new Date()});
                setDevs(nd);
              }
            }
            var nTurni=Object.keys(nd).length;
            setLoading2(false);if(cb)cb(nd);
            if(!nTurni)setErr("Nessun turno trovato.");
            else setErr("OK! "+nTurni+" turni caricati e salvati.");
          });
        }).catch(function(e){setErr("Errore: "+e.message);setLoading2(false);});
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function cerca(){
    if(!q.trim())return;
    const d=parseInput(q,refY);
    if(!d){setRes([]);setMsg("Formato non riconosciuto");setLastSearched(null);return;}
    setLastSearched(d);
    const is2=toIso(d);
    if(days[is2]){setRes([{date:d,v:days[is2]}]);setMsg("");}
    else{setRes([]);setMsg("Nessun dato per "+toFmt(d));}
  }
  function msgPerData(d){
    const lm=d.getMonth()+1,ly=d.getFullYear();
    if(lm!==refM||ly!==refY){
      const hasNext=DB.get(precoKey(ly,lm));
      if(!hasNext) return "MANCA_PRECO:"+lm+":"+ly;
    }
    return "nessun_turno";
  }

  function rapido(tipo){
    setMsg("");
    const oggi=new Date();
    if(tipo==="oggi"){
      setVistaType("giorno");
      // Ricarica gli orari del mese corrente se devs è vuoto o è del mese sbagliato
      if(data&&data.dIn){
        const ok=orariKey(data.dIn.getFullYear(),data.dIn.getMonth()+1);
        const od=loadOrariByKey(ok);
        if(od&&Object.keys(od).length&&od!==devs)setDevs(od);
      }
      setLastSearched(oggi);
      const is2=toIso(oggi);
      if(days[is2])setRes([{date:oggi,v:days[is2]}]);
      else{setRes([]);setMsg(msgPerData(oggi));}
    }
    else if(tipo==="domani"){
      setVistaType("giorno");
      const d2=new Date();d2.setDate(d2.getDate()+1);
      setLastSearched(d2);
      const is3=toIso(d2);
      if(days[is3])setRes([{date:d2,v:days[is3]}]);
      else{setRes([]);setMsg(msgPerData(d2));}
    }
    else if(tipo==="week"){
      setVistaType("week");
      const r=[];
      for(let j=0;j<7;j++){
        const dd=new Date();dd.setDate(dd.getDate()+j);
        const ii=toIso(dd);
        if(days[ii]) r.push({date:dd,v:days[ii]});
        // Se il giorno è in un mese diverso senza preconoscenza, aggiungi placeholder
        else{
          const lm=dd.getMonth()+1,ly=dd.getFullYear();
          if((lm!==refM||ly!==refY)&&!DB.get(precoKey(ly,lm))){
            r.push({date:dd,v:null,missingPreco:true,month:lm,year:ly});
          }
        }
      }
      setRes(r);
      if(r.length>0)setLastSearched(r[r.length-1].date);
      else{const dd7=new Date();dd7.setDate(dd7.getDate()+6);setLastSearched(dd7);setMsg(msgPerData(dd7));}
    }
  }
  function resetAll(){setData(null);setRes([]);setMsg("");setDet(null);setErr("");setDevs({});if(fileRef1.current)fileRef1.current.value="";if(fileRef2.current)fileRef2.current.value="";}
  // Carica preconoscenza — rimane nello storico, carica orari se disponibili
  function onLoadPreco(d){
    setData(d);
    setRes([]);setMsg("");setDet(null);setOverrides({});
    DB.set("ts_last_preco",precoKey(d.dIn.getFullYear(),d.dIn.getMonth()+1));
    if(d.dIn){
      const ok=orariKey(d.dIn.getFullYear(),d.dIn.getMonth()+1);
      const od=loadOrariByKey(ok);
      setDevs(od&&Object.keys(od).length ? od : {});
    } else {
      setDevs({});
    }
    // NON cambia tab — resta nello Storico
  }

  // Carica orari — rimane nello storico
  function onLoadOrari(d){
    if(!d||!Object.keys(d).length){return;}
    setDevs(d);
    setRes([]);setMsg("");
    // NON cambia tab — resta nello Storico
  }

  // Vai al mese caricato nella vista Mese
  function goToLoadedMonth(d){
    if(!d||!d.dIn){setTab("mese");return;}
    setCalY(d.dIn.getFullYear());
    setCalM(d.dIn.getMonth()+1);
    setDet(null);
    setTab("mese");
  }
  function onPasteTurno(iso,v){
    setOverrides(ov=>{
      const next=Object.assign({},ov,{[iso]:v});
      // Salva persistentemente
      if(data&&data.dIn){
        DB.set("ts_overrides_"+precoKey(data.dIn.getFullYear(),data.dIn.getMonth()+1),next);
      }
      return next;
    });
    setRes(r=>r.map(function(item){
      return toIso(item.date)===iso?{date:item.date,v:v}:item;
    }));
  }

                      <circle cx="30" cy="30" r="24" fill="none" stroke="#003366" strokeWidth="5" strokeDasharray="65 85" strokeLinecap="round" strokeDashoffset="20"/>
                    </svg>
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#003366" strokeWidth="2.5" strokeLinecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    </div>
                  </div>
                  <div style={{fontSize:17,fontWeight:700,color:"#1a1a2e",marginBottom:6}}>Analisi preconoscenza</div>
                  <div style={{fontSize:13,color:"#8a9ab0",lineHeight:1.5}}>Lettura turni dal PDF...</div>
                </div>
              </div>
            )}

            {/* Overlay spin wheel caricamento orari */}
            {loading2 && (
              <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(6px)",animation:"fadeInUp 0.2s ease-out"}}>
                <div style={{background:"#fff",borderRadius:22,padding:"32px 40px",textAlign:"center",minWidth:230,boxShadow:"0 24px 64px rgba(0,0,0,0.28)"}}>
                  <div style={{position:"relative",width:60,height:60,margin:"0 auto 18px"}}>
                    <svg width="60" height="60" viewBox="0 0 60 60" style={{animation:"spin 0.9s linear infinite"}}>
                      <circle cx="30" cy="30" r="24" fill="none" stroke="#e8f5e9" strokeWidth="5"/>
                      <circle cx="30" cy="30" r="24" fill="none" stroke="#2e7d32" strokeWidth="5" strokeDasharray="65 85" strokeLinecap="round" strokeDashoffset="20"/>
                    </svg>
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2e7d32" strokeWidth="2.5" strokeLinecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                    </div>
                  </div>
                  <div style={{fontSize:17,fontWeight:700,color:"#1a1a2e",marginBottom:6}}>Analisi orari GTT</div>
                  <div style={{fontSize:13,color:"#8a9ab0",lineHeight:1.5}}>Elaborazione di tutte<br/>le linee in corso...</div>
                </div>
              </div>
            )}

            {/* Errori */}
            {err && <div style={{background:"#fff3f3",border:"1px solid #f5c6cb",borderRadius:10,padding:"10px 14px",color:"#c62828",fontSize:14,marginBottom:10}}>{err}</div>}

            {/* Tab: Turni */}
            {tab==="home" && (
              <div>
                {!data && tab!=="storico" ? (
                  <div style={{textAlign:"center",padding:"30px 0"}}>
                    <div style={{fontSize:15,color:G.t2,marginBottom:16}}>Carica la preconoscenza PDF per iniziare</div>
                    <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                      style={{padding:"14px 28px",borderRadius:12,border:"none",background:"#003366",color:"#ffd100",fontSize:16,fontWeight:800,cursor:"pointer"}}>
                      📄 Carica Preconoscenza PDF
                    </button>
                  </div>
                ) : (
                  <div>
                    {data && (
                      <div style={{marginBottom:14}}>
                        {msg.startsWith("MANCA_PRECO:") ? (
                          <div style={Object.assign({},glassCard,{padding:"14px 16px",marginBottom:10})}>
                            <div style={{fontSize:15,fontWeight:700,color:G.tw,marginBottom:6}}>Preconoscenza non caricata</div>
                            <div style={{fontSize:13,color:G.t2,marginBottom:10}}>Carica il PDF del mese per vedere i tuoi turni</div>
                            <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                              style={{width:"100%",padding:"11px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                              Carica Preconoscenza PDF
                            </button>
                          </div>
                        ) : msg==="nessun_turno" ? (
                          <div style={Object.assign({},glassCard,{padding:"14px 16px",marginBottom:10})}>
                            <div style={{fontSize:15,fontWeight:700,color:G.tw,marginBottom:6}}>Giorno non trovato in preconoscenza</div>
                            <div style={{fontSize:13,color:G.t2,marginBottom:10}}>{toFmt(new Date())} non è presente nei dati caricati. Ricarica la preconoscenza PDF.</div>
                            <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                              style={{width:"100%",padding:"11px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                              Ricarica preconoscenza PDF
                            </button>
                          </div>
                        ) : msg ? (
                          <div style={Object.assign({},glassCard,{padding:"10px 14px",marginBottom:10,fontSize:15,color:G.t2})}>{msg}</div>
                        ) : null}
                      </div>
                    )}
                    {/* Barra ricerca */}
                    <div style={{display:"flex",gap:8,marginBottom:10,background:"#ffd100",borderRadius:12,padding:"4px 4px 4px 14px",alignItems:"center"}}>
                      <input
                        value={q} onChange={e=>setQ(e.target.value)}
                        onKeyDown={e=>{if(e.key==="Enter")rapido("data");}}
                        placeholder={"Cerca data  es. 15/06 o 15 giugno"}
                        style={{flex:1,padding:"12px 0",border:"none",background:"transparent",fontSize:15,color:G.tw,outline:"none"}}
                      />
                      <button onClick={()=>rapido("data")}
                        style={{width:44,height:44,borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:18,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        →
                      </button>
                    </div>
                    <div style={{display:"flex",gap:8,marginBottom:14}}>
                      {[["oggi","Oggi"],["domani","Domani"],["week","Settimana"]].map(([k,l])=>(
                        <button key={k} onClick={()=>rapido(k)}
                          style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:"#ffd100",color:"#003366",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                          {l}
                        </button>
                      ))}
                    </div>
                    {res.length>0 && (vistaType==="week"
                      ? (
                        // ── Vista SETTIMANA: lista verticale ──
                        <div>
                          {res.map((r,i)=>(
                            r.v
                              ? <div key={toIso(r.date)} style={{marginBottom:10}} className="card-appear">
                                  <Card date={r.date} v={r.v} devs={devs} allDays={days} onPaste={onPasteTurno}/>
                                </div>
                              : <div key={toIso(r.date)} style={{padding:"12px 16px",background:"#f4f6f9",borderRadius:12,marginBottom:10,fontSize:13,color:"#8a9ab0",textAlign:"center"}}>
                                  {["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][r.date.getDay()]} {r.date.getDate()} — nessun dato
                                </div>
                          ))}
                        </div>
                      ) : (()=>{
                        // ── Vista GIORNALIERA: carosello sfogliabile ──
                        var allDayKeys = Object.keys(days).sort();
                        var ri = Math.min(resIdx, res.length-1);
                        var curR = res[ri];
                        if(!curR||!curR.v) return null;
                        var curKey = toIso(curR.date);
                        var globalIdx = allDayKeys.indexOf(curKey);
                        var prevKey = globalIdx > 0 ? allDayKeys[globalIdx-1] : null;
                        var nextKey = globalIdx < allDayKeys.length-1 ? allDayKeys[globalIdx+1] : null;
                        var prevV = prevKey ? days[prevKey] : null;
                        var nextV = nextKey ? days[nextKey] : null;
                        // Funzioni navigazione
                        var goNext = function(){if(nextKey&&nextV){setRes([{date:new Date(nextKey+"T12:00:00"),v:nextV}]);setResIdx(0);}};
                        var goPrev = function(){if(prevKey&&prevV){setRes([{date:new Date(prevKey+"T12:00:00"),v:prevV}]);setResIdx(0);}};
                        return (
                          <div>
                            {/* Indicatore posizione */}
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                              <button onClick={goPrev} disabled={!prevKey||!prevV}
                                style={{width:40,height:40,borderRadius:12,border:"none",
                                  background:(!prevKey||!prevV)?"#f4f6f9":"#003366",
                                  color:(!prevKey||!prevV)?"#c0c8d4":"#ffd100",
                                  fontSize:22,cursor:(!prevKey||!prevV)?"default":"pointer",
                                  flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                                  boxShadow:(!prevKey||!prevV)?"none":"0 2px 8px rgba(0,51,102,0.2)"}}>‹</button>
                              <div style={{flex:1,textAlign:"center"}}>
                                <div style={{fontSize:13,fontWeight:700,color:"#003366"}}>
                                  {["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][curR.date.getDay()]} {curR.date.getDate()} {MESI_IT[curR.date.getMonth()+1]} {curR.date.getFullYear()}
                                </div>
                                {globalIdx>=0&&allDayKeys.length>1&&(
                                  <div style={{fontSize:10,color:"#aab5c2",marginTop:2}}>{globalIdx+1} / {allDayKeys.length}</div>
                                )}
                              </div>
                              <button onClick={goNext} disabled={!nextKey||!nextV}
                                style={{width:40,height:40,borderRadius:12,border:"none",
                                  background:(!nextKey||!nextV)?"#f4f6f9":"#003366",
                                  color:(!nextKey||!nextV)?"#c0c8d4":"#ffd100",
                                  fontSize:22,cursor:(!nextKey||!nextV)?"default":"pointer",
                                  flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                                  boxShadow:(!nextKey||!nextV)?"none":"0 2px 8px rgba(0,51,102,0.2)"}}>›</button>
                            </div>
                            {/* Card con swipe touch nativo */}
                            <SwipeCard onSwipeLeft={goNext} onSwipeRight={goPrev} swipeKey={curKey}>
                              <Card key={curKey} date={curR.date} v={curR.v} devs={devs} allDays={days} onPaste={onPasteTurno}/>
                            </SwipeCard>
                          </div>
                        );
                      })()
                    )}
                    {/* Ballottaggi */}
                    {/* Bottone Condividi preconoscenza */}
                    {data && (
                      <div style={{marginBottom:10}}>
                        <button onClick={()=>inviaCalendarioWhatsApp(data)}
                          style={{width:"100%",padding:"13px 0",borderRadius:12,border:"none",
                            background:"#003366",color:"#ffd100",
                            fontSize:15,fontWeight:700,cursor:"pointer",
                            display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
                            <polyline points="16 6 12 2 8 6"/>
                            <line x1="12" y1="2" x2="12" y2="15"/>
                          </svg>
                          Condividi preconoscenza
                        </button>
                      </div>
                    )}
                    {/* Ballottaggi */}
                    {data && (()=>{
                      const balls=Object.entries(data.days||{}).filter(([,v])=>v.t==="RIS");
                      if(!balls.length)return null;
                      return (
                        <div style={Object.assign({},glassCard,{padding:"10px 14px",marginBottom:10,background:"#fffde7",border:"1px solid #ffd100"})}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span style={{fontWeight:700,color:"#003366"}}>{balls.length} ballottaggi</span>
                            <button onClick={()=>downloadBallottaggiICS(data)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:G.red,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Salva su Calendario</button>
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                )}
              </div>
            )}

            {/* Tab: Mese */}
            {tab==="mese" && (
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
                  <button onClick={()=>{let nm=viewM-1,ny=viewY;if(nm<1){nm=12;ny--;}setCalY(ny);setCalM(nm);setDet(null);}}
                    style={{width:40,height:40,borderRadius:"50%",border:"none",background:"#f4f6f9",color:"#003366",fontSize:20,fontWeight:300,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    ‹
                  </button>
                  <div style={{textAlign:"center",flex:1}}>
                    <div style={{fontSize:22,fontWeight:700,color:"#003366",letterSpacing:"-0.02em"}}>{MESI_IT[viewM]}</div>
                    <div style={{fontSize:14,color:"#8a9ab0",fontWeight:400}}>{viewY}</div>
                    {!isCurrentMonth && (
                      <button onClick={()=>{setCalY(null);setCalM(null);setDet(null);}}
                        style={{marginTop:2,fontSize:11,color:"#003366",background:"#eef3ff",border:"none",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontWeight:600}}>
                        ← Torna ad oggi
                      </button>
                    )}
                  </div>
                  <button onClick={()=>{let nm=viewM+1,ny=viewY;if(nm>12){nm=1;ny++;}setCalY(ny);setCalM(nm);setDet(null);}}
                    style={{width:40,height:40,borderRadius:"50%",border:"none",background:"#f4f6f9",color:"#003366",fontSize:20,fontWeight:300,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    ›
                  </button>
                </div>
                {(()=>{
                  const hasPr=Object.keys(calDays).length>0;
                  const hasOr=Object.keys(calDevsActive).length>0;
                  return (<>
                    <button onClick={()=>{
                      const oggi=new Date();const is2=toIso(oggi);
                      let srcData=data;
                      if(!srcData||!srcData.days){srcData=loadLastPreco();if(srcData)setData(srcData);}
                      const allDaysNow=srcData&&srcData.days?Object.assign({},srcData.days,overrides):{};
                      const turnoOggi=allDaysNow[is2];
                      if(srcData&&srcData.dIn){const ok=orariKey(srcData.dIn.getFullYear(),srcData.dIn.getMonth()+1);const od=loadOrariByKey(ok);if(od&&Object.keys(od).length)setDevs(od);}
                      setCalY(null);setCalM(null);setLastSearched(oggi);setMsg("");setDet(null);
                      if(turnoOggi){setRes([{date:oggi,v:turnoOggi}]);setResIdx(0);}
                      else{const ieri=new Date(oggi);ieri.setDate(ieri.getDate()-1);const dom2=new Date(oggi);dom2.setDate(dom2.getDate()+1);const altKeys=[toIso(ieri),toIso(dom2)];let found=null;for(const ak of altKeys){if(allDaysNow[ak]){found={date:new Date(ak+"T12:00:00"),v:allDaysNow[ak]};break;}}if(found){setRes([found]);setResIdx(0);}else{setRes([]);setResIdx(0);setMsg("nessun_turno");}}
                      setTab("home");
                    }} style={{width:"100%",height:40,borderRadius:12,border:"none",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:14}}>
                      Turno di oggi
                    </button>
                    <div style={{borderRadius:14,border:"1px solid #edf0f4",overflow:"hidden",marginBottom:14}}>
                      <div style={{padding:"10px 14px",background:"#f9fafc",borderBottom:"1px solid #edf0f4",fontSize:11,fontWeight:700,color:"#8a9ab0",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                        Documenti {MESI_IT[viewM]}
                      </div>
                      <div style={{display:"flex",alignItems:"center",padding:"12px 14px",borderBottom:"1px solid #edf0f4",background:"#fff"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:600,color:"#1a1a2e"}}>Preconoscenza turni</div>
                          <div style={{fontSize:12,color:hasPr?"#003366":"#b0b8c8",marginTop:1}}>{hasPr?"Caricata":"Non ancora caricata"}</div>
                        </div>
                        <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                          style={{padding:"6px 14px",borderRadius:8,border:"none",background:hasPr?"#f0f4ff":"#003366",color:hasPr?"#003366":"#ffd100",fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0}}>
                          {hasPr?"Ricarica":"Carica PDF"}
                        </button>
                      </div>
                      <div style={{display:"flex",alignItems:"center",padding:"12px 14px",background:"#fff"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:600,color:"#1a1a2e"}}>Orari GTT</div>
                          <div style={{fontSize:12,color:hasOr?"#2e7d32":"#b0b8c8",marginTop:1}}>{hasOr?"Caricati":"Non ancora caricati"}</div>
                        </div>
                        <button onClick={()=>{if(fileRef2.current){fileRef2.current.value="";fileRef2.current.click();}}}
                          style={{padding:"6px 14px",borderRadius:8,border:"none",background:hasOr?"#f0faf0":"#2e7d32",color:hasOr?"#2e7d32":"#fff",fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0}}>
                          {hasOr?"Ricarica":"Carica PDF"}
                        </button>
                      </div>
                    </div>
                  </>);
                })()}
                {(()=>{
                  const rc=loadRiposiCycle(),riposiSet=rc?projectRiposi(rc,viewY,viewM):{};
                  const hasDays=Object.keys(calDays).length>0,hasRiposi=Object.keys(riposiSet).length>0;
                  if(!hasDays&&!hasRiposi) return (
                    <div style={{textAlign:"center",padding:"40px 20px"}}>
                      <div style={{width:56,height:56,borderRadius:"50%",background:"#f0f4ff",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#003366" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                      </div>
                      <div style={{fontSize:17,fontWeight:700,color:"#003366",marginBottom:6}}>{MESI_IT[viewM]} {viewY}</div>
                      <div style={{fontSize:14,color:"#8a9ab0",lineHeight:1.5}}>Carica la preconoscenza per vedere i turni di questo mese</div>
                    </div>
                  );
                  return(
                    <div>
                      <DaySlider
                        viewY={viewY} viewM={viewM}
                        calDays={calDays}
                        det={det} setDet={setDet}
                        isCurrentMonth={isCurrentMonth}
                      />
                      <Grid days={calDays} yr={viewY} mo={viewM} riposiSet={riposiSet} onTap={(d,v)=>{setDet({date:d,v:v});}}/>

                      {!hasDays&&hasRiposi&&<div style={{textAlign:"center",marginTop:8,fontSize:12,color:"#b0b8c8"}}>Riposi proiettati · ciclo {rc.cycle} giorni</div>}
                      {det && (
                        <div style={{marginTop:16}}>
                          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                            <div style={{flex:1,height:1,background:"#f0f2f5"}}/>
                            <div style={{fontSize:12,color:"#b0b8c8",fontWeight:500}}>
                              {["domenica","lunedì","martedì","mercoledì","giovedì","venerdì","sabato"][det.date.getDay()]} {det.date.getDate()} {MESI_IT[det.date.getMonth()+1]}
                            </div>
                            <div style={{flex:1,height:1,background:"#f0f2f5"}}/>
                          </div>
                          <Card key={toIso(det.date)+"-"+orariVer} date={det.date} v={det.v} devs={calDevsActive} allDays={calDays} onPaste={onPasteTurno}/>
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Tab: Riposi */}
            {tab==="riposi" && (
              <div>
                <RiposiView data={data} devs={devs}/>
              </div>
            )}

            {/* Tab: Linee */}
            {tab==="linee" && nDevs>0 && <LineeBrowser devs={devs}/>}

          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

</body>
</html>
