    ].join('\n');
    try {
      var blob = new Blob([swCode], {type:'application/javascript'});
      var url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).then(function(){
        URL.revokeObjectURL(url);
      }).catch(function(){});
    } catch(e) {}
  }
})();
</script>

/* ===== HELPERS ===== */
function p2(n) { return String(n).padStart(2,"0"); }
function toIso(d) { return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate()); }
function toFmt(d) { return p2(d.getDate())+"/"+p2(d.getMonth()+1)+"/"+d.getFullYear(); }
function toWd(d) { var i = d.getDay(); return WK[i===0?6:i-1]; }
function fT(s) {
  if (!s) return "";
  var h = parseInt(s.slice(0,2)), m = s.slice(2);
  return h >= 24 ? p2(h-24)+":"+m : p2(h)+":"+m;
}
function fD(s) { if (!s) return ""; return parseInt(s.slice(0,2))+"h "+s.slice(2)+"m"; }
function hhmm2min(s) { if (!s||s.length<4) return 0; return parseInt(s.slice(0,2))*60+parseInt(s.slice(2)); }
function hm2min(s) { if (!s) return 0; var p=s.split(":"); return parseInt(p[0])*60+parseInt(p[1]); }
function fmtGap(m) { if (m<60) return m+"min"; var h=Math.floor(m/60),r=m%60; return r>0?h+"h "+r+"min":h+"h"; }
function calcGap(endStr,startStr) { var e=hm2min(endStr),s=hm2min(startStr),g=s-e; if(g<0)g+=1440; return g; }
function isRealSpezzato(segs) { return segs.length >= 2; }
function buildDevKey(v) {
  if (v.t!=="turno") return null;
  var tn=parseInt(v.n);
  if(isNaN(tn))return null;
  var ln=v.l||"";
  // Genera tutte le varianti possibili della chiave linea
  // es. "5B" → ["05B", "5B"], "05" → ["05", "5"], "38" → ["38"]
  var lnNum=parseInt(ln);
  var suffix=ln.replace(/^\d+/,""); // es. "B" da "5B"
  var variants=[];
  if(!isNaN(lnNum)){
    variants.push(String(lnNum).padStart(2,'0')+suffix); // "05B"
    variants.push(String(lnNum)+suffix);                  // "5B"
    if(!suffix){
      variants.push(String(lnNum).padStart(2,'0'));        // "05"
      variants.push(String(lnNum));                        // "5"
    }
  } else {
    variants.push(ln);
  }
  // Chiave preferita (prima variante)
  return variants[0]+' '+String(tn);
}
function buildDevKeyAll(v) {
  // Restituisce tutte le varianti di chiave per cercare negli orari
  if (v.t!=="turno") return [];
  var tn=parseInt(v.n);
  if(isNaN(tn))return [];
  var ln=v.l||"";
  var lnNum=parseInt(ln);
  var suffix=ln.replace(/^\d+/,"");
  var variants=[];
  if(!isNaN(lnNum)){
    variants.push(String(lnNum).padStart(2,'0')+suffix);
    variants.push(String(lnNum)+suffix);
    if(!suffix){
      variants.push(String(lnNum).padStart(2,'0'));
      variants.push(String(lnNum));
    }
  } else {
    variants.push(ln);
  }
  return variants.map(function(l){return l+' '+String(tn);});
}
function isNotturno(v) {
  if (v.t!=="turno"||!v.i||!v.e) return false;
  var ini=hhmm2min(v.i),ter=hhmm2min(v.e);
  return ini>=1020||ter>1440||(ter>0&&ter<=165);
}
function checkRiposoBreve(days,iso) {
  var v=days[iso]; if(!v||v.t!=="turno"||!v.e) return false;
  var d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+1);
  var nv=days[toIso(d)]; if(!nv||nv.t!=="turno"||!nv.i) return false;
  var terM=hhmm2min(v.e),ni=hhmm2min(nv.i);
  var gap=terM>1440?ni-(terM-1440):(1440-terM)+ni;
  return gap>0&&gap<660;
}

  if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  return null;
}

/* ===== RIPOSI CYCLE ===== */
function calcRiposiCycle(data) {
  if(!data||!data.days) return null;
  var rpDates=[];
  Object.keys(data.days).forEach(function(iso){var v=data.days[iso];if(v&&REST_CODES[v.t])rpDates.push(iso);});
  rpDates.sort();
  if(rpDates.length<2) return null;
  var anchor=null;
  for(var i=0;i<rpDates.length;i++){
    if(i>0){var prev=new Date(rpDates[i-1]+"T00:00:00"),curr=new Date(rpDates[i]+"T00:00:00");
      if(Math.round((curr-prev)/86400000)===1) continue;}
    anchor=rpDates[i]; break;
  }

}
function projectRiposi(rc,yr,mo) {
  if(!rc||!rc.anchor) return {};
  var set={},anc=new Date(rc.anchor+"T12:00:00");
  var diffDays=Math.floor((new Date(yr,mo-1,1).getTime()-anc.getTime())/86400000);
  var steps=Math.floor(diffDays/6)-2;
  for(var i=steps;i<steps+10;i++){
    var d=new Date(anc.getTime());d.setDate(d.getDate()+i*6);
    var dow=d.getDay(),addArr=dow===6?[0,1]:dow===0?[-1,0]:dow===1?[-1,0]:[0];
    addArr.forEach(function(off){
      var dd=new Date(d.getTime());dd.setDate(dd.getDate()+off);
      if(dd.getMonth()===mo-1&&dd.getFullYear()===yr) set[toIso(dd)]=1;
    });
  }
  return set;
}

/* ===== PARSERS ===== */
var RE_LINE=/(\d{2}\/\d{2}\/\d{4})\s+(DOM|LUN|MAR|MER|GIO|VEN|SAB)\s+(.*)/;
function parseDMY(s){var p=s.split("/");return new Date(+p[2],+p[1]-1,+p[0]);}
function parseShift(rest){
  var tk=rest.split(/\s+/);if(tk.length<8)return null;
  var geIdx=-1;for(var i=0;i<tk.length;i++){if(tk[i]==="GE"){geIdx=i;break;}}
  if(geIdx<0||geIdx+2>=tk.length)return null;
  var turno=tk[geIdx+1],cod=tk[geIdx+2],after=tk.slice(geIdx+3);
  var times=[],locs=[],dirs=[];
  after.forEach(function(t){
    if(/^\d{4}$/.test(t))times.push(t);
    else if(/^[A-Z]{2,4}$/.test(t)){locs.push(t);dirs.push("");}
    else if(/^[AR]$/.test(t)){if(dirs.length>0)dirs[dirs.length-1]=t;}
  });
  return{t:"turno",l:tk[0],n:turno,c:cod,i:times[0]||"",li:locs[0]||"",di:dirs[0]||"",e:times[1]||"",le:locs[1]||"",de:dirs[1]||"",d:times[2]||""};
}
function parseShiftFromPaste(text){
  if(!text)return null;
  var clean=text.replace(/[\r\n\t]/g," ").replace(/\u00a0/g," ").replace(/\s+/g," ").trim();
  clean=clean.replace(/^\d{2}[.\/]\d{2}[.\/]\d{4}\s*/,"");
  var tk=clean.split(" ");
  var geIdx=-1;for(var i=0;i<tk.length;i++){if(tk[i]==="GE"){geIdx=i;break;}}
  if(geIdx<0)return null;
  var nums=[];for(var j=0;j<geIdx;j++){if(/^\d+$/.test(tk[j]))nums.push(tk[j]);}
  if(nums.length<2)return null;
  var linea=nums[nums.length-2],turnoN=nums[nums.length-1];
  var after=tk.slice(geIdx+1),times=[],locs=[],dirs=[];
  after.forEach(function(t){
    if(/^\d{4}$/.test(t))times.push(t);
    else if(/^[A-Z]{2,4}$/.test(t)){locs.push(t);dirs.push("");}
    else if(/^[AR]$/.test(t)){if(dirs.length>0)dirs[dirs.length-1]=t;}
  });
  if(times.length<2)return null;
  return{t:"turno",l:linea,n:turnoN,c:"",i:times[0],li:locs[0]||"",di:dirs[0]||"",e:times[1],le:locs[1]||"",de:dirs[1]||"",d:times[2]||"",g:"",_pasted:true};
}
function parsePreconoscenza(text){
  var lines=text.split("\n"),days={},nome="",matricola="",dIn=null,dTe=null;
  var allText=text.replace(/\n/g," ");
  var mn=allText.match(/Nominativo[:\s]+([A-Z][A-Z\s]+?)(?:\s{2,}|\s*$)/i);if(mn)nome=mn[1].trim();
  if(!nome){mn=allText.match(/Nominativo[:\s]+(.+?)(?:Stabilimento|Data|Gr\.|$)/i);if(mn)nome=mn[1].trim();}
  if(!nome){lines.forEach(function(raw){if(nome)return;var m=raw.match(/Nominativo[:\s]+([A-Z][A-Za-z\s]+)/i);if(m)nome=m[1].trim();});}
  var mm=allText.match(/Codice\s*Personale[:\s]*(\d+)/i);if(mm)matricola=mm[1];
  if(!matricola){lines.forEach(function(raw){if(matricola)return;var m=raw.match(/Codice\s*Personale[:\s]*(\d+)/i);if(m)matricola=m[1];});}
  lines.forEach(function(raw){
    var line=raw.trim();
    var mi=line.match(/Data\s*Inizio:?\s*(\d{2}\/\d{2}\/\d{4})/i);if(mi)dIn=parseDMY(mi[1]);
    var mt=line.match(/Data\s*Termine:?\s*(\d{2}\/\d{2}\/\d{4})/i);if(mt)dTe=parseDMY(mt[1]);
  });
  lines.forEach(function(raw){
    var line=raw.trim(),lm=line.match(RE_LINE);if(!lm)return;
    var dateStr=lm[1],gg=lm[2],rest=lm[3].trim(),date;
    try{date=parseDMY(dateStr);}catch(e){return;}
    var iso=toIso(date),tokens=rest.split(/\s+/),first=tokens[0]?tokens[0].toUpperCase():"";
    if(SPECIAL[first]){
      var entry={t:first,g:gg,x:tokens.slice(1).join(" ")};
      if(first==="RIS"){var bc="";for(var bi=1;bi<tokens.length;bi++){if(/^B\d{2}$/.test(tokens[bi])){bc=tokens[bi];break;}}entry.ball=bc;}
      days[iso]=entry;
    }else{var shift=parseShift(rest);if(shift){shift.g=gg;days[iso]=shift;}}
  });
  if(!dIn){var sorted=Object.keys(days).sort();if(sorted.length){dIn=new Date(sorted[0]+"T00:00:00");dTe=new Date(sorted[sorted.length-1]+"T00:00:00");}}
  return{days:days,nome:nome,matricola:matricola,dIn:dIn,dTe:dTe,rawText:text};
}

/* ===== PARSER ORARI (stitching iterativo) ===== */
var RE_SEG_STR = "(?:([A-Z0-9]{2}\\s+\\d{3})\\s+)?([A-Z0-9]+)\\s*/\\s*(\\d+)\\s+(\\d{2}\\.\\d{2})\\s+([A-Z]{2,4})\\s+([AR-])\\s+(\\d{2}\\.\\d{2})\\s+([A-Z]{2,4})";
function parseOrariPageLines(fullText,gt,ver,devs){
  var lines=fullText.split("\n"),pageSegs=[];
  lines.forEach(function(line){
    var lineMid=line.length/2;
    var codeLine=line.trim().match(/^([A-Z0-9]{2})\s+(\d{3})$/);
    if(codeLine){return;} // intestazione standalone, ignorata
    var re=new RegExp(RE_SEG_STR,"g"),m;
    while((m=re.exec(line))!==null){
      var code=m[1]?m[1].replace(/\s+/g," ").trim():null;
      var seg={ln:m[2],vett:m[3],start:m[4].replace(".",":"),loc_s:m[5],dir:m[6]!=="-"?m[6]:"",end:m[7].replace(".",":"),loc_e:m[8],gt:gt,ver:ver};
      pageSegs.push({code:code,seg:seg,done:false});
    }
  });

  /* PASSATA 1: segmenti con codice esplicito + orfani immediatamente successivi */
  var codeEnds={};
  var runCounters={};
  var lastExplicitCode=null; // ultimo codice esplicito visto nel testo

  pageSegs.forEach(function(ps){
    if(ps.code){
      // Segmento con codice esplicito
      var parts=ps.code.split(" ");
      var nc=parts.length===2?p2(parseInt(parts[0]))+" "+String(parseInt(parts[1])):ps.code;
      // Gestisce suffisso lettera (5B → 05B)
      var lnRaw=parts[0],lnNum=parseInt(lnRaw),lnSuf=lnRaw.replace(/^\d+/,"");
      if(!isNaN(lnNum))nc=String(lnNum).padStart(2,"0")+lnSuf+" "+String(parseInt(parts[1]));
      ps.normCode=nc;
      var tnNum=parseInt(nc.split(" ")[1]||"999");
      var isSpez=tnNum<100;
      var prev=codeEnds[nc];
      var gapOk=false;
      if(prev&&ps.seg.start){
        var pe=prev.e,ns=ps.seg.start;
        var gapMin=hm2min(ns)-hm2min(pe);
        if(gapMin<0)gapMin+=1440;
        gapOk=(gapMin<=480);
      }
      var runId;
      if(isSpez&&prev&&gapOk){
        runId=prev.run_id;
      } else {
        runCounters[nc]=(runCounters[nc]||0)+1;
        runId=runCounters[nc];
      }
      ps.seg.run_id=runId;
      ps.done=true;
      devs[nc]=devs[nc]||[];
      devs[nc].push(ps.seg);
      codeEnds[nc]={e:ps.seg.end,l:ps.seg.loc_e,run_id:runId};
      lastExplicitCode=nc;
    } else if(lastExplicitCode){
      // Orfano: assegna al turno IMMEDIATAMENTE PRECEDENTE nel testo
      // solo se è spezzato (num<100) e gap ragionevole (<4h)
      var tnNum2=parseInt(lastExplicitCode.split(" ")[1]||"999");
      var isSpez2=tnNum2<100;
      var prev2=codeEnds[lastExplicitCode];
      var gapOk2=false;
      if(isSpez2&&prev2&&ps.seg.start){
        var gapMin2=hm2min(ps.seg.start)-hm2min(prev2.e);
        if(gapMin2<0)gapMin2+=1440;
        gapOk2=(gapMin2>=0&&gapMin2<=240);
      }
      // Gap > 4h ma stesso luogo: potrebbe essere turno spezzato con pausa lunga
      if(!gapOk2&&isSpez2&&prev2&&ps.seg.start){
        var gapMin2b=hm2min(ps.seg.start)-hm2min(prev2.e);
        if(gapMin2b<0)gapMin2b+=1440;
        // Accetta se gap < 8h E stesso luogo di fine/inizio
        gapOk2=(gapMin2b>=0&&gapMin2b<=480&&prev2.l===ps.seg.loc_s);
      }
      if(gapOk2){
        ps.seg.run_id=codeEnds[lastExplicitCode].run_id;
        ps.done=true;
        devs[lastExplicitCode]=devs[lastExplicitCode]||[];
        devs[lastExplicitCode].push(ps.seg);
        codeEnds[lastExplicitCode]={e:ps.seg.end,l:ps.seg.loc_e,run_id:ps.seg.run_id};
      }
      // Se non assegnato, lo stitching passata 2 lo gestirà
    }
  });

  /* PASSATA 2: stitching per orfani rimasti */
  var changed=true,maxIter=15;
  while(changed&&maxIter-->0){
    changed=false;
    pageSegs.forEach(function(ps){
      if(ps.done)return;
      var best=null,ks=Object.keys(codeEnds);
      for(var i=0;i<ks.length;i++){if(codeEnds[ks[i]].e===ps.seg.start&&codeEnds[ks[i]].l===ps.seg.loc_s){best=ks[i];break;}}
      if(!best){for(var j=0;j<ks.length;j++){if(codeEnds[ks[j]].e===ps.seg.start){best=ks[j];break;}}}
      if(best){
        // Non aggiungere a turni spezzati che hanno già 2+ segmenti (evita segmenti rubati)
        var tnNum3=parseInt(best.split(" ")[1]||"999");
        if(tnNum3<100&&devs[best]&&devs[best].length>=2)return;
        ps.done=true;changed=true;
        ps.seg.run_id=codeEnds[best].run_id;
        devs[best]=devs[best]||[];
        devs[best].push(ps.seg);
        codeEnds[best]={e:ps.seg.end,l:ps.seg.loc_e,run_id:codeEnds[best].run_id};
      }
    });
  }
}

function mergeDevs(target,source){
  Object.keys(source).forEach(function(code){
    if(!target[code])target[code]=[];
    source[code].forEach(function(seg){
      if(!target[code].some(function(e){return e.start===seg.start&&e.loc_s===seg.loc_s&&e.end===seg.end&&e.gt===seg.gt&&e.ln===seg.ln;}))
        target[code].push(seg);

}

/* ===== FILTRO GT (no fallback) ===== */
function getFilteredDevSegs(devs,v,date){
  if(v&&v._pasted&&(!devs||Object.keys(devs).length===0)) return [];
  // Prova tutte le varianti di chiave (gestisce linee tipo 5B, 38B ecc.)
  var segs=[];
  var keys=buildDevKeyAll(v);
  for(var ki=0;ki<keys.length;ki++){
    if(devs[keys[ki]]&&devs[keys[ki]].length>0){segs=devs[keys[ki]];break;}
  }
  var dk=keys[0]||null;
  if(segs.length>0&&date){
    var dow=date.getDay(),dt2=dow===0?"FEST":dow===6?"SAB":"LV";
    segs=segs.filter(function(s){
      var g=(s.gt||"").toUpperCase();
      if(!g)return true;
      var isLV=g.indexOf("LUN")>=0||g.indexOf("MAR")>=0||g.indexOf("MER")>=0||g.indexOf("GIO")>=0||g.indexOf("VEN")>=0||g.indexOf("FERIALE")>=0||g.indexOf("FERIALI")>=0;
      if(dt2==="LV")return isLV;
      if(dt2==="SAB")return g.indexOf("SAB")>=0;
      return g.indexOf("FEST")>=0||g.indexOf("DOM")>=0||g.indexOf("DOMENICA")>=0;
    });
  }
  if(!segs.length) return [];

  // Usa run_id assegnato dal parser per separare corse distinte dello stesso turno
  var hasRunId=segs.some(function(s){return s.run_id!==undefined;});
  if(hasRunId){
    var runs={};
    segs.forEach(function(s){
      var k=s.run_id!==undefined?String(s.run_id):"_";
      if(!runs[k])runs[k]=[];
      runs[k].push(s);
    });
    var runKeys=Object.keys(runs);
    if(runKeys.length>1&&v&&v.i){
      var turnoMin=hm2min(v.i.slice(0,2)+":"+v.i.slice(2));
      var best=runKeys[0],bestDiff=99999;
      runKeys.forEach(function(k){
        var s0=runs[k].slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);})[0];
        var diff=Math.abs(hm2min(s0.start)-turnoMin);
        if(diff<bestDiff){bestDiff=diff;best=k;}
      });
      return runs[best].slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});
    }
    return (runs[runKeys[0]]||segs).slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});
  }

  // Fallback gap temporale
  var sorted=segs.slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});
  if(sorted.length<=1) return sorted;
  var corse=[],corsaCorrente=[sorted[0]];
  for(var i=1;i<sorted.length;i++){
    var gap=hm2min(sorted[i].start)-hm2min(sorted[i-1].end);
    if(gap<0||gap>5){corse.push(corsaCorrente);corsaCorrente=[sorted[i]];}
    else{corsaCorrente.push(sorted[i]);}
  }
  corse.push(corsaCorrente);
  if(corse.length===1) return corse[0];
  if(v&&v.i){
    var tMin=hm2min(v.i.slice(0,2)+":"+v.i.slice(2));
    var bestC=corse[0],bestD=99999;
    corse.forEach(function(c){var d=Math.abs(hm2min(c[0].start)-tMin);if(d<bestD){bestD=d;bestC=c;}});
    return bestC;
  }
  return corse[0];
}

function calDesc(v,devSegs){

  if(devSegs&&devSegs.length>0){d+="\n\nSviluppo:";devSegs.forEach(function(s,i){d+="\n"+(i+1)+". "+s.start+" "+s.loc_s+" -> "+s.end+" "+s.loc_e;});if(devSegs.length>1)d+="\nSpezzato ("+devSegs.length+" seg)";}

function gcalDate(date,ts){

}

function buildICS(date,v,devSegs){

}

/* Manda un batch di immagini pagine a Claude e riceve i dati strutturati */
function ocrBatchPages(images, gt, progressCb){

    "- vett: numero vettura (es '31')\n\n" +
    "Includi TUTTE le righe, anche le continuazioni senza codice turno (code=null).\n" +
    "IMPORTANTE: le righe di continuazione (senza codice linea/turno) hanno code=null.\n" +
    "Rispondi SOLO con JSON array: [{code,start,loc_s,dir,end,loc_e,vett},...]\n" +
    "Nessun testo aggiuntivo, solo JSON valido.";

  var content = [{type:"text", text: prompt}];
  images.forEach(function(b64){
    content.push({type:"image", source:{type:"base64", media_type:"image/jpeg", data:b64}});
  });

  return fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:4000,
      messages:[{role:"user", content:content}]
    })
  }).then(function(r){return r.json();}).then(function(data){
    var text = (data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
    // Estrai JSON dalla risposta

  }).catch(function(){ return []; });
}

/* ===== CONVERTE RISULTATI OCR IN STRUTTURA devs ===== */
function ocrResultsToDevs(results, gt, devs){
  // results = [{code, start, loc_s, dir, end, loc_e, vett}, ...]
  // Stessa logica stitching del parser testo
  var pageSegs = results.map(function(r){
    return {
      code: r.code ? normKey(r.code) : null,
      seg: {
        ln: r.code ? r.code.split(' ')[0] : '',
        vett: r.vett||'',
        start: (r.start||'').replace('.',':'),
        loc_s: r.loc_s||'',
        dir: r.dir||'',
        end: (r.end||'').replace('.',':'),
        loc_e: r.loc_e||'',
        gt: gt, ver:''
      },
      done: false
    };
  });

  var codeEnds = {};
  pageSegs.forEach(function(ps){
    if(ps.code){
      ps.done=true;
      devs[ps.code]=devs[ps.code]||[];
      devs[ps.code].push(ps.seg);
      codeEnds[ps.code]={e:ps.seg.end,l:ps.seg.loc_e};
    }
  });

  var changed=true, maxIter=15;
  while(changed&&maxIter-->0){
    changed=false;
    pageSegs.forEach(function(ps){
      if(ps.done)return;
      var best=null, ks=Object.keys(codeEnds);
      for(var i=0;i<ks.length;i++){
        if(codeEnds[ks[i]].e===ps.seg.start&&codeEnds[ks[i]].l===ps.seg.loc_s){best=ks[i];break;}
      }
      if(!best){for(var j=0;j<ks.length;j++){if(codeEnds[ks[j]].e===ps.seg.start){best=ks[j];break;}}}
      if(best){ps.done=true;changed=true;devs[best]=devs[best]||[];devs[best].push(ps.seg);codeEnds[best]={e:ps.seg.end,l:ps.seg.loc_e};}
    });
  }
}

function normKey(code){
  if(!code)return null;
  var parts=code.trim().split(/\s+/);
  if(parts.length>=2){
    var ln=parts[0], tn=parseInt(parts[1]);
    if(!isNaN(tn)){
      var lnNum=parseInt(ln);
      var suffix=ln.replace(/^\d+/,""); // es. "B" da "5B"
      var lnStr=isNaN(lnNum)?ln:String(lnNum).padStart(2,'0')+suffix;
      return lnStr+' '+String(tn);
    }
  }
  return code;
}

function extractText(page){
  // Prova entrambe le modalità di getTextContent e usa quella con più match
  var RE_EVAL=/(?:[A-Z0-9]{2}\s+\d{3}\s+)?[A-Z0-9]+\s*\/\s*\d+\s+\d{2}\.\d{2}\s+[A-Z]{2,4}\s+[AR-]\s+\d{2}\.\d{2}\s+[A-Z]{2,4}/g;
  function countMatches(text){return(text.match(RE_EVAL)||[]).length;}

  function buildText(items, rotation, pageW, pageH){
    if(!items.length)return"";
    function byX(its){
      var rowMap={};
      its.forEach(function(it){
        var found=null,keys=Object.keys(rowMap);
        for(var i=0;i<keys.length;i++){if(Math.abs(parseInt(keys[i])-it.x)<=8){found=keys[i];break;}}
        if(!found){found=String(it.x);rowMap[found]=[];}
        rowMap[found].push(it);
      });
      var xKeys=Object.keys(rowMap).map(Number).sort(function(a,b){return b-a;});
      var lines=[];
      xKeys.forEach(function(xk){
        var row=rowMap[String(xk)].slice().sort(function(a,b){return a.y-b.y;});
        var s=row.map(function(r){return r.str;}).join(" ").trim();
        if(s)lines.push(s);
      });
      return lines.join("\n");
    }
    function byY(its){
      var rowMap={};
      its.forEach(function(it){
        var found=null,keys=Object.keys(rowMap);
        for(var i=0;i<keys.length;i++){if(Math.abs(parseInt(keys[i])-it.y)<=8){found=keys[i];break;}}
        if(!found){found=String(it.y);rowMap[found]=[];}
        rowMap[found].push(it);
      });
      var yKeys=Object.keys(rowMap).map(Number).sort(function(a,b){return b-a;});
      var lines=[];
      yKeys.forEach(function(yk){
        var row=rowMap[String(yk)].slice().sort(function(a,b){return a.x-b.x;});
        var s=row.map(function(r){return r.str;}).join(" ").trim();
        if(s)lines.push(s);
      });
      return lines.join("\n");
    }
    function byYtop(its){
      its.forEach(function(it){it.yTop=pageH-it.y;});
      its.sort(function(a,b){var dy=a.yTop-b.yTop;if(Math.abs(dy)>5)return dy;return a.x-b.x;});
      var lines=[],curY=null,curLine=[];
      its.forEach(function(it){
        var tol=Math.max(3,(it.h||10)*0.4);
        if(curY===null||Math.abs(it.yTop-curY)>tol){if(curLine.length)lines.push(curLine.slice());curLine=[it];curY=it.yTop;}
        else{curLine.push(it);}
      });
      if(curLine.length)lines.push(curLine);
      return lines.map(function(ln){return ln.sort(function(a,b){return a.x-b.x;}).map(function(r){return r.str;}).join(" ");}).join("\n");
    }

    var primary,secondary,tertiary;
    if(rotation===90||rotation===270){primary=byX;secondary=byY;tertiary=byYtop;}
    else if(pageW>pageH){primary=byY;secondary=byX;tertiary=byYtop;}
    else{primary=byYtop;secondary=byY;tertiary=byX;}

    var tA=primary(items.slice()),mA=countMatches(tA);if(mA>0)return tA;
    var tB=secondary(items.slice()),mB=countMatches(tB);if(mB>mA)return tB;
    var tC=tertiary(items.slice()),mC=countMatches(tC);if(mC>mB)return tC;
    return tA||tB||tC;
  }

  function getItems(c){
    var items=[];
    c.items.forEach(function(it){
      if(!it.str||!it.str.trim())return;
      items.push({x:Math.round(it.transform[4]),y:Math.round(it.transform[5]),str:it.str.trim(),h:it.height||10});
    });
    return items;
  }

  var rotation=page.rotate||0;
  var vp=page.view,pageW=vp?(vp[2]-vp[0]):595,pageH=vp?(vp[3]-vp[1]):842;

  // Prova con disableCombineTextItems=true
  return page.getTextContent({disableCombineTextItems:true}).then(function(c1){
    var items1=getItems(c1);
    var text1=buildText(items1,rotation,pageW,pageH);
    var m1=countMatches(text1);

    // Prova anche senza disableCombineTextItems
    return page.getTextContent({disableCombineTextItems:false}).then(function(c2){
      var items2=getItems(c2);
      var text2=buildText(items2,rotation,pageW,pageH);
      var m2=countMatches(text2);

      return m2>m1?text2:text1;
    }).catch(function(){return text1;});
  });
}
</script>

/* ===== CARD ===== */
function Card({date, devs={}, allDays={}, onPaste, v: vProp}) {
  const [copied, setCopied] = useState(false);
  const [flipped, setFlipped] = useState(false);
  const [animClass, setAnimClass] = useState("flip-grow");
  const [pasteErr, setPasteErr] = useState("");
  const [showPaste, setShowPaste] = useState(false);
  const [pasteTxt, setPasteTxt] = useState("");
  const [localV, setLocalV] = useState(null);
  // Vettura per segmento: {seg_idx: "numero"}, persistito in localStorage
  const loadVett = () => DB.get("ts_vett_"+toIso(date)) || {};
  const [vettMap, setVettMap] = useState(loadVett);
  const vettRefs = React.useRef({});
  const [vettSaved, setVettSaved] = useState(false);
  const [alarmSet, setAlarmSet] = useState(function(){
    const a = DB.get("ts_alarm_"+toIso(date)); return a && a.set ? true : false;
  });

  const v = localV || allDays[toIso(date)] || vProp;
  const devSegs = getFilteredDevSegs(devs, v, date);
  // Turno spezzato: 2+ segmenti dagli orari, OPPURE numero turno < 100 (regola GTT Gerbido)
  const turnoNum = v && v.n ? parseInt(v.n) : 999;
  const isSpezzatoByRule = !isNaN(turnoNum) && turnoNum < 100;
  // Mostra flip se: 2+ segmenti dagli orari OPPURE numero turno < 100
  const isSpezzato = devSegs.length >= 2 || isSpezzatoByRule;
  const iso = toIso(date);
  const night = isNotturno(v);
  const rb = checkRiposoBreve(allDays, iso);
  const firstVett = devSegs.length > 0 && devSegs[0].vett ? devSegs[0].vett : "";
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const gcalUrl = buildGcalUrl(date, v, devSegs);
  const summary = buildSummary(date, v, devSegs);
  const moovitData = buildMoovitData(date, v);
  const isMorning = v.t==="turno" && v.i && parseInt(v.i.slice(0,2)) < 14;
  const liveUrl = v.t==="turno" ? buildLiveUrlForCard(v) : null;

  let lineVariant = "";
  if (devSegs.length > 0) {
    const lns = {}; devSegs.forEach(s=>{if(s.ln)lns[s.ln]=1;});
    const bLn = Object.keys(lns).find(k=>/[A-Z]$/.test(k)&&k.length>1);
    if (bLn) lineVariant = bLn.replace(/[A-Z]$/,"/");
  }
  const displayLine = lineVariant || v.l;
  const code = displayLine+" "+v.n;

  function doCopy(e) {
    if(e)e.stopPropagation();
    const txt=buildSummary(date,v,devSegs);
    try{const ta=document.createElement("textarea");ta.value=txt;ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),1500);}catch(err){}
  }

  function doCalendar(e) {
    if(e)e.stopPropagation();
    shareToCalendar(date,v,devSegs);
  }

  function doAlarm(e) {
    if(e)e.stopPropagation();
    if(v.t!=="turno"||!v.i)return;
    window.open(gcalUrl,"_blank","noopener");
    DB.set("ts_alarm_"+iso,{ts:Date.now(),label:"Turno "+v.l+" "+v.n,set:true});
    setAlarmSet(true);
  }

  // Stili base
  const accent="#003366", orange="#e65100";
  const bdr = isSpezzato ? "4px solid "+orange : "4px solid "+accent;
  const cardBase = {background:"#fff",borderRadius:14,boxShadow:"0 2px 12px rgba(0,51,102,0.10)",borderLeft:bdr,padding:"16px 16px 14px"};

  // Bottoni azioni — usati sia nel front che nel back
  function ActionButtons({stopFlip}) {
    const stop = stopFlip ? (e)=>e.stopPropagation() : null;
    return (
      <div style={{marginTop:12,borderTop:"1px solid #edf0f4",paddingTop:12}}>
        <div style={{display:"flex",gap:6}}>
          <button
            onClick={e=>{e.stopPropagation();doCalendar();}}
            style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#eef3ff",color:"#003366",fontSize:14,fontWeight:700,cursor:"pointer"}}>
            {<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",verticalAlign:"middle",marginRight:5}}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>} Calendario
          </button>
          <button
            onClick={e=>{e.stopPropagation();doCopy();}}
            style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:copied?"#e8f5e9":"#f4f6f9",color:copied?"#1b7a3d":"#444",fontSize:14,fontWeight:700,cursor:"pointer"}}>
            {copied ? <>{<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",verticalAlign:"middle",marginRight:4}}><polyline points="20 6 9 17 4 12"/></svg>} Copiato</> : <>{<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",verticalAlign:"middle",marginRight:4}}><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>} Copia</>}
          </button>
          <button
            onClick={e=>{e.stopPropagation();window.open("https://api.whatsapp.com/send?text="+encodeURIComponent(summary),"_blank","noopener");}}
            style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:"#25D366",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </button>
        </div>
        {isMorning && v.t==="turno" && (
          <button onClick={e=>{e.stopPropagation();doAlarm();}}
            style={{width:"100%",marginTop:6,padding:"11px 0",borderRadius:10,border:"none",background:alarmSet?"#fff9e6":"#ffd100",color:"#003366",fontSize:14,fontWeight:700,cursor:"pointer"}}>
            {alarmSet ? <>{<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",verticalAlign:"middle",marginRight:5}}><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 14.5 15.5"/><line x1="6.8" y1="3.5" x2="4" y2="6"/><line x1="17.2" y1="3.5" x2="20" y2="6"/></svg>} Rivedi su Google Calendar</> : <>{<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",verticalAlign:"middle",marginRight:5}}><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 14.5 15.5"/><line x1="6.8" y1="3.5" x2="4" y2="6"/><line x1="17.2" y1="3.5" x2="20" y2="6"/></svg>} Sveglia {p2(Math.max(0,parseInt(v.i.slice(0,2))-1))}:{v.i.slice(2)} — GCal</>}
          </button>
        )}
        {moovitData && (
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <button onClick={e=>{e.stopPropagation();openMoovit(moovitData);}}
              style={{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:"#ff6900",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
              {<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",verticalAlign:"middle",marginRight:5}}><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M7 19v2M17 19v2"/><circle cx="7" cy="14" r="1" fill="currentColor"/><circle cx="17" cy="14" r="1" fill="currentColor"/></svg>} Moovit
            </button>
            <button onClick={e=>{e.stopPropagation();openGMaps(moovitData);}}
              style={{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:"#4285f4",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",verticalAlign:"middle",marginRight:4}}><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
              Maps
            </button>
          </div>
        )}
        {liveUrl && (
          <button onClick={e=>{e.stopPropagation();openLiveMap(liveUrl);}}
            style={{width:"100%",marginTop:6,padding:"11px 0",borderRadius:10,border:"none",background:"#003366",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer"}}>
            Arrivi linea {parseInt(v.l)} a {v.li}
          </button>
        )}
        {v.t==="turno" && devSegs.length > 0 && (
          <div style={{marginTop:14,borderTop:"2px solid #e8ecf2",paddingTop:12}} onClick={e=>e.stopPropagation()}>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:800,color:"#5a6b80",marginBottom:6,letterSpacing:"0.05em",textTransform:"uppercase",display:"flex",alignItems:"center",gap:6}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M7 19v2M17 19v2"/><circle cx="7" cy="14" r="1" fill="currentColor"/><circle cx="17" cy="14" r="1" fill="currentColor"/></svg>
                Numero vettura
              </div>
              <div style={{fontSize:15,fontWeight:600,color:"#003366",background:"#eef3ff",border:"1px solid #c5d5f5",borderRadius:8,padding:"8px 12px",lineHeight:1.4}}>
                Inserisci qui sotto nei campi il numero della vettura assegnata per ciascun segmento del turno
              </div>
            </div>
            {devSegs.map((seg, si) => {
              const saved = vettMap[si] || "";
              return (
                <div key={si} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:40}}>
                    {devSegs.length > 1 && (
                      <span style={{fontSize:15,fontWeight:700,color:"#fff",background:"#003366",borderRadius:6,padding:"4px 8px",minWidth:22,textAlign:"center"}}>
                        {si+1}
                      </span>
                    )}
                    {seg.vett && (
                      <span style={{fontSize:13,fontWeight:800,color:"#e65100",background:"#fff3e0",border:"1px solid #ffcc80",borderRadius:5,padding:"3px 6px",whiteSpace:"nowrap"}}>
                        Turno Vet. {seg.vett}
                      </span>
                    )}
                  </div>
                  <span style={{fontSize:15,fontWeight:600,color:"#5a6b80",whiteSpace:"nowrap",minWidth:80}}>{seg.start}→{seg.end}</span>
                  <input
                    key={iso+"-"+si}
                    type="text"
                    inputMode="numeric"
                    pattern="[0-9]*"
                    maxLength={4}
                    defaultValue={saved}
                    placeholder={seg.vett||"-"}
                    ref={el=>vettRefs.current[si]=el}
                    style={{
                      width:80,padding:"10px 6px",borderRadius:8,
                      border:"2px solid #003366",
                      background:"#f0f4ff",
                      color:"#003366",fontSize:22,fontWeight:800,
                      outline:"none",textAlign:"center"
                    }}
                  />
                </div>
              );
            })}
            <button
              onClick={()=>{
                const newMap={...vettMap};
                devSegs.forEach((_,si)=>{
                  const el=vettRefs.current[si];
                  if(el){
                    const val=el.value.replace(/[^0-9]/g,"").slice(0,4);
                    newMap[si]=val;
                    el.value=val;
                  }
                });
                setVettMap(newMap);
                DB.set("ts_vett_"+toIso(date),newMap);
                setVettSaved(true);
                setTimeout(()=>setVettSaved(false), 2200);
              }}
              className={vettSaved?"vett-saved":""}
              style={{
                width:"100%",marginTop:10,padding:"12px 0",borderRadius:10,border:"none",
                background:vettSaved?"#1b7a3d":"#003366",
                color:vettSaved?"#fff":"#ffd100",
                fontSize:16,fontWeight:800,cursor:"pointer",
                transition:"background 0.3s, color 0.3s"
              }}>
              {vettSaved
                ? <><span className="vett-save-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Salvato!</>
                : <><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{display:"inline-block",verticalAlign:"middle",marginRight:5}}><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Salva numeri vettura</>
              }
            </button>
          </div>
        )}
      </div>
    );
  }

  /* ---- Card speciale: riposo, ballottaggio, ferie ---- */
  if (v.t !== "turno") {
    const info = TL[v.t] || ["Sconosciuto","","#666"];
    return (
      <div style={Object.assign({},cardBase,{marginBottom:10})}>
        <div style={{fontSize:14,color:"#8a9ab0",marginBottom:6}}>{toWd(date)} {toFmt(date)}</div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{background:info[2],color:v.t==="RIS"?"#fff":"#003366",fontSize:15,fontWeight:700,padding:"5px 16px",borderRadius:20}}>{info[0]}</span>
          {v.t==="RIS" && v.ball && <span style={{fontFamily:"monospace",fontWeight:700,fontSize:16,color:"#003366"}}>{v.ball} — {BALL_CODES[v.ball]||"da assegnare"}</span>}
        </div>
        {v.t!=="RIS" && info[1] && <div style={{color:"#5a6b80",marginTop:8,fontSize:15}}>{info[1]}</div>}
        {v.t==="RIS" && onPaste && (
          <div style={{marginTop:12}}>
            {!showPaste ? (
              <button onClick={e=>{e.stopPropagation();setShowPaste(true);setPasteErr("");setPasteTxt("");}}
                style={{width:"100%",padding:"12px 0",borderRadius:10,border:"2px solid #003366",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                Incolla turno assegnato
              </button>
            ) : (
              <div onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:13,color:"#8a9ab0",marginBottom:6}}>Incolla la riga — conferma automatica:</div>
                <textarea value={pasteTxt} onInput={e=>setPasteTxt(e.target.value)} onChange={e=>setPasteTxt(e.target.value)}
                  onPaste={e=>{
                    let clip="";
                    try{clip=(e.clipboardData||window.clipboardData).getData("text");}catch(x){}
                    if(!clip){setTimeout(()=>{if(e.target&&e.target.value)clip=e.target.value;if(clip){const parsed=parseShiftFromPaste(clip);if(parsed){parsed.g=toWd(date).toUpperCase().slice(0,3);if(onPaste){onPaste(iso,parsed);}else{setLocalV(parsed);}setShowPaste(false);setPasteTxt("");}else{setPasteTxt(clip);setPasteErr("Formato non riconosciuto.");}}},150);return;}
                    e.preventDefault();
                    const parsed=parseShiftFromPaste(clip);
                    if(parsed){parsed.g=toWd(date).toUpperCase().slice(0,3);if(onPaste){onPaste(iso,parsed);}else{setLocalV(parsed);}setShowPaste(false);setPasteTxt("");}
                    else{setPasteTxt(clip);setPasteErr("Formato non riconosciuto.");}
                  }}
                  placeholder="es. N B 44 107 GE 0713 GERB 1307 OMER R 0554"
                  style={{width:"100%",minHeight:56,padding:"10px 12px",borderRadius:10,border:"2px solid #003366",background:"#fff",color:"#003366",fontSize:15,fontFamily:"monospace",outline:"none",resize:"none",boxSizing:"border-box"}}
                  autoFocus/>
                <button onClick={e=>{e.stopPropagation();setShowPaste(false);setPasteErr("");setPasteTxt("");}}
                  style={{width:"100%",marginTop:6,padding:"9px 0",borderRadius:8,border:"1px solid #dce1e8",background:"transparent",color:"#8a9ab0",fontSize:14,cursor:"pointer"}}>Annulla</button>
                {pasteErr && <div style={{color:"#e53935",fontSize:13,marginTop:4}}>{pasteErr}</div>}
              </div>
            )}
          </div>
        )}
        <ActionButtons stopFlip={false}/>
      </div>
    );
  }

  /* ---- Card turno a una ripresa (no flip) ---- */
  if (!isSpezzato) {
    return (
      <div style={Object.assign({},cardBase,{marginBottom:10})}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:14,color:"#8a9ab0",fontWeight:600}}>{toWd(date)} {toFmt(date)}</span>
          <div style={{display:"flex",gap:4}}>
            {night && <Tag bg={G.purpleBg} color={G.purple}>Serale</Tag>}
            {rb && <Tag bg={G.redBg} color={G.red}>Rip. breve</Tag>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <span style={{fontFamily:"'SF Mono',monospace",fontSize:28,fontWeight:800,color:"#003366",letterSpacing:"-0.02em"}}>{code}</span>
          <span style={{fontSize:15,color:"#8a9ab0"}}>vet. {vettMap[0]||firstVett||"—"}</span>
          {v.c && <span style={{fontSize:13,color:"#aab5c2"}}>cod. {v.c}</span>}
        </div>
        <div style={{background:"#f4f6f9",borderRadius:10,padding:"10px 14px"}}>
          <span style={{fontWeight:800,fontSize:20,color:"#003366"}}>{fT(v.i)}</span>
          <span style={{fontSize:15,color:"#5a6b80",marginLeft:5}}>{v.li}</span>
          {devSegs[0]&&devSegs[0].dir&&devSegs[0].dir!=="-" && <span style={{fontSize:12,fontWeight:700,marginLeft:5,color:devSegs[0].dir==="A"?"#003366":"#6a1b9a",background:devSegs[0].dir==="A"?"#eef3ff":"#f3e5f5",padding:"2px 7px",borderRadius:5}}>{devSegs[0].dir==="A"?"And.":"Rit."}</span>}
          <span style={{color:"#aab5c2",margin:"0 8px"}}>→</span>
          <span style={{fontWeight:800,fontSize:20,color:"#003366"}}>{fT(v.e)}</span>
          <span style={{fontSize:15,color:"#5a6b80",marginLeft:5}}>{v.le}</span>
          {v.d && <span style={{marginLeft:10,fontSize:14,color:"#8a9ab0"}}>{fD(v.d)}</span>}
        </div>
        <ActionButtons stopFlip={false}/>
      </div>
    );
  }

  /* ---- Card turno SPEZZATO — con flip animata ---- */
  // Card spezzato: mostra fronte o retro in base a stato
  if (isSpezzato) {
    if (!flipped) {
      // FRONTE
      return (
        <div className={animClass} style={Object.assign({},cardBase,{marginBottom:10})}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:14,color:"#8a9ab0",fontWeight:600}}>{toWd(date)} {toFmt(date)}</span>
            <div style={{display:"flex",gap:4}}>
              <Tag bg="#fef2f2" color="#c62828">Spezzato</Tag>
              {night && <Tag bg={G.purpleBg} color={G.purple}>Serale</Tag>}
              {rb && <Tag bg={G.redBg} color={G.red}>Rip. breve</Tag>}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
            <span style={{fontFamily:"'SF Mono',monospace",fontSize:28,fontWeight:800,color:"#003366",letterSpacing:"-0.02em"}}>{code}</span>
            {firstVett && <span style={{fontSize:15,color:"#8a9ab0"}}>vet. {vettMap[0]||firstVett}</span>}
            {v.c && <span style={{fontSize:13,color:"#aab5c2"}}>cod. {v.c}</span>}
          </div>
          <div style={{background:"#f4f6f9",borderRadius:10,padding:"10px 14px",marginBottom:10}}>
            <span style={{fontWeight:800,fontSize:20,color:"#003366"}}>{fT(v.i)}</span>
            <span style={{fontSize:15,color:"#5a6b80",marginLeft:5}}>{v.li}</span>
            <span style={{color:"#aab5c2",margin:"0 8px"}}>→</span>
            <span style={{fontWeight:800,fontSize:20,color:"#003366"}}>{fT(v.e)}</span>
            <span style={{fontSize:15,color:"#5a6b80",marginLeft:5}}>{v.le}</span>
            {v.d && <span style={{marginLeft:10,fontSize:14,color:"#8a9ab0"}}>{fD(v.d)}</span>}
          </div>
          <button
            onClick={()=>{
              setAnimClass("flip-shrink");

/* ===== GRID ===== */
function Grid({days, yr, mo, riposiSet, onTap}) {
  let off = new Date(yr,mo-1,1).getDay(); off = off===0?6:off-1;
  const nd = new Date(yr,mo,0).getDate();
  const cells = [];
  for(let i=0;i<off;i++) cells.push(0);
  for(let i=1;i<=nd;i++) cells.push(i);
  const todayStr = toIso(new Date());
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {WK.map(w=><div key={w} style={{textAlign:"center",fontSize:12,fontWeight:600,color:G.t3,padding:"5px 0",textTransform:"uppercase"}}>{w}</div>)}
        {cells.map((day,idx)=>{
          if(!day) return <div key={"e"+idx}/>;
          const dt=new Date(yr,mo-1,day),is2=toIso(dt),v=days[is2];
          const isProjRest=!v&&riposiSet&&riposiSet[is2];
          let bg="transparent",cl=G.t3,fw=400;
          const today=is2===todayStr;
          if(v){fw=700;if(REST_CODES[v.t]){bg="#ffd100";cl="#003366";}else if(v.t==="RIS"){bg="#c62828";cl="#ffffff";}else if(v.t==="turno"){bg="#003366";cl="#ffffff";}else{bg=G.orangeBg;cl=G.orange;}}
          else if(isProjRest){fw=600;bg="rgba(255,209,0,0.30)";cl="#8b6914";}
          if(today){bg="#00897b";cl="#ffffff";fw=800;}
          return (
            <div key={idx}
              onClick={()=>{if(v)onTap(dt,v);else if(isProjRest)onTap(dt,{t:"RP",g:"",x:"Riposo previsto"});}}
              style={{textAlign:"center",fontSize:15,padding:"7px 2px",borderRadius:today?"50%":"8px",color:cl,fontWeight:fw,background:bg,cursor:(v||isProjRest)?"pointer":"default",minHeight:36,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:today?"0 0 0 2px #00897b,0 0 0 4px rgba(0,137,123,0.25)":"none"}}>
              {day}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:12,flexWrap:"wrap",marginTop:8}}>
        {[["#00897b","Oggi","50%"],["#003366","Turno","3px"],["#ffd100","Riposo","3px"],["#c62828","Ballott.","3px"]].map(([bg,label,br])=>(
          <span key={label} style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:G.t3}}>
            <span style={{width:10,height:10,borderRadius:br,background:bg,display:"inline-block"}}/> {label}
          </span>
        ))}
      </div>
    </div>
  );
}

/* ===== LINEE BROWSER ===== */
function LineeBrowser({devs}) {
  const [linea, setLinea] = useState("");
  const [turno, setTurno] = useState("");
  const [gt, setGt] = useState(()=>{const d=new Date().getDay();return d===0?"FEST":d===6?"SAB":"LV";});

  const lineMap = {};
  Object.keys(devs).forEach(code=>{
    const parts=code.split(" ");if(parts.length!==2)return;
    const ln=parts[0]; // già normalizzato (es. "02")
    if(!lineMap[ln])lineMap[ln]=[];lineMap[ln].push(code);
    (devs[code]||[]).forEach(s=>{
      if(s.ln&&s.ln!==ln){
        // Normalizza anche la variante linea
        var vln=String(parseInt(s.ln)||s.ln).padStart(2,"0");
        if(!lineMap[vln])lineMap[vln]=[];
        if(!lineMap[vln].includes(code))lineMap[vln].push(code);
        // Anche la variante raw (es. "38B")
        if(s.ln!==vln){if(!lineMap[s.ln])lineMap[s.ln]=[];if(!lineMap[s.ln].includes(code))lineMap[s.ln].push(code);}
      }
    });
  });
  const lineNums = Object.keys(lineMap).sort((a,b)=>{const na=parseInt(a),nb=parseInt(b);if(isNaN(na)&&isNaN(nb))return a.localeCompare(b);if(isNaN(na))return 1;if(isNaN(nb))return -1;return na!==nb?na-nb:a.localeCompare(b);});
  const turniForLine = (linea?lineMap[linea]||[]:[ ]).slice().sort();

  function filterSegs(segs) {
    if(!segs||!segs.length)return[];
    if(gt==="ALL")return segs.slice().sort((a,b)=>hm2min(a.start)-hm2min(b.start));
    const f=segs.filter(s=>{
      const g=(s.gt||"").toUpperCase();if(!g)return true;
      const isLV=g.includes("LUN")||g.includes("MAR")||g.includes("MER")||g.includes("GIO")||g.includes("VEN")||g.includes("FERIALE")||g.includes("FERIALI");
      if(gt==="LV")return isLV;if(gt==="SAB")return g.includes("SAB");return g.includes("FEST")||g.includes("DOM")||g.includes("DOMENICA");
    });
    return f.sort((a,b)=>hm2min(a.start)-hm2min(b.start));
  }
  function lineLabel(ln){if(/B$/.test(ln))return ln.replace(/B$/,"/");if(/[A-Z]$/.test(ln)&&ln.length>1)return ln.replace(/[A-Z]$/,"/");const n=parseInt(ln);return isNaN(n)?ln:String(n);}

  const selStyle={width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid "+G.glassBorder,background:"#ffffff",color:G.tw,fontSize:17,outline:"none",appearance:"none",WebkitAppearance:"none"};

  return (
    <div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:14,color:G.t3,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.04em"}}>Seleziona linea</div>
        <select value={linea} onChange={e=>{setLinea(e.target.value);setTurno("");}} style={selStyle}>
          <option value="">-- Scegli linea --</option>
          {lineNums.map(ln=><option key={ln} value={ln}>Linea {lineLabel(ln)} ({lineMap[ln].length} turni)</option>)}
        </select>
      </div>
      {linea ? (
        <div>
          <div style={{display:"flex",gap:4,marginBottom:12}}>
            {["LV","SAB","FEST","ALL"].map(d=>(
              <button key={d} onClick={()=>setGt(d)} style={{flex:1,padding:"8px 0",borderRadius:10,border:gt===d?"1px solid "+G.accentBorder:"1px solid "+G.cardBorder,background:gt===d?G.accentGlass:"transparent",color:gt===d?G.accent:G.t2,fontSize:14,fontWeight:600,cursor:"pointer"}}>
                {d==="LV"?"Lun-Ven":d==="SAB"?"Sabato":d==="FEST"?"Festivo":"Tutti"}
              </button>
            ))}
          </div>
          <select value={turno} onChange={e=>setTurno(e.target.value)} style={Object.assign({},selStyle,{marginBottom:12})}>
            <option value="">Tutti i turni linea {lineLabel(linea)}</option>
            {turniForLine.map(code=><option key={code} value={code}>{code}</option>)}
          </select>
          {(()=>{
            const items=turno?[turno]:turniForLine;
            let visibleCount=0;
            const cards=items.map(code=>{
              const segs=devs[code]||[],filtered=filterSegs(segs);
              if(!filtered.length)return null;
              visibleCount++;
              return <LineeCard key={code+gt} code={code} segs={filtered} isSpezz={isRealSpezzato(filtered)} hasMulti={filtered.length>1}/>;
            });
            return (
              <div>
                {visibleCount>0 && <div style={{fontSize:13,color:G.t2,marginBottom:8,fontWeight:600}}>{visibleCount} turni {gt==="LV"?"feriali":gt==="SAB"?"sabato":gt==="FEST"?"festivi":"totali"}</div>}
                {cards}
                {visibleCount===0 && (
                  <div style={{textAlign:"center",padding:"20px 0"}}>
                    <div style={{color:"#c62828",fontSize:15,fontWeight:600}}>Nessun turno per {gt==="LV"?"Lun-Ven":gt==="SAB"?"Sabato":"Festivo"}</div>
                    <div style={{color:G.t3,fontSize:13,marginTop:6}}>Ricarica il PDF Orari Linee</div>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      ) : (
        <div style={{textAlign:"center",padding:"30px 0",color:G.t3,fontSize:15}}>Seleziona una linea per esplorare i turni</div>
      )}
    </div>
  );
}

function LineeCard({code, segs, isSpezz, hasMulti}) {
  const [flipped, setFlipped] = useState(false);
  const [animClass, setAnimClass] = useState("");

  function doFlip(next) {
    setAnimClass("flip-shrink");
    setTimeout(()=>{ setFlipped(next); setAnimClass("flip-grow"); }, 200);
  }

  // Raggruppa i segmenti per vettura/corsa
  const corsaMap = {};
  segs.forEach(function(s){
    const key = s.vett || s.start;
    if(!corsaMap[key]) corsaMap[key] = [];
    corsaMap[key].push(s);
  });
  const corse = Object.keys(corsaMap).sort(function(a,b){
    return hm2min(corsaMap[a][0].start) - hm2min(corsaMap[b][0].start);
  });
  const isMultiCorsa = corse.length > 1;
  const needsFlip = isSpezz || isMultiCorsa;
  const firstSeg = segs[0];
  const lastSeg = segs[segs.length-1];

  // Bottone apri sviluppo
  const btnApri = (
    <button
      onClick={()=>doFlip(true)}
      style={{width:"100%",marginTop:8,padding:"9px 0",borderRadius:8,border:"2px solid "+(isSpezz?"#e65100":G.accentBorder),background:isSpezz?"rgba(230,81,0,0.06)":"rgba(0,51,102,0.05)",color:isSpezz?"#e65100":G.accent,fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
      {isSpezz?"Spezzato — vedi sviluppo":"Vedi corse"}
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  );

  // Bottone chiudi
  const btnChiudi = (
    <button
      onClick={()=>doFlip(false)}
      style={{width:"100%",marginTop:10,padding:"9px 0",borderRadius:8,border:"1px solid "+G.cardBorder,background:"transparent",color:G.t2,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Chiudi
    </button>
  );

  // Header comune
  const header = (big) => (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
      <span style={{fontFamily:"monospace",fontSize:big?20:18,fontWeight:700,color:G.tw}}>{code}</span>
      <div style={{display:"flex",gap:4}}>
        {isSpezz && <Tag bg="#fef2f2" color="#c62828">Spezzato</Tag>}
        {isMultiCorsa && !isSpezz && <Tag bg={G.glass} color={G.t2}>{corse.length} corse</Tag>}
        {!needsFlip && firstSeg&&firstSeg.vett && <span style={{fontSize:14,color:G.t2}}>vet. {firstSeg.vett}</span>}
      </div>
    </div>
  );

  // Riga orario complessivo
  const rigaOrario = (
    <div style={{background:"#f4f6f9",borderRadius:8,padding:"8px 12px"}}>
      <span style={{fontWeight:800,fontSize:18,color:G.tw}}>{firstSeg&&firstSeg.start}</span>
      <span style={{fontSize:14,color:G.t2,marginLeft:5}}>{firstSeg&&firstSeg.loc_s}</span>
      <span style={{color:"#aab5c2",margin:"0 6px"}}>→</span>
      <span style={{fontWeight:800,fontSize:18,color:G.tw}}>{lastSeg&&lastSeg.end}</span>
      <span style={{fontSize:14,color:G.t2,marginLeft:5}}>{lastSeg&&lastSeg.loc_e}</span>
    </div>
  );

  // Sviluppo corse (retro)
  const sviluppo = corse.map(function(corsaKey, idx){
    const corsaSegs = corsaMap[corsaKey];
    const gap = idx < corse.length-1 ? calcGap(corsaSegs[corsaSegs.length-1].end, corsaMap[corse[idx+1]][0].start) : 0;
    return (
      <div key={corsaKey}>
        <div style={{background:idx%2===0?"#f4f6f9":"#fff8f0",borderLeft:"3px solid "+(idx%2===0?"#003366":"#e65100"),borderRadius:"0 8px 8px 0",padding:"8px 12px",marginBottom:gap>0?0:6}}>
          {corsaSegs[0].vett && <span style={{fontSize:13,fontWeight:700,color:"#e65100",background:"#fff3e0",border:"1px solid #ffcc80",borderRadius:4,padding:"1px 5px",marginRight:6}}>Turno Vet. {corsaSegs[0].vett}</span>}
          <span style={{fontWeight:800,fontSize:17,color:G.tw}}>{corsaSegs[0].start}</span>
          <span style={{fontSize:13,color:G.t2,marginLeft:4}}>{corsaSegs[0].loc_s}</span>
          <span style={{color:"#aab5c2",margin:"0 5px"}}>→</span>
          <span style={{fontWeight:800,fontSize:17,color:G.tw}}>{corsaSegs[corsaSegs.length-1].end}</span>
          <span style={{fontSize:13,color:G.t2,marginLeft:4}}>{corsaSegs[corsaSegs.length-1].loc_e}</span>
        </div>
        {gap>0&&gap<720&&(
          <div style={{textAlign:"center",padding:"3px 0",marginBottom:6}}>
            <span style={{fontSize:13,color:gap>=60?"#c62828":"#e65100",background:gap>=60?"#fef2f2":"#fff3e0",padding:"2px 10px",borderRadius:8,fontWeight:600}}>
              {gap>=60?"Cambio":"Pausa"} {fmtGap(gap)}
            </span>
          </div>
        )}
      </div>
    );
  });

  if (!flipped) {
    return (
      <div className={animClass} style={Object.assign({},glassCard,{padding:"14px 16px",marginBottom:8,borderLeft:isSpezz?"4px solid #e65100":undefined})}>
        {header(true)}
        {rigaOrario}
        {needsFlip && btnApri}
      </div>
    );
  } else {
    return (
      <div className={animClass} style={Object.assign({},glassCard,{padding:"14px 16px",marginBottom:8,borderLeft:isSpezz?"4px solid #e65100":"4px solid #003366"})}>
        {header(false)}
        {sviluppo}
        {btnChiudi}
      </div>
    );
  }
}

/* ===== STORICO ===== */
function Storico({onLoadPreco, onLoadOrari, onUploadPreco, onUploadOrari, onGoToMonth}) {
  const [hist, setHist] = useState(()=>getHistory());
  const [yr, setYr] = useState(()=>new Date().getFullYear());
  const [selMonth, setSelMonth] = useState(null); // mese selezionato per dettaglio
  const precoRef = useRef(null), orariRef = useRef(null);
  const reload = ()=>setHist(getHistory());

  const groups = {};
  hist.forEach(e=>{
    const gk=e.year+"-"+p2(e.month);
    if(!groups[gk])groups[gk]={year:e.year,month:e.month,preco:null,orari:null};
    if(e.type==="preco")groups[gk].preco=e;
    if(e.type==="orari")groups[gk].orari=e;
  });
  const months = [];
  for(let m=1;m<=12;m++){const gk=yr+"-"+p2(m);months.push({month:m,data:groups[gk]||null});}

  const arrowBtn={padding:"10px 18px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:20,fontWeight:700,cursor:"pointer"};

  // Vista dettaglio mese selezionato
  if(selMonth!==null){
    const item=months[selMonth-1];
    const has=item&&item.data;
    const hasPr=has&&has.preco;
    const hasOr=has&&has.orari;
    const mLabel=MESI_IT[selMonth]+" "+yr;

    const fmtDate = (entry) => {
      if(!entry) return "";
      const d = new Date(entry.savedAt||entry.ts||0);
      return isNaN(d.getTime()) ? "" : "Salvato il "+d.toLocaleDateString("it-IT");
    };

    return (
      <div>
        <input ref={precoRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{
          if(e.target.files[0]){
            onUploadPreco(e.target.files[0],()=>{ reload(); });
          }
        }}/>
        <input ref={orariRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{
          if(e.target.files[0]){
            onUploadOrari(e.target.files[0],()=>{ reload(); });
          }
        }}/>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <button onClick={()=>setSelMonth(null)} style={{padding:"8px 14px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Tutti i mesi
          </button>
          <span style={{fontSize:20,fontWeight:800,color:G.tw}}>{mLabel}</span>
        </div>

        {/* Card Preconoscenza */}
        <div style={Object.assign({},glassCard,{padding:"18px 16px",marginBottom:12,borderLeft:"4px solid "+(hasPr?"#003366":G.glassBorder)})}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:800,color:G.t2,textTransform:"uppercase",letterSpacing:"0.05em"}}>Preconoscenza turni</div>
            {hasPr && <span style={{fontSize:11,color:G.t3}}>{fmtDate(has.preco)}</span>}
          </div>
          {hasPr ? (
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{
                const d=loadPrecoByKey(has.preco.key);
                if(d){
                  onLoadPreco(d);
                  if(onGoToMonth) onGoToMonth(yr, selMonth);
                }
              }}
                style={{flex:1,padding:"13px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                Usa turni → Mese
              </button>
              <button onClick={()=>{deleteEntry(has.preco.key);reload();}}
                style={{padding:"13px 16px",borderRadius:10,border:"none",background:G.redBg,color:G.red,fontSize:14,cursor:"pointer"}}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          ) : (
            <button onClick={()=>{if(precoRef.current){precoRef.current.value="";precoRef.current.click();}}}
              style={{width:"100%",padding:"14px 0",borderRadius:10,border:"2px dashed "+G.glassBorder,background:"transparent",color:G.t2,fontSize:15,fontWeight:600,cursor:"pointer"}}>

        </div>

        {/* Card Orari GTT */}
        <div style={Object.assign({},glassCard,{padding:"18px 16px",marginBottom:12,borderLeft:"4px solid "+(hasOr?"#2e7d32":G.glassBorder)})}>

            <div style={{fontSize:13,fontWeight:800,color:G.t2,textTransform:"uppercase",letterSpacing:"0.05em"}}>Orari GTT</div>
