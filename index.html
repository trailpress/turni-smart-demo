/* ===== HELPERS ===== */
function p2(n) { return String(n).padStart(2,"0"); }
function toIso(d) { return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate()); }
function toFmt(d) { return p2(d.getDate())+"/"+p2(d.getMonth()+1)+"/"+d.getFullYear(); }
function toWd(d) { var i = d.getDay(); return WK[i===0?6:i-1]; }
function fT(s) {
  if (!s) return "";
  var h = parseInt(s.slice(0,2)), m = s.slice(2);
  return h >= 24 ? p2(h-24)+":"+m+"+1" : p2(h)+":"+m;
}
function fD(s) { if (!s) return ""; return parseInt(s.slice(0,2))+"h "+s.slice(2)+"m"; }
function hhmm2min(s) { if (!s||s.length<4) return 0; return parseInt(s.slice(0,2))*60+parseInt(s.slice(2)); }
function hm2min(s) { if (!s) return 0; var p=s.split(":"); return parseInt(p[0])*60+parseInt(p[1]); }
function fmtGap(m) { if (m<60) return m+"min"; var h=Math.floor(m/60),r=m%60; return r>0?h+"h "+r+"min":h+"h"; }
function calcGap(endStr,startStr) { var e=hm2min(endStr),s=hm2min(startStr),g=s-e; if(g<0)g+=1440; return g; }
function isRealSpezzato(segs) { return segs.length >= 2; }
function buildDevKey(v) {
  if (v.t!=="turno") return null;
  var tn=parseInt(v.n);
  if(isNaN(tn))return null;
  var ln=v.l||"";
  // Genera tutte le varianti possibili della chiave linea
  // es. "5B" → ["05B", "5B"], "05" → ["05", "5"], "38" → ["38"]
  var lnNum=parseInt(ln);
  var suffix=ln.replace(/^\d+/,""); // es. "B" da "5B"
  var variants=[];
  if(!isNaN(lnNum)){
    variants.push(String(lnNum).padStart(2,'0')+suffix); // "05B"
    variants.push(String(lnNum)+suffix);                  // "5B"
    if(!suffix){
      variants.push(String(lnNum).padStart(2,'0'));        // "05"
      variants.push(String(lnNum));                        // "5"
    }
  } else {
    variants.push(ln);
  }
  // Chiave preferita (prima variante)
  return variants[0]+' '+String(tn);
}
function buildDevKeyAll(v) {
  // Restituisce tutte le varianti di chiave per cercare negli orari
  if (v.t!=="turno") return [];
  var tn=parseInt(v.n);
  if(isNaN(tn))return [];
  var ln=v.l||"";
  var lnNum=parseInt(ln);
  var suffix=ln.replace(/^\d+/,"");
  var variants=[];
  if(!isNaN(lnNum)){
    variants.push(String(lnNum).padStart(2,'0')+suffix);
    variants.push(String(lnNum)+suffix);
    if(!suffix){
      variants.push(String(lnNum).padStart(2,'0'));
      variants.push(String(lnNum));
    }
  } else {
    variants.push(ln);
  }
  return variants.map(function(l){return l+' '+String(tn);});
}
function isNotturno(v) {
  if (v.t!=="turno"||!v.i||!v.e) return false;
  var ini=hhmm2min(v.i),ter=hhmm2min(v.e);
  return ini>=1020||ter>1440||(ter>0&&ter<=165);
}
function checkRiposoBreve(days,iso) {
  var v=days[iso]; if(!v||v.t!=="turno"||!v.e) return false;
  var d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+1);
  var nv=days[toIso(d)]; if(!nv||nv.t!=="turno"||!nv.i) return false;
  var terM=hhmm2min(v.e),ni=hhmm2min(nv.i);
  var gap=terM>1440?ni-(terM-1440):(1440-terM)+ni;
  return gap>0&&gap<660;
}
function parseInput(txt,refY) {
  var t=txt.trim().toLowerCase().replace(/^che turno faccio il\s*/,"").replace(/\?$/,"").trim();
  var m=t.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?$/);

  m=t.match(/^(\d{1,2})\s+([a-z\u00e0-\u00fa]+)$/);
  if(m) { var mo=IM[m[2]]; if(mo) return new Date(refY,mo-1,+m[1]); }
  m=t.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m) return new Date(+m[1],+m[2]-1,+m[3]);
  return null;
}

function precoKey(y,m) { return "ts_preco_"+y+"-"+p2(m); }

}

  idx.sort(function(a,b){return(b.year*100+b.month)-(a.year*100+a.month);});

/* ===== RIPOSI CYCLE ===== */
function calcRiposiCycle(data) {
  if(!data||!data.days) return null;
  var rpDates=[];
  Object.keys(data.days).forEach(function(iso){var v=data.days[iso];if(v&&REST_CODES[v.t])rpDates.push(iso);});
  rpDates.sort();
  if(rpDates.length<2) return null;
  var anchor=null;
  for(var i=0;i<rpDates.length;i++){
    if(i>0){var prev=new Date(rpDates[i-1]+"T00:00:00"),curr=new Date(rpDates[i]+"T00:00:00");
      if(Math.round((curr-prev)/86400000)===1) continue;}
    anchor=rpDates[i]; break;
  }
  return {anchor:anchor,cycle:6};
}
function projectRiposi(rc,yr,mo) {
  if(!rc||!rc.anchor) return {};
  var set={},anc=new Date(rc.anchor+"T12:00:00");
  var diffDays=Math.floor((new Date(yr,mo-1,1).getTime()-anc.getTime())/86400000);
  var steps=Math.floor(diffDays/6)-2;
  for(var i=steps;i<steps+10;i++){
    var d=new Date(anc.getTime());d.setDate(d.getDate()+i*6);
    var dow=d.getDay(),addArr=dow===6?[0,1]:dow===0?[-1,0]:dow===1?[-1,0]:[0];
    addArr.forEach(function(off){
      var dd=new Date(d.getTime());dd.setDate(dd.getDate()+off);
      if(dd.getMonth()===mo-1&&dd.getFullYear()===yr) set[toIso(dd)]=1;
    });
  }
  return set;
}
function saveRiposiCycle(data){var rc=calcRiposiCycle(data);if(rc)DB.set("ts_riposi_cycle",rc);}
function loadRiposiCycle(){return DB.get("ts_riposi_cycle");}

/* ===== PARSERS ===== */
var RE_LINE=/(\d{2}\/\d{2}\/\d{4})\s+(DOM|LUN|MAR|MER|GIO|VEN|SAB)\s+(.*)/;
function parseDMY(s){var p=s.split("/");return new Date(+p[2],+p[1]-1,+p[0]);}
function parseShift(rest){
  var tk=rest.split(/\s+/);if(tk.length<8)return null;
  var geIdx=-1;for(var i=0;i<tk.length;i++){if(tk[i]==="GE"){geIdx=i;break;}}
  if(geIdx<0||geIdx+2>=tk.length)return null;
  var turno=tk[geIdx+1],cod=tk[geIdx+2],after=tk.slice(geIdx+3);
  var times=[],locs=[],dirs=[];
  after.forEach(function(t){
    if(/^\d{4}$/.test(t))times.push(t);
    else if(/^[A-Z]{2,4}$/.test(t)){locs.push(t);dirs.push("");}
    else if(/^[AR]$/.test(t)){if(dirs.length>0)dirs[dirs.length-1]=t;}
  });
  return{t:"turno",l:tk[0],n:turno,c:cod,i:times[0]||"",li:locs[0]||"",di:dirs[0]||"",e:times[1]||"",le:locs[1]||"",de:dirs[1]||"",d:times[2]||""};
}
function parseShiftFromPaste(text){
  if(!text)return null;
  var clean=text.replace(/[\r\n\t]/g," ").replace(/\u00a0/g," ").replace(/\s+/g," ").trim();
  clean=clean.replace(/^\d{2}[.\/]\d{2}[.\/]\d{4}\s*/,"");
  var tk=clean.split(" ");
  var geIdx=-1;for(var i=0;i<tk.length;i++){if(tk[i]==="GE"){geIdx=i;break;}}
  if(geIdx<0)return null;
  var nums=[];for(var j=0;j<geIdx;j++){if(/^\d+$/.test(tk[j]))nums.push(tk[j]);}
  if(nums.length<2)return null;
  var linea=nums[nums.length-2],turnoN=nums[nums.length-1];
  var after=tk.slice(geIdx+1),times=[],locs=[],dirs=[];
  after.forEach(function(t){
    if(/^\d{4}$/.test(t))times.push(t);
    else if(/^[A-Z]{2,4}$/.test(t)){locs.push(t);dirs.push("");}
    else if(/^[AR]$/.test(t)){if(dirs.length>0)dirs[dirs.length-1]=t;}
  });
  if(times.length<2)return null;
  return{t:"turno",l:linea,n:turnoN,c:"",i:times[0],li:locs[0]||"",di:dirs[0]||"",e:times[1],le:locs[1]||"",de:dirs[1]||"",d:times[2]||"",g:"",_pasted:true};
}
function parsePreconoscenza(text){
  var lines=text.split("\n"),days={},nome="",matricola="",dIn=null,dTe=null;
  var allText=text.replace(/\n/g," ");
  var mn=allText.match(/Nominativo[:\s]+([A-Z][A-Z\s]+?)(?:\s{2,}|\s*$)/i);if(mn)nome=mn[1].trim();
  if(!nome){mn=allText.match(/Nominativo[:\s]+(.+?)(?:Stabilimento|Data|Gr\.|$)/i);if(mn)nome=mn[1].trim();}
  if(!nome){lines.forEach(function(raw){if(nome)return;var m=raw.match(/Nominativo[:\s]+([A-Z][A-Za-z\s]+)/i);if(m)nome=m[1].trim();});}
  var mm=allText.match(/Codice\s*Personale[:\s]*(\d+)/i);if(mm)matricola=mm[1];
  if(!matricola){lines.forEach(function(raw){if(matricola)return;var m=raw.match(/Codice\s*Personale[:\s]*(\d+)/i);if(m)matricola=m[1];});}
  lines.forEach(function(raw){
    var line=raw.trim();
    var mi=line.match(/Data\s*Inizio:?\s*(\d{2}\/\d{2}\/\d{4})/i);if(mi)dIn=parseDMY(mi[1]);
    var mt=line.match(/Data\s*Termine:?\s*(\d{2}\/\d{2}\/\d{4})/i);if(mt)dTe=parseDMY(mt[1]);
  });
  lines.forEach(function(raw){
    var line=raw.trim(),lm=line.match(RE_LINE);if(!lm)return;
    var dateStr=lm[1],gg=lm[2],rest=lm[3].trim(),date;
    try{date=parseDMY(dateStr);}catch(e){return;}
    var iso=toIso(date),tokens=rest.split(/\s+/),first=tokens[0]?tokens[0].toUpperCase():"";
    if(SPECIAL[first]){
      var entry={t:first,g:gg,x:tokens.slice(1).join(" ")};
      if(first==="RIS"){var bc="";for(var bi=1;bi<tokens.length;bi++){if(/^B\d{2}$/.test(tokens[bi])){bc=tokens[bi];break;}}entry.ball=bc;}
      days[iso]=entry;
    }else{var shift=parseShift(rest);if(shift){shift.g=gg;days[iso]=shift;}}
  });
  if(!dIn){var sorted=Object.keys(days).sort();if(sorted.length){dIn=new Date(sorted[0]+"T00:00:00");dTe=new Date(sorted[sorted.length-1]+"T00:00:00");}}
  return{days:days,nome:nome,matricola:matricola,dIn:dIn,dTe:dTe,rawText:text};
}

/* ===== PARSER ORARI (stitching iterativo) ===== */
var RE_SEG_STR = "(?:([A-Z0-9]{2}\\s+\\d{3})\\s+)?([A-Z0-9]+)\\s*/\\s*(\\d+)\\s+(\\d{2}\\.\\d{2})\\s+([A-Z]{2,4})\\s+([AR-])\\s+(\\d{2}\\.\\d{2})\\s+([A-Z]{2,4})";
function parseOrariPageLines(fullText,gt,ver,devs){
  var lines=fullText.split("\n"),pageSegs=[];
  lines.forEach(function(line){
    var lineMid=line.length/2;
    var codeLine=line.trim().match(/^([A-Z0-9]{2})\s+(\d{3})$/);
    if(codeLine){return;} // intestazione standalone, ignorata
    var re=new RegExp(RE_SEG_STR,"g"),m;
    while((m=re.exec(line))!==null){
      var code=m[1]?m[1].replace(/\s+/g," ").trim():null;
      var seg={ln:m[2],vett:m[3],start:m[4].replace(".",":"),loc_s:m[5],dir:m[6]!=="-"?m[6]:"",end:m[7].replace(".",":"),loc_e:m[8],gt:gt,ver:ver};
      pageSegs.push({code:code,seg:seg,done:false});
    }
  });

  /* PASSATA 1: segmenti con codice esplicito + orfani immediatamente successivi */
  var codeEnds={};
  var runCounters={};
  var lastExplicitCode=null; // ultimo codice esplicito visto nel testo

  pageSegs.forEach(function(ps){
    if(ps.code){
      // Segmento con codice esplicito
      var parts=ps.code.split(" ");
      var nc=parts.length===2?p2(parseInt(parts[0]))+" "+String(parseInt(parts[1])):ps.code;
      // Gestisce suffisso lettera (5B → 05B)
      var lnRaw=parts[0],lnNum=parseInt(lnRaw),lnSuf=lnRaw.replace(/^\d+/,"");
      if(!isNaN(lnNum))nc=String(lnNum).padStart(2,"0")+lnSuf+" "+String(parseInt(parts[1]));
      ps.normCode=nc;
      var tnNum=parseInt(nc.split(" ")[1]||"999");
      var isSpez=tnNum<100;
      var prev=codeEnds[nc];
      var gapOk=false;
      if(prev&&ps.seg.start){
        var pe=prev.e,ns=ps.seg.start;
        var gapMin=hm2min(ns)-hm2min(pe);
        if(gapMin<0)gapMin+=1440;
        gapOk=(gapMin<=480);
      }
      var runId;
      if(isSpez&&prev&&gapOk){
        runId=prev.run_id;
      } else {
        runCounters[nc]=(runCounters[nc]||0)+1;
        runId=runCounters[nc];
      }
      ps.seg.run_id=runId;
      ps.done=true;
      devs[nc]=devs[nc]||[];
      devs[nc].push(ps.seg);
      codeEnds[nc]={e:ps.seg.end,l:ps.seg.loc_e,run_id:runId};
      lastExplicitCode=nc;
    } else if(lastExplicitCode){
      // Orfano: assegna al TURNO PIÙ RECENTE nel testo (lastExplicitCode)
      // se il gap temporale è ragionevole (< 8 ore = stessa giornata)
      var prev2=codeEnds[lastExplicitCode];
      var gapOk2=false;
      if(prev2&&ps.seg.start){
        var gapMin2=hm2min(ps.seg.start)-hm2min(prev2.e);
        if(gapMin2<0)gapMin2+=1440;
        gapOk2=(gapMin2>=0&&gapMin2<=480);
      }
      if(gapOk2){
        // Assegna direttamente al turno precedente nel testo
        ps.seg.run_id=codeEnds[lastExplicitCode].run_id;
        ps.done=true;
        devs[lastExplicitCode]=devs[lastExplicitCode]||[];
        devs[lastExplicitCode].push(ps.seg);
        codeEnds[lastExplicitCode]={e:ps.seg.end,l:ps.seg.loc_e,run_id:ps.seg.run_id};
      }
      // Se non assegnato (gap > 8h), lo stitching normale lo gestirà
    }
  });

  /* PASSATA 2: stitching per orfani rimasti (turni non spezzati) */
  var changed=true,maxIter=15;
  while(changed&&maxIter-->0){
    changed=false;
    pageSegs.forEach(function(ps){
      if(ps.done)return;
      var best=null,ks=Object.keys(codeEnds);
      for(var i=0;i<ks.length;i++){if(codeEnds[ks[i]].e===ps.seg.start&&codeEnds[ks[i]].l===ps.seg.loc_s){best=ks[i];break;}}
      if(!best){for(var j=0;j<ks.length;j++){if(codeEnds[ks[j]].e===ps.seg.start){best=ks[j];break;}}}
      if(best){
        ps.done=true;changed=true;
        ps.seg.run_id=codeEnds[best].run_id;
        devs[best]=devs[best]||[];
        devs[best].push(ps.seg);
        codeEnds[best]={e:ps.seg.end,l:ps.seg.loc_e,run_id:codeEnds[best].run_id};
      }
    });
  }
}

function mergeDevs(target,source){
  Object.keys(source).forEach(function(code){
    if(!target[code])target[code]=[];
    source[code].forEach(function(seg){
      if(!target[code].some(function(e){return e.start===seg.start&&e.loc_s===seg.loc_s&&e.end===seg.end&&e.gt===seg.gt&&e.ln===seg.ln;}))
        target[code].push(seg);
    });
  });
}

/* ===== FILTRO GT (no fallback) ===== */
function getFilteredDevSegs(devs,v,date){
  if(v&&v._pasted&&(!devs||Object.keys(devs).length===0)) return [];
  // Prova tutte le varianti di chiave (gestisce linee tipo 5B, 38B ecc.)
  var segs=[];
  var keys=buildDevKeyAll(v);
  for(var ki=0;ki<keys.length;ki++){
    if(devs[keys[ki]]&&devs[keys[ki]].length>0){segs=devs[keys[ki]];break;}
  }
  var dk=keys[0]||null;
  if(segs.length>0&&date){
    var dow=date.getDay(),dt2=dow===0?"FEST":dow===6?"SAB":"LV";
    segs=segs.filter(function(s){
      var g=(s.gt||"").toUpperCase();
      if(!g)return true;
      var isLV=g.indexOf("LUN")>=0||g.indexOf("MAR")>=0||g.indexOf("MER")>=0||g.indexOf("GIO")>=0||g.indexOf("VEN")>=0||g.indexOf("FERIALE")>=0||g.indexOf("FERIALI")>=0;
      if(dt2==="LV")return isLV;
      if(dt2==="SAB")return g.indexOf("SAB")>=0;
      return g.indexOf("FEST")>=0||g.indexOf("DOM")>=0||g.indexOf("DOMENICA")>=0;
    });
  }
  if(!segs.length) return [];

  // Usa run_id assegnato dal parser per separare corse distinte dello stesso turno
  var hasRunId=segs.some(function(s){return s.run_id!==undefined;});
  if(hasRunId){
    var runs={};
    segs.forEach(function(s){
      var k=s.run_id!==undefined?String(s.run_id):"_";
      if(!runs[k])runs[k]=[];
      runs[k].push(s);
    });
    var runKeys=Object.keys(runs);
    if(runKeys.length>1&&v&&v.i){
      var turnoMin=hm2min(v.i.slice(0,2)+":"+v.i.slice(2));
      var best=runKeys[0],bestDiff=99999;
      runKeys.forEach(function(k){
        var s0=runs[k].slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);})[0];
        var diff=Math.abs(hm2min(s0.start)-turnoMin);
        if(diff<bestDiff){bestDiff=diff;best=k;}
      });
      return runs[best].slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});
    }
    return (runs[runKeys[0]]||segs).slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});
  }

  // Fallback gap temporale
  var sorted=segs.slice().sort(function(a,b){return hm2min(a.start)-hm2min(b.start);});
  if(sorted.length<=1) return sorted;
  var corse=[],corsaCorrente=[sorted[0]];
  for(var i=1;i<sorted.length;i++){
    var gap=hm2min(sorted[i].start)-hm2min(sorted[i-1].end);
    if(gap<0||gap>5){corse.push(corsaCorrente);corsaCorrente=[sorted[i]];}
    else{corsaCorrente.push(sorted[i]);}
  }
  corse.push(corsaCorrente);
  if(corse.length===1) return corse[0];
  if(v&&v.i){
    var tMin=hm2min(v.i.slice(0,2)+":"+v.i.slice(2));
    var bestC=corse[0],bestD=99999;
    corse.forEach(function(c){var d=Math.abs(hm2min(c[0].start)-tMin);if(d<bestD){bestD=d;bestC=c;}});
    return bestC;
  }
  return corse[0];
}

function fireAlarm(label){

  try{var ctx=new(window.AudioContext||window.webkitAudioContext)();function beep(freq,start,dur){var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type="square";g.gain.value=0.3;o.start(start);o.stop(start+dur);}for(var i=0;i<5;i++){beep(880,ctx.currentTime+i*0.6,0.3);beep(1100,ctx.currentTime+i*0.6+0.3,0.2);}}catch(e){}
  alert("SVEGLIA! "+label);
}

}

/* Renderizza una pagina pdf.js su canvas e restituisce base64 JPEG */
function renderPageToJpeg(page, scale){
  scale = scale || 1.5;
  var viewport = page.getViewport({scale: scale});
  var canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  var ctx = canvas.getContext('2d');
  return page.render({canvasContext: ctx, viewport: viewport}).promise.then(function(){
    // Restituisce base64 JPEG (qualità 0.75 per bilanciare size/leggibilità)
    return canvas.toDataURL('image/jpeg', 0.75).split(',')[1];
  });
}

/* ===== CLAUDE API OCR per tabella turni ===== */
/* Manda un batch di immagini pagine a Claude e riceve i dati strutturati */
function ocrBatchPages(images, gt, progressCb){
  var prompt = "Queste sono pagine di tabelle turni GTT Torino (gruppo di servizio: " + gt + ").\n" +
    "Per ogni riga della tabella turni estrai:\n" +
    "- codice: numero linea + numero turno (es '02 081', '38 304')\n" +
    "- start: ora inizio formato HH.MM (es '10.53')\n" +
    "- loc_s: luogo inizio (es 'PITA', 'GERB')\n" +
    "- dir: direzione A o R o vuoto\n" +
    "- end: ora fine formato HH.MM (es '13.37')\n" +
    "- loc_e: luogo fine\n" +
    "- vett: numero vettura (es '31')\n\n" +
    "Includi TUTTE le righe, anche le continuazioni senza codice turno (code=null).\n" +
    "IMPORTANTE: le righe di continuazione (senza codice linea/turno) hanno code=null.\n" +
    "Rispondi SOLO con JSON array: [{code,start,loc_s,dir,end,loc_e,vett},...]\n" +
    "Nessun testo aggiuntivo, solo JSON valido.";

  var content = [{type:"text", text: prompt}];
  images.forEach(function(b64){
    content.push({type:"image", source:{type:"base64", media_type:"image/jpeg", data:b64}});
  });

  return fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:4000,
      messages:[{role:"user", content:content}]
    })
  }).then(function(r){return r.json();}).then(function(data){
    var text = (data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
    // Estrai JSON dalla risposta
    var clean = text.replace(/```json|```/g,"").trim();
    // Trova il primo '[' e l'ultimo ']'
    var start = clean.indexOf('['), end = clean.lastIndexOf(']');
    if(start>=0 && end>start) clean = clean.slice(start, end+1);
    try{ return JSON.parse(clean); }catch(e){ return []; }
  }).catch(function(){ return []; });
}

/* ===== CONVERTE RISULTATI OCR IN STRUTTURA devs ===== */
function ocrResultsToDevs(results, gt, devs){
  // results = [{code, start, loc_s, dir, end, loc_e, vett}, ...]
  // Stessa logica stitching del parser testo
  var pageSegs = results.map(function(r){
    return {
      code: r.code ? normKey(r.code) : null,
      seg: {
        ln: r.code ? r.code.split(' ')[0] : '',
        vett: r.vett||'',
        start: (r.start||'').replace('.',':'),
        loc_s: r.loc_s||'',
        dir: r.dir||'',
        end: (r.end||'').replace('.',':'),
        loc_e: r.loc_e||'',
        gt: gt, ver:''
      },
      done: false
    };
  });

  var codeEnds = {};
  pageSegs.forEach(function(ps){
    if(ps.code){
      ps.done=true;
      devs[ps.code]=devs[ps.code]||[];
      devs[ps.code].push(ps.seg);
      codeEnds[ps.code]={e:ps.seg.end,l:ps.seg.loc_e};
    }
  });

  var changed=true, maxIter=15;
  while(changed&&maxIter-->0){
    changed=false;
    pageSegs.forEach(function(ps){
      if(ps.done)return;
      var best=null, ks=Object.keys(codeEnds);
      for(var i=0;i<ks.length;i++){
        if(codeEnds[ks[i]].e===ps.seg.start&&codeEnds[ks[i]].l===ps.seg.loc_s){best=ks[i];break;}
      }
      if(!best){for(var j=0;j<ks.length;j++){if(codeEnds[ks[j]].e===ps.seg.start){best=ks[j];break;}}}
      if(best){ps.done=true;changed=true;devs[best]=devs[best]||[];devs[best].push(ps.seg);codeEnds[best]={e:ps.seg.end,l:ps.seg.loc_e};}
    });
  }
}

function normKey(code){
  if(!code)return null;
  var parts=code.trim().split(/\s+/);
  if(parts.length>=2){
    var ln=parts[0], tn=parseInt(parts[1]);
    if(!isNaN(tn)){
      var lnNum=parseInt(ln);
      var suffix=ln.replace(/^\d+/,""); // es. "B" da "5B"
      var lnStr=isNaN(lnNum)?ln:String(lnNum).padStart(2,'0')+suffix;
      return lnStr+' '+String(tn);
    }
  }
  return code;
}

function extractText(page){
  // Prova entrambe le modalità di getTextContent e usa quella con più match
  var RE_EVAL=/(?:[A-Z0-9]{2}\s+\d{3}\s+)?[A-Z0-9]+\s*\/\s*\d+\s+\d{2}\.\d{2}\s+[A-Z]{2,4}\s+[AR-]\s+\d{2}\.\d{2}\s+[A-Z]{2,4}/g;
  function countMatches(text){return(text.match(RE_EVAL)||[]).length;}

  function buildText(items, rotation, pageW, pageH){
    if(!items.length)return"";
    function byX(its){
      var rowMap={};
      its.forEach(function(it){
        var found=null,keys=Object.keys(rowMap);
        for(var i=0;i<keys.length;i++){if(Math.abs(parseInt(keys[i])-it.x)<=8){found=keys[i];break;}}
        if(!found){found=String(it.x);rowMap[found]=[];}
        rowMap[found].push(it);
      });
      var xKeys=Object.keys(rowMap).map(Number).sort(function(a,b){return b-a;});
      var lines=[];
      xKeys.forEach(function(xk){
        var row=rowMap[String(xk)].slice().sort(function(a,b){return a.y-b.y;});
        var s=row.map(function(r){return r.str;}).join(" ").trim();
        if(s)lines.push(s);
      });
      return lines.join("\n");
    }
    function byY(its){
      var rowMap={};
      its.forEach(function(it){
        var found=null,keys=Object.keys(rowMap);
        for(var i=0;i<keys.length;i++){if(Math.abs(parseInt(keys[i])-it.y)<=8){found=keys[i];break;}}
        if(!found){found=String(it.y);rowMap[found]=[];}
        rowMap[found].push(it);
      });
      var yKeys=Object.keys(rowMap).map(Number).sort(function(a,b){return b-a;});
      var lines=[];
      yKeys.forEach(function(yk){
        var row=rowMap[String(yk)].slice().sort(function(a,b){return a.x-b.x;});
        var s=row.map(function(r){return r.str;}).join(" ").trim();
        if(s)lines.push(s);
      });
      return lines.join("\n");
    }
    function byYtop(its){
      its.forEach(function(it){it.yTop=pageH-it.y;});
      its.sort(function(a,b){var dy=a.yTop-b.yTop;if(Math.abs(dy)>5)return dy;return a.x-b.x;});
      var lines=[],curY=null,curLine=[];
      its.forEach(function(it){
        var tol=Math.max(3,(it.h||10)*0.4);
        if(curY===null||Math.abs(it.yTop-curY)>tol){if(curLine.length)lines.push(curLine.slice());curLine=[it];curY=it.yTop;}
        else{curLine.push(it);}
      });
      if(curLine.length)lines.push(curLine);
      return lines.map(function(ln){return ln.sort(function(a,b){return a.x-b.x;}).map(function(r){return r.str;}).join(" ");}).join("\n");
    }

    var primary,secondary,tertiary;
    if(rotation===90||rotation===270){primary=byX;secondary=byY;tertiary=byYtop;}
    else if(pageW>pageH){primary=byY;secondary=byX;tertiary=byYtop;}
    else{primary=byYtop;secondary=byY;tertiary=byX;}

    var tA=primary(items.slice()),mA=countMatches(tA);if(mA>0)return tA;
    var tB=secondary(items.slice()),mB=countMatches(tB);if(mB>mA)return tB;
    var tC=tertiary(items.slice()),mC=countMatches(tC);if(mC>mB)return tC;
    return tA||tB||tC;
  }

  function getItems(c){
    var items=[];
    c.items.forEach(function(it){
      if(!it.str||!it.str.trim())return;
      items.push({x:Math.round(it.transform[4]),y:Math.round(it.transform[5]),str:it.str.trim(),h:it.height||10});
    });
    return items;
  }

  var rotation=page.rotate||0;
  var vp=page.view,pageW=vp?(vp[2]-vp[0]):595,pageH=vp?(vp[3]-vp[1]):842;

  // Prova con disableCombineTextItems=true
  return page.getTextContent({disableCombineTextItems:true}).then(function(c1){
    var items1=getItems(c1);
    var text1=buildText(items1,rotation,pageW,pageH);
    var m1=countMatches(text1);

    // Prova anche senza disableCombineTextItems
    return page.getTextContent({disableCombineTextItems:false}).then(function(c2){
      var items2=getItems(c2);
      var text2=buildText(items2,rotation,pageW,pageH);
      var m2=countMatches(text2);

      return m2>m1?text2:text1;
    }).catch(function(){return text1;});
  });
}
</script>

        {v.t==="RIS" && onPaste && (
          <div style={{marginTop:12}}>
            {!showPaste ? (
              <button onClick={e=>{e.stopPropagation();setShowPaste(true);setPasteErr("");setPasteTxt("");}}
                style={{width:"100%",padding:"12px 0",borderRadius:10,border:"2px solid #003366",background:"#003366",color:"#ffd100",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                Incolla turno assegnato
              </button>
            ) : (
              <div onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:11,color:"#8a9ab0",marginBottom:6}}>Incolla la riga — conferma automatica:</div>
                <textarea value={pasteTxt} onInput={e=>setPasteTxt(e.target.value)} onChange={e=>setPasteTxt(e.target.value)}
                  onPaste={e=>{
                    let clip="";
                    try{clip=(e.clipboardData||window.clipboardData).getData("text");}catch(x){}
                    if(!clip){setTimeout(()=>{if(e.target&&e.target.value)clip=e.target.value;if(clip){const parsed=parseShiftFromPaste(clip);if(parsed){parsed.g=toWd(date).toUpperCase().slice(0,3);if(onPaste){onPaste(iso,parsed);}else{setLocalV(parsed);}setShowPaste(false);setPasteTxt("");}else{setPasteTxt(clip);setPasteErr("Formato non riconosciuto.");}}},150);return;}
                    e.preventDefault();
                    const parsed=parseShiftFromPaste(clip);
                    if(parsed){parsed.g=toWd(date).toUpperCase().slice(0,3);if(onPaste){onPaste(iso,parsed);}else{setLocalV(parsed);}setShowPaste(false);setPasteTxt("");}
                    else{setPasteTxt(clip);setPasteErr("Formato non riconosciuto.");}
                  }}
                  placeholder="es. N B 44 107 GE 0713 GERB 1307 OMER R 0554"
                  style={{width:"100%",minHeight:56,padding:"10px 12px",borderRadius:10,border:"2px solid #003366",background:"#fff",color:"#003366",fontSize:13,fontFamily:"monospace",outline:"none",resize:"none",boxSizing:"border-box"}}
                  autoFocus/>
                <button onClick={e=>{e.stopPropagation();setShowPaste(false);setPasteErr("");setPasteTxt("");}}
                  style={{width:"100%",marginTop:6,padding:"9px 0",borderRadius:8,border:"1px solid #dce1e8",background:"transparent",color:"#8a9ab0",fontSize:12,cursor:"pointer"}}>Annulla</button>
                {pasteErr && <div style={{color:"#e53935",fontSize:11,marginTop:4}}>{pasteErr}</div>}
              </div>
            )}
          </div>
        )}
        <ActionButtons stopFlip={false}/>
      </div>
    );
  }

  /* ---- Card turno a una ripresa (no flip) ---- */
  if (!isSpezzato) {
    return (
      <div style={Object.assign({},cardBase,{marginBottom:10})}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:12,color:"#8a9ab0",fontWeight:600}}>{toWd(date)} {toFmt(date)}</span>
          <div style={{display:"flex",gap:4}}>
            {night && <Tag bg={G.purpleBg} color={G.purple}>Serale</Tag>}
            {rb && <Tag bg={G.redBg} color={G.red}>Rip. breve</Tag>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
          <span style={{fontFamily:"'SF Mono',monospace",fontSize:26,fontWeight:800,color:"#003366",letterSpacing:"-0.02em"}}>{code}</span>
          {firstVett && <span style={{fontSize:13,color:"#8a9ab0"}}>vet. {firstVett}</span>}
          {v.c && <span style={{fontSize:11,color:"#aab5c2"}}>cod. {v.c}</span>}
        </div>
        <div style={{background:"#f4f6f9",borderRadius:10,padding:"10px 14px"}}>
          <span style={{fontWeight:800,fontSize:18,color:"#003366"}}>{fT(v.i)}</span>
          <span style={{fontSize:13,color:"#5a6b80",marginLeft:5}}>{v.li}</span>
          <span style={{color:"#aab5c2",margin:"0 8px"}}>→</span>
          <span style={{fontWeight:800,fontSize:18,color:"#003366"}}>{fT(v.e)}</span>
          <span style={{fontSize:13,color:"#5a6b80",marginLeft:5}}>{v.le}</span>
          {v.d && <span style={{marginLeft:10,fontSize:12,color:"#8a9ab0"}}>{fD(v.d)}</span>}
        </div>
        <ActionButtons stopFlip={false}/>
      </div>
    );
  }

  /* ---- Card turno SPEZZATO — con flip animata ---- */
  // Card spezzato: mostra fronte o retro in base a stato
  if (isSpezzato) {
    if (!flipped) {
      // FRONTE
      return (
        <div className={animClass} style={Object.assign({},cardBase,{marginBottom:10})}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:12,color:"#8a9ab0",fontWeight:600}}>{toWd(date)} {toFmt(date)}</span>
            <div style={{display:"flex",gap:4}}>
              <Tag bg="#fef2f2" color="#c62828">Spezzato</Tag>
              {night && <Tag bg={G.purpleBg} color={G.purple}>Serale</Tag>}
              {rb && <Tag bg={G.redBg} color={G.red}>Rip. breve</Tag>}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:10}}>
            <span style={{fontFamily:"'SF Mono',monospace",fontSize:26,fontWeight:800,color:"#003366",letterSpacing:"-0.02em"}}>{code}</span>
            {firstVett && <span style={{fontSize:13,color:"#8a9ab0"}}>vet. {firstVett}</span>}
            {v.c && <span style={{fontSize:11,color:"#aab5c2"}}>cod. {v.c}</span>}
          </div>
          <div style={{background:"#f4f6f9",borderRadius:10,padding:"10px 14px",marginBottom:10}}>
            <span style={{fontWeight:800,fontSize:18,color:"#003366"}}>{fT(v.i)}</span>
            <span style={{fontSize:13,color:"#5a6b80",marginLeft:5}}>{v.li}</span>
            <span style={{color:"#aab5c2",margin:"0 8px"}}>→</span>
            <span style={{fontWeight:800,fontSize:18,color:"#003366"}}>{fT(v.e)}</span>
            <span style={{fontSize:13,color:"#5a6b80",marginLeft:5}}>{v.le}</span>
            {v.d && <span style={{marginLeft:10,fontSize:12,color:"#8a9ab0"}}>{fD(v.d)}</span>}
          </div>
          <button
            onClick={()=>{
              setAnimClass("flip-shrink");
              setTimeout(()=>{setFlipped(true);setAnimClass("flip-grow");},200);
            }}
            style={{width:"100%",padding:"10px 0",borderRadius:10,border:"2px solid #e65100",background:"rgba(230,81,0,0.06)",color:"#e65100",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:10}}>
            {devSegs.length>0 ? "Vedi "+devSegs.length+" segmenti ↓" : "Vedi sviluppo ↓"}
          </button>
          <ActionButtons stopFlip={false}/>
        </div>
      );
    } else {
      // RETRO
      return (
        <div className={animClass} style={Object.assign({},cardBase,{marginBottom:10,borderLeft:"4px solid #e65100"})}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <span style={{fontSize:12,color:"#8a9ab0"}}>{toWd(date)} {toFmt(date)}</span>
              <span style={{fontFamily:"monospace",fontSize:16,fontWeight:800,color:"#003366",marginLeft:8}}>{code}</span>
            </div>
            <Tag bg="#fef2f2" color="#c62828">Spezzato</Tag>
          </div>
          {devSegs.length===0 ? (
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:28,marginBottom:8}}>📋</div>
              <div style={{fontSize:13,fontWeight:700,color:"#003366",marginBottom:4}}>Sviluppo non disponibile</div>
              <div style={{fontSize:12,color:"#8a9ab0",marginBottom:12,lineHeight:1.5}}>
                Carica il PDF Orari Linee GTT per vedere i segmenti
              </div>
            </div>
          ) : devSegs.map((s,idx)=>{
            const gap=idx<devSegs.length-1?calcGap(s.end,devSegs[idx+1].start):0;
            return (
              <div key={idx}>
                <div style={{background:idx%2===0?"#f4f6f9":"#fff8f0",borderLeft:"3px solid "+(idx%2===0?"#003366":"#e65100"),borderRadius:"0 10px 10px 0",padding:"8px 12px",marginBottom:gap>0?0:6}}>
                  <span style={{fontWeight:800,fontSize:16,color:"#003366"}}>{s.start}</span>
                  <span style={{fontSize:12,color:"#5a6b80",marginLeft:5}}>{s.loc_s}</span>
                  {s.dir && <span style={{fontSize:10,fontWeight:700,marginLeft:4,color:s.dir==="A"?"#003366":"#6a1b9a",background:s.dir==="A"?"#eef3ff":"#f3e5f5",padding:"1px 5px",borderRadius:4}}>{s.dir==="A"?"And.":"Rit."}</span>}
                  <span style={{color:"#aab5c2",margin:"0 6px"}}>→</span>
                  <span style={{fontWeight:800,fontSize:16,color:"#003366"}}>{s.end}</span>
                  <span style={{fontSize:12,color:"#5a6b80",marginLeft:5}}>{s.loc_e}</span>
                </div>
                {gap>0&&gap<720&&(
                  <div style={{textAlign:"center",padding:"4px 0",marginBottom:6}}>
                    <span style={{fontSize:11,color:gap>=60?"#c62828":"#e65100",background:gap>=60?"#fef2f2":"#fff3e0",padding:"2px 10px",borderRadius:10,fontWeight:600}}>
                      {gap>=60?"Cambio":"Pausa"} {fmtGap(gap)}
                    </span>
                  </div>
                )}
              </div>
            );
          })}
          <button
            onClick={()=>{
              setAnimClass("flip-shrink");
              setTimeout(()=>{setFlipped(false);setAnimClass("flip-grow");},200);
            }}
            style={{width:"100%",marginTop:10,padding:"10px 0",borderRadius:10,border:"1px solid #dce1e8",background:"transparent",color:"#8a9ab0",fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:10}}>
            ← Torna
          </button>
          <ActionButtons stopFlip={false}/>
        </div>
      );
    }
  }
}


/* ===== GRID ===== */
function Grid({days, yr, mo, riposiSet, onTap}) {
  let off = new Date(yr,mo-1,1).getDay(); off = off===0?6:off-1;
  const nd = new Date(yr,mo,0).getDate();
  const cells = [];
  for(let i=0;i<off;i++) cells.push(0);
  for(let i=1;i<=nd;i++) cells.push(i);
  const todayStr = toIso(new Date());
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {WK.map(w=><div key={w} style={{textAlign:"center",fontSize:10,fontWeight:600,color:G.t3,padding:"5px 0",textTransform:"uppercase"}}>{w}</div>)}
        {cells.map((day,idx)=>{
          if(!day) return <div key={"e"+idx}/>;
          const dt=new Date(yr,mo-1,day),is2=toIso(dt),v=days[is2];
          const isProjRest=!v&&riposiSet&&riposiSet[is2];
          let bg="transparent",cl=G.t3,fw=400;
          const today=is2===todayStr;
          if(v){fw=700;if(REST_CODES[v.t]){bg="#ffd100";cl="#003366";}else if(v.t==="RIS"){bg="#c62828";cl="#ffffff";}else if(v.t==="turno"){bg="#003366";cl="#ffffff";}else{bg=G.orangeBg;cl=G.orange;}}
          else if(isProjRest){fw=600;bg="rgba(255,209,0,0.30)";cl="#8b6914";}
          if(today){bg="#00897b";cl="#ffffff";fw=800;}
          return (
            <div key={idx}
              onClick={()=>{if(v)onTap(dt,v);else if(isProjRest)onTap(dt,{t:"RP",g:"",x:"Riposo previsto"});}}
              style={{textAlign:"center",fontSize:13,padding:"7px 2px",borderRadius:today?"50%":"8px",color:cl,fontWeight:fw,background:bg,cursor:(v||isProjRest)?"pointer":"default",minHeight:36,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:today?"0 0 0 2px #00897b,0 0 0 4px rgba(0,137,123,0.25)":"none"}}>
              {day}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:12,flexWrap:"wrap",marginTop:8}}>
        {[["#00897b","Oggi","50%"],["#003366","Turno","3px"],["#ffd100","Riposo","3px"],["#c62828","Ballott.","3px"]].map(([bg,label,br])=>(
          <span key={label} style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:G.t3}}>
            <span style={{width:10,height:10,borderRadius:br,background:bg,display:"inline-block"}}/> {label}
          </span>
        ))}
      </div>
    </div>
  );
}

/* ===== LINEE BROWSER ===== */
function LineeBrowser({devs}) {
  const [linea, setLinea] = useState("");
  const [turno, setTurno] = useState("");
  const [gt, setGt] = useState(()=>{const d=new Date().getDay();return d===0?"FEST":d===6?"SAB":"LV";});

  const lineMap = {};
  Object.keys(devs).forEach(code=>{
    const parts=code.split(" ");if(parts.length!==2)return;
    const ln=parts[0]; // già normalizzato (es. "02")
    if(!lineMap[ln])lineMap[ln]=[];lineMap[ln].push(code);
    (devs[code]||[]).forEach(s=>{
      if(s.ln&&s.ln!==ln){
        // Normalizza anche la variante linea
        var vln=String(parseInt(s.ln)||s.ln).padStart(2,"0");
        if(!lineMap[vln])lineMap[vln]=[];
        if(!lineMap[vln].includes(code))lineMap[vln].push(code);
        // Anche la variante raw (es. "38B")
        if(s.ln!==vln){if(!lineMap[s.ln])lineMap[s.ln]=[];if(!lineMap[s.ln].includes(code))lineMap[s.ln].push(code);}
      }
    });
  });
  const lineNums = Object.keys(lineMap).sort((a,b)=>{const na=parseInt(a),nb=parseInt(b);if(isNaN(na)&&isNaN(nb))return a.localeCompare(b);if(isNaN(na))return 1;if(isNaN(nb))return -1;return na!==nb?na-nb:a.localeCompare(b);});
  const turniForLine = (linea?lineMap[linea]||[]:[ ]).slice().sort();

  function filterSegs(segs) {
    if(!segs||!segs.length)return[];
    if(gt==="ALL")return segs.slice().sort((a,b)=>hm2min(a.start)-hm2min(b.start));
    const f=segs.filter(s=>{
      const g=(s.gt||"").toUpperCase();if(!g)return true;
      const isLV=g.includes("LUN")||g.includes("MAR")||g.includes("MER")||g.includes("GIO")||g.includes("VEN")||g.includes("FERIALE")||g.includes("FERIALI");
      if(gt==="LV")return isLV;if(gt==="SAB")return g.includes("SAB");return g.includes("FEST")||g.includes("DOM")||g.includes("DOMENICA");
    });
    return f.sort((a,b)=>hm2min(a.start)-hm2min(b.start));
  }
  function lineLabel(ln){if(/B$/.test(ln))return ln.replace(/B$/,"/");if(/[A-Z]$/.test(ln)&&ln.length>1)return ln.replace(/[A-Z]$/,"/");const n=parseInt(ln);return isNaN(n)?ln:String(n);}

  const selStyle={width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid "+G.glassBorder,background:"#ffffff",color:G.tw,fontSize:15,outline:"none",appearance:"none",WebkitAppearance:"none"};

  return (
    <div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:G.t3,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.04em"}}>Seleziona linea</div>
        <select value={linea} onChange={e=>{setLinea(e.target.value);setTurno("");}} style={selStyle}>
          <option value="">-- Scegli linea --</option>
          {lineNums.map(ln=><option key={ln} value={ln}>Linea {lineLabel(ln)} ({lineMap[ln].length} turni)</option>)}
        </select>
      </div>
      {linea ? (
        <div>
          <div style={{display:"flex",gap:4,marginBottom:12}}>
            {["LV","SAB","FEST","ALL"].map(d=>(
              <button key={d} onClick={()=>setGt(d)} style={{flex:1,padding:"8px 0",borderRadius:10,border:gt===d?"1px solid "+G.accentBorder:"1px solid "+G.cardBorder,background:gt===d?G.accentGlass:"transparent",color:gt===d?G.accent:G.t2,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                {d==="LV"?"Lun-Ven":d==="SAB"?"Sabato":d==="FEST"?"Festivo":"Tutti"}
              </button>
            ))}
          </div>
          <select value={turno} onChange={e=>setTurno(e.target.value)} style={Object.assign({},selStyle,{marginBottom:12})}>
            <option value="">Tutti i turni linea {lineLabel(linea)}</option>
            {turniForLine.map(code=><option key={code} value={code}>{code}</option>)}
          </select>
          {(()=>{
            const items=turno?[turno]:turniForLine;
            let visibleCount=0;
            const cards=items.map(code=>{
              const segs=devs[code]||[],filtered=filterSegs(segs);
              if(!filtered.length)return null;
              visibleCount++;
              return <LineeCard key={code+gt} code={code} segs={filtered} isSpezz={isRealSpezzato(filtered)} hasMulti={filtered.length>1}/>;
            });
            return (
              <div>
                {visibleCount>0 && <div style={{fontSize:11,color:G.t2,marginBottom:8,fontWeight:600}}>{visibleCount} turni {gt==="LV"?"feriali":gt==="SAB"?"sabato":gt==="FEST"?"festivi":"totali"}</div>}
                {cards}
                {visibleCount===0 && (
                  <div style={{textAlign:"center",padding:"20px 0"}}>
                    <div style={{color:"#c62828",fontSize:13,fontWeight:600}}>Nessun turno per {gt==="LV"?"Lun-Ven":gt==="SAB"?"Sabato":"Festivo"}</div>
                    <div style={{color:G.t3,fontSize:11,marginTop:6}}>Ricarica il PDF Orari Linee</div>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      ) : (
        <div style={{textAlign:"center",padding:"30px 0",color:G.t3,fontSize:13}}>Seleziona una linea per esplorare i turni</div>
      )}
    </div>
  );
}

function LineeCard({code, segs, isSpezz, hasMulti}) {
  const [flipped, setFlipped] = useState(false);

  // Raggruppa i segmenti per vettura (ogni vettura = una corsa del turno)
  const corsaMap = {};
  segs.forEach(function(s){
    const key = s.vett || s.start;
    if(!corsaMap[key]) corsaMap[key] = [];
    corsaMap[key].push(s);
  });
  const corse = Object.keys(corsaMap).sort(function(a,b){
    return hm2min(corsaMap[a][0].start) - hm2min(corsaMap[b][0].start);
  });
  const isMultiCorsa = corse.length > 1;

  // Turno NON spezzato e non multi-corsa: card semplice, no flip
  if (!isSpezz && !isMultiCorsa) {
    const s0 = segs[0];
    const sN = segs[segs.length-1];
    return (
      <div style={Object.assign({},glassCard,{padding:"14px 16px",marginBottom:8})}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontFamily:"monospace",fontSize:18,fontWeight:700,color:G.tw}}>{code}</span>
          {s0&&s0.vett&&<span style={{fontSize:12,color:G.t2}}>vet. {s0.vett}</span>}
        </div>
        <div style={{background:"#f4f6f9",borderRadius:8,padding:"8px 12px"}}>
          <span style={{fontWeight:800,fontSize:16,color:G.tw}}>{s0&&s0.start}</span>
          <span style={{fontSize:12,color:G.t2,marginLeft:5}}>{s0&&s0.loc_s}</span>
          <span style={{color:"#aab5c2",margin:"0 6px"}}>→</span>
          <span style={{fontWeight:800,fontSize:16,color:G.tw}}>{sN&&sN.end}</span>
          <span style={{fontSize:12,color:G.t2,marginLeft:5}}>{sN&&sN.loc_e}</span>
        </div>
      </div>
    );
  }

  // Turno SPEZZATO o multi-corsa: flip card
  // FRONTE: orario complessivo (come turno normale — inizio prima corsa, fine ultima)
  const firstSeg = segs[0];
  const lastSeg = segs[segs.length-1];
  const tapHint = (
    <div style={{marginTop:8,padding:"6px 0",borderTop:"1px solid "+G.cardBorder,textAlign:"center",color:isSpezz?"#e65100":G.t3,fontSize:11,fontWeight:600}}>
      {flipped ? "← Chiudi sviluppo" : (isSpezz?"Spezzato — tocca per sviluppo →":"Tocca per corse →")}
    </div>
  );

  const front = (
    <div className="flip-front" style={Object.assign({},glassCard,{padding:"14px 16px",borderLeft:isSpezz?"4px solid #e65100":undefined})}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontFamily:"monospace",fontSize:18,fontWeight:700,color:G.tw}}>{code}</span>
        <div style={{display:"flex",gap:4}}>
          {isSpezz && <Tag bg="#fef2f2" color="#c62828">Spezzato</Tag>}
          {isMultiCorsa && !isSpezz && <Tag bg={G.glass} color={G.t2}>{corse.length} corse</Tag>}
        </div>
      </div>
      {/* Orario complessivo — non sviluppato */}
      <div style={{background:"#f4f6f9",borderRadius:8,padding:"8px 12px"}}>
        <span style={{fontWeight:800,fontSize:16,color:G.tw}}>{firstSeg&&firstSeg.start}</span>
        <span style={{fontSize:12,color:G.t2,marginLeft:5}}>{firstSeg&&firstSeg.loc_s}</span>
        <span style={{color:"#aab5c2",margin:"0 6px"}}>→</span>
        <span style={{fontWeight:800,fontSize:16,color:G.tw}}>{lastSeg&&lastSeg.end}</span>
        <span style={{fontSize:12,color:G.t2,marginLeft:5}}>{lastSeg&&lastSeg.loc_e}</span>
      </div>
      {tapHint}
    </div>
  );

  // RETRO: sviluppo completo per corse/segmenti
  const back = (
    <div className="flip-back" style={Object.assign({},glassCard,{padding:"14px 16px",background:"#ffffff",borderLeft:isSpezz?"4px solid #e65100":undefined})}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontFamily:"monospace",fontSize:16,fontWeight:700,color:G.tw}}>{code}</span>
        {isSpezz && <Tag bg="#fef2f2" color="#c62828">Spezzato</Tag>}
      </div>
      {corse.map(function(corsaKey, idx){
        const corsaSegs = corsaMap[corsaKey];
        const gap = idx < corse.length-1 ? calcGap(corsaSegs[corsaSegs.length-1].end, corsaMap[corse[idx+1]][0].start) : 0;
        return (
          <div key={corsaKey}>
            <div style={{background:idx%2===0?"#f4f6f9":"#fff8f0",borderLeft:"3px solid "+(idx%2===0?"#003366":"#e65100"),borderRadius:"0 8px 8px 0",padding:"7px 10px",marginBottom:gap>0?0:6}}>
              {corsaSegs[0].vett && <span style={{fontSize:10,color:G.t2,marginRight:6}}>vet.{corsaSegs[0].vett}</span>}
              <span style={{fontWeight:800,fontSize:15,color:G.tw}}>{corsaSegs[0].start}</span>
              <span style={{fontSize:11,color:G.t2,marginLeft:4}}>{corsaSegs[0].loc_s}</span>
              <span style={{color:"#aab5c2",margin:"0 5px"}}>→</span>
              <span style={{fontWeight:800,fontSize:15,color:G.tw}}>{corsaSegs[corsaSegs.length-1].end}</span>
              <span style={{fontSize:11,color:G.t2,marginLeft:4}}>{corsaSegs[corsaSegs.length-1].loc_e}</span>
            </div>
            {gap>0&&gap<720&&(
              <div style={{textAlign:"center",padding:"3px 0",marginBottom:6}}>
                <span style={{fontSize:10,color:gap>=60?"#c62828":"#e65100",background:gap>=60?"#fef2f2":"#fff3e0",padding:"1px 8px",borderRadius:8,fontWeight:600}}>
                  {gap>=60?"Cambio":"Pausa"} {fmtGap(gap)}
                </span>
              </div>
            )}
          </div>
        );
      })}
      {tapHint}
    </div>
  );

  return (
    <div className="flip-container" onClick={()=>setFlipped(!flipped)}>
      <div className={"flip-inner"+(flipped?" flipped":"")} style={{minHeight:1,marginBottom:8}}>
        {front}{back}
      </div>
    </div>
  );
}

/* ===== STORICO ===== */
function Storico({onLoadPreco, onLoadOrari, onUploadPreco, onUploadOrari}) {
  const [hist, setHist] = useState(()=>getHistory());
  const [yr, setYr] = useState(()=>new Date().getFullYear());
  const precoRef = useRef(null), orariRef = useRef(null);
  const reload = ()=>setHist(getHistory());

  const groups = {};
  hist.forEach(e=>{const gk=e.year+"-"+p2(e.month);if(!groups[gk])groups[gk]={year:e.year,month:e.month,preco:null,orari:null};if(e.type==="preco")groups[gk].preco=e;if(e.type==="orari")groups[gk].orari=e;});
  const months = [];
  for(let m=1;m<=12;m++){const gk=yr+"-"+p2(m);months.push({month:m,data:groups[gk]||null});}

  const arrowBtn={padding:"8px 14px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:16,fontWeight:700,cursor:"pointer"};
  const uploadBtn={width:"100%",padding:"6px 0",borderRadius:6,border:"1px dashed "+G.glassBorder,background:"transparent",color:G.t2,fontSize:10,cursor:"pointer",marginTop:3};

  return (
    <div>
      <input ref={precoRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])onUploadPreco(e.target.files[0],reload);}}/>
      <input ref={orariRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])onUploadOrari(e.target.files[0],reload);}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:16}}>
        <button onClick={()=>setYr(yr-1)} style={arrowBtn}>&lsaquo;</button>
        <span style={{fontSize:20,fontWeight:700,color:G.tw,minWidth:60,textAlign:"center"}}>{yr}</span>
        <button onClick={()=>setYr(yr+1)} style={arrowBtn}>&rsaquo;</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        {months.map(item=>{
          const has=item.data,hasPr=has&&has.preco,hasOr=has&&has.orari;
          return (
            <div key={item.month} style={Object.assign({},glassCard,{padding:"12px 10px",borderColor:hasPr?G.accentBorder:G.glassBorder})}>
              <div style={{fontSize:14,fontWeight:700,color:hasPr?G.tw:G.t2,marginBottom:6,textAlign:"center"}}>{MESI_IT[item.month].slice(0,3)}</div>
              {hasPr ? (
                <div style={{marginBottom:4}}>
                  <div style={{display:"flex",gap:3}}>
                    <button onClick={()=>{const d=loadPrecoByKey(has.preco.key);if(d)onLoadPreco(d);}} style={{flex:1,padding:"6px 0",borderRadius:6,border:"none",background:G.accentGlass,color:G.accent,fontSize:10,fontWeight:600,cursor:"pointer"}}>Apri turni</button>
                    <button onClick={()=>{deleteEntry(has.preco.key);reload();}} style={{padding:"6px 6px",borderRadius:6,border:"none",background:G.redBg,color:G.red,fontSize:10,cursor:"pointer"}}>&times;</button>
                  </div>
                </div>
              ) : <button onClick={()=>{if(precoRef.current){precoRef.current.value="";precoRef.current.click();}}} style={uploadBtn}>+ Preconoscenza</button>}
              {hasOr ? (
                <div style={{display:"flex",gap:3}}>
                  <button onClick={()=>{const d=loadOrariByKey(has.orari.key);if(d&&Object.keys(d).length)onLoadOrari(d);}} style={{flex:1,padding:"6px 0",borderRadius:6,border:"none",background:G.greenBg,color:G.green,fontSize:10,fontWeight:600,cursor:"pointer"}}>Apri orari</button>
                  <button onClick={()=>{deleteEntry(has.orari.key);reload();}} style={{padding:"6px 6px",borderRadius:6,border:"none",background:G.redBg,color:G.red,fontSize:10,cursor:"pointer"}}>&times;</button>
                </div>
              ) : <button onClick={()=>{if(orariRef.current){orariRef.current.value="";orariRef.current.click();}}} style={uploadBtn}>+ Orari linee</button>}
            </div>
          );
        })}
      </div>
      <div style={{marginTop:14,textAlign:"center",color:G.t3,fontSize:11}}>I documenti vengono salvati automaticamente nel browser</div>
    </div>
  );
}

/* ===== APP ===== */
function App() {
  const fileRef1 = useRef(null), fileRef2 = useRef(null);
  const [tab, setTab] = useState("home");
  const [q, setQ] = useState("");
  const [res, setRes] = useState([]);
  const [msg, setMsg] = useState("");
  const [data, setData] = useState(null);
  const [devs, setDevs] = useState({});
  const [loading1, setLoading1] = useState(false);
  const [loading2, setLoading2] = useState(false);
  const [err, setErr] = useState("");
  const [det, setDet] = useState(null);
  const [overrides, setOverrides] = useState({});
  const [restored, setRestored] = useState(false);
  const [lastSearched, setLastSearched] = useState(null);
  const [calY, setCalY] = useState(null);
  const [calM, setCalM] = useState(null);
  const [calData, setCalData] = useState(null);
  const [calDevs, setCalDevs] = useState(null);
  const [showArchivio, setShowArchivio] = useState(false);

  /* Cache version check on mount */
  useEffect(()=>{
    if(restored)return;
    // Non cancellare più i dati al cambio versione parser — troppo distruttivo
    // Carica preconoscenza
    const d=loadLastPreco();
    if(d&&Object.keys(d.days).length){
      setData(d);
      if(d.dIn){
        const ok=orariKey(d.dIn.getFullYear(),d.dIn.getMonth()+1);
        const od=loadOrariByKey(ok);
        if(od&&Object.keys(od).length)setDevs(od);
        // Ripristina override (turni ballottaggio incollati)
        const ov=DB.get("ts_overrides_"+precoKey(d.dIn.getFullYear(),d.dIn.getMonth()+1));
        if(ov&&Object.keys(ov).length)setOverrides(ov);
      }
    }
    setRestored(true);
    checkPendingAlarms();
  },[restored]);

  const baseDays = data?data.days:{};
  const days = Object.assign({},baseDays,overrides);
  const refY = data&&data.dIn?data.dIn.getFullYear():new Date().getFullYear();
  const refM = data&&data.dIn?data.dIn.getMonth()+1:new Date().getMonth()+1;
  const nDevs = Object.keys(devs).length;
  const hasHistory = getHistory().length>0;
  const viewY = calY!==null?calY:refY;
  const viewM = calM!==null?calM:refM;
  const isCurrentMonth = (viewY===refY&&viewM===refM);

  useEffect(()=>{
    if(isCurrentMonth){setCalData(null);setCalDevs(null);return;}
    const pd=deserializePreco(DB.get(precoKey(viewY,viewM)));setCalData(pd);
    const od=DB.get(orariKey(viewY,viewM));setCalDevs(od&&Object.keys(od).length?od:null);
  },[viewY,viewM,isCurrentMonth]);

  const calDays = isCurrentMonth?days:(calData?Object.assign({},calData.days):{});
  const calDevsActive = isCurrentMonth?devs:(calDevs||{});

  function uploadPreco(file,cb){
    if(!file)return;
    setLoading1(true);setErr("");
    window._loadPdfJs(function(pdfjs){
      const reader=new FileReader();
      reader.onload=function(ev){
        pdfjs.getDocument({data:new Uint8Array(ev.target.result)}).promise.then(function(pdf){
          if(pdf.numPages>20){setErr("Questo sembra gli Orari Linee ("+pdf.numPages+" pag.), non la Preconoscenza.");setLoading1(false);if(cb)cb();return;}
          const pp=[];for(let i=1;i<=pdf.numPages;i++)pp.push(pdf.getPage(i).then(extractText));
          Promise.all(pp).then(function(texts){
            const r=parsePreconoscenza(texts.join("\n"));
            if(!Object.keys(r.days).length){setErr("Nessun turno trovato.");setLoading1(false);if(cb)cb();return;}
            setData(r);savePreco(r);saveRiposiCycle(r);setDevs({});setRes([]);setMsg("");setDet(null);setOverrides({});setTab("home");
            DB.set("ts_last_preco",precoKey(r.dIn.getFullYear(),r.dIn.getMonth()+1));
            if(r.dIn){const ok=orariKey(r.dIn.getFullYear(),r.dIn.getMonth()+1);const od=loadOrariByKey(ok);if(od&&Object.keys(od).length)setDevs(od);}
            setLoading1(false);if(cb)cb();
          });
        }).catch(e=>{setErr("Errore: "+e.message);setLoading1(false);});
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function uploadOrari(file,cb){
    if(!file)return;
    setLoading2(true);setErr("Analisi PDF...");
    window._loadPdfJs(function(pdfjs){
      const reader=new FileReader();
      reader.onload=function(ev){
        pdfjs.getDocument({data:new Uint8Array(ev.target.result)}).promise.then(function(pdf){
          if(pdf.numPages<5){setErr("Questo sembra la Preconoscenza.");setLoading2(false);if(cb)cb();return;}
          var pp=[];
          for(var i=1;i<=pdf.numPages;i++) pp.push(pdf.getPage(i).then(extractText));
          Promise.all(pp).then(function(texts){
            var nd={},lastGt="";
            var zeroPages=[];
            texts.forEach(function(ft,idx){
              var gt="",ver="";
              var vm=ft.match(/gruppo\s+\S+\s*-\s*(.+?)\s*-\s*Versione\s+(\w+)/i);
              if(vm){gt=vm[1].trim();ver=vm[2].trim();}
              if(!gt){
                var h=ft.substring(0,800).toUpperCase();
                if(h.indexOf("MERCOLEDI")>=0)gt="MERCOLEDI'";
                else if(h.indexOf("FESTIVO")>=0)gt="FESTIVO";
                else if(h.indexOf("SABATO")>=0)gt="SABATO";
                else if(h.indexOf("LUN")>=0&&h.indexOf("VEN")>=0)gt="LUN - VEN";
                if(!gt&&ver){var v0=ver[0].toUpperCase();gt=v0==="S"?"SABATO":v0==="F"?"FESTIVO":"LUN - VEN";}
              }
              if(gt)lastGt=gt;else gt=lastGt;
              if(gt){
                var pd={};parseOrariPageLines(ft,gt,ver,pd);
                if(Object.keys(pd).length)mergeDevs(nd,pd);
                else if(ft.indexOf("PROGRAMMAZIONE")>=0||ft.indexOf("TURNI DEL")>=0){
                  // Pagina con tabella turni ma 0 match - problema pdf.js
                  zeroPages.push({p:idx+1,gt:gt,sample:ft.substring(0,50)});
                }
              }
            });
            var saved=false;
            if(Object.keys(nd).length){setDevs(nd);saved=saveOrari(nd,data||{dIn:new Date()});}
            var nTurni=Object.keys(nd).length;
            setLoading2(false);if(cb)cb();
            if(!nTurni)setErr("Nessun turno trovato.");
            else setErr("OK! "+nTurni+" turni caricati e salvati.");
          });
        }).catch(function(e){setErr("Errore: "+e.message);setLoading2(false);});
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function cerca(){
    if(!q.trim())return;
    const d=parseInput(q,refY);
    if(!d){setRes([]);setMsg("Formato non riconosciuto");setLastSearched(null);return;}
    setLastSearched(d);
    const is2=toIso(d);
    if(days[is2]){setRes([{date:d,v:days[is2]}]);setMsg("");}
    else{setRes([]);setMsg("Nessun dato per "+toFmt(d));}
  }
  function msgPerData(d){
    const lm=d.getMonth()+1,ly=d.getFullYear();
    if(lm!==refM||ly!==refY){
      const hasNext=DB.get(precoKey(ly,lm));
      if(!hasNext) return "MANCA_PRECO:"+lm+":"+ly;
    }
    return "nessun_turno";
  }

  function rapido(tipo){
    setMsg("");
    const oggi=new Date();
    if(tipo==="oggi"){
      setLastSearched(oggi);
      const is2=toIso(oggi);
      if(days[is2])setRes([{date:oggi,v:days[is2]}]);
      else{setRes([]);setMsg(msgPerData(oggi));}
    }
    else if(tipo==="domani"){
      const d2=new Date();d2.setDate(d2.getDate()+1);
      setLastSearched(d2);
      const is3=toIso(d2);
      if(days[is3])setRes([{date:d2,v:days[is3]}]);
      else{setRes([]);setMsg(msgPerData(d2));}
    }
    else if(tipo==="week"){
      const r=[];
      for(let j=0;j<7;j++){
        const dd=new Date();dd.setDate(dd.getDate()+j);
        const ii=toIso(dd);
        if(days[ii]) r.push({date:dd,v:days[ii]});
        // Se il giorno è in un mese diverso senza preconoscenza, aggiungi placeholder
        else{
          const lm=dd.getMonth()+1,ly=dd.getFullYear();
          if((lm!==refM||ly!==refY)&&!DB.get(precoKey(ly,lm))){
            r.push({date:dd,v:null,missingPreco:true,month:lm,year:ly});
          }
        }
      }
      setRes(r);
      if(r.length>0)setLastSearched(r[r.length-1].date);
      else{const dd7=new Date();dd7.setDate(dd7.getDate()+6);setLastSearched(dd7);setMsg(msgPerData(dd7));}
    }
  }
  function resetAll(){setData(null);setRes([]);setMsg("");setDet(null);setErr("");setDevs({});if(fileRef1.current)fileRef1.current.value="";if(fileRef2.current)fileRef2.current.value="";}
  function onLoadPreco(d){setData(d);setDevs({});setRes([]);setMsg("");setDet(null);setOverrides({});setTab("home");DB.set("ts_last_preco",precoKey(d.dIn.getFullYear(),d.dIn.getMonth()+1));if(d.dIn){const ok=orariKey(d.dIn.getFullYear(),d.dIn.getMonth()+1);const od=loadOrariByKey(ok);if(od&&Object.keys(od).length)setDevs(od);}}
  function onLoadOrari(d){setDevs(d);}
  function onPasteTurno(iso,v){
    setOverrides(ov=>{
      const next=Object.assign({},ov,{[iso]:v});
      // Salva persistentemente
      if(data&&data.dIn){
        DB.set("ts_overrides_"+precoKey(data.dIn.getFullYear(),data.dIn.getMonth()+1),next);
      }
      return next;
    });
    setRes(r=>r.map(function(item){
      return toIso(item.date)===iso?{date:item.date,v:v}:item;
    }));
  }

  const inp={width:"100%",padding:"12px 16px",borderRadius:8,border:"2px solid #d0d7de",background:"#ffd100",color:"#1a1a2e",fontSize:15,outline:"none",boxSizing:"border-box"};
  const qb={flex:1,padding:"10px 2px",borderRadius:8,border:"1px solid #d0d7de",background:"#ffd100",color:"#003366",fontSize:12,fontWeight:700,cursor:"pointer"};
  const tbS=n=>({flex:1,padding:"10px 0",textAlign:"center",fontSize:13,fontWeight:700,background:tab===n?"#003366":"#ffffff",color:tab===n?"#ffd100":"#003366",border:"1px solid "+(tab===n?"#003366":"#d0d7de"),borderRadius:8,cursor:"pointer"});

  const ballCount = Object.keys(days).filter(k=>days[k]&&days[k].t==="RIS").length;

  return (

      <div style={{background:"#003366",padding:"10px 18px",display:"flex",alignItems:"center",gap:12,borderBottom:"3px solid #ffd100",boxShadow:"0 2px 12px rgba(0,51,102,0.20)"}}>
        <svg width="44" height="44" viewBox="0 0 64 64" fill="none">
          <path d="M8 20l12-8 14 6 14-6 12 8v28l-12 8-14-6-14 6L8 48V20z" fill="#e8d44d" stroke="#c4a82a" strokeWidth="1"/>
          <path d="M20 12l14 6v36l-14-6V12z" fill="#b8c94a" stroke="#8fa03a" strokeWidth="0.5"/>
          <path d="M34 18l14-6v36l-14 6V18z" fill="#d4cc5a" stroke="#b0a83a" strokeWidth="0.5"/>
          <path d="M32 6c-6.6 0-12 5-12 11.2C20 25.6 32 38 32 38s12-12.4 12-20.8C44 11 38.6 6 32 6z" fill="#003366"/>
          <circle cx="32" cy="17" r="7.5" fill="#ffffff"/>
          <rect x="26" y="12.5" width="12" height="8" rx="2" fill="#003366"/>
          <rect x="27" y="14" width="4.5" height="3" rx="0.8" fill="#89b4e8"/>
          <rect x="32.5" y="14" width="4.5" height="3" rx="0.8" fill="#89b4e8"/>
          <circle cx="28.5" cy="22" r="1.2" fill="#003366"/>
          <circle cx="35.5" cy="22" r="1.2" fill="#003366"/>
        </svg>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:22,fontWeight:800,color:"#ffffff",letterSpacing:"-0.02em"}}>Turni Smart</span>
            <span style={{fontSize:9,color:"rgba(255,255,255,0.5)",fontWeight:500}}>v5</span>

      <div style={{maxWidth:460,margin:"0 auto",padding:"16px 16px"}}>
        <input ref={fileRef1} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])uploadPreco(e.target.files[0]);}}/>

                  Storico documenti
                </div>
                <Storico onLoadPreco={onLoadPreco} onLoadOrari={onLoadOrari} onUploadPreco={uploadPreco} onUploadOrari={uploadOrari}/>
              </div>
            ) : <div style={{textAlign:"center",padding:"20px 0",color:G.t3,fontSize:12}}>Carica una preconoscenza per iniziare.</div>}
          </div>
        ) : (
          <div>
            {/* Banner orari */}
            {nDevs>0 ? (
              <div style={{display:"flex",gap:6,marginBottom:12}}>
                <div style={Object.assign({},glassCard,{flex:1,padding:"10px 14px",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center",borderColor:G.greenBorder})}>
                  <span style={{color:G.green,fontWeight:600}}>Orari GTT: {nDevs} turni</span>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>{setDevs({});if(data&&data.dIn){DB.del(orariKey(data.dIn.getFullYear(),data.dIn.getMonth()+1));}if(fileRef2.current){fileRef2.current.value="";fileRef2.current.click();}}} style={{padding:"2px 8px",borderRadius:6,border:"1px solid "+G.accentBorder,background:G.accentGlass,color:G.accent,fontSize:10,fontWeight:600,cursor:"pointer"}}>Ricarica</button>
                    <button onClick={()=>setDevs({})} style={{padding:"2px 8px",borderRadius:6,border:"1px solid "+G.cardBorder,background:"transparent",color:G.t3,fontSize:10,cursor:"pointer"}}>&times;</button>
                  </div>
                </div>
                <button onClick={resetAll} style={{padding:"8px 14px",borderRadius:G.rs,border:"1px solid "+G.cardBorder,background:"transparent",color:G.red,fontSize:11,fontWeight:600,cursor:"pointer"}}>Reset</button>
              </div>
            ) : (
              <div style={{marginBottom:12}}>
                <div onClick={()=>{if(!loading2&&fileRef2.current)fileRef2.current.click();}} style={Object.assign({},glassCard,{padding:"24px 20px",textAlign:"center",cursor:loading2?"wait":"pointer",borderStyle:"dashed"})}>
                  <div style={{fontSize:15,fontWeight:600,color:loading2?G.accent:G.tw,marginBottom:5}}>{loading2?"Analisi in corso...":"Carica Orari Linee GTT"}</div>
                  <div style={{color:G.t2,fontSize:13}}>PDF con lo sviluppo turni del deposito</div>
                </div>
                <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
                  <button onClick={resetAll} style={{padding:"6px 14px",borderRadius:G.rs,border:"1px solid "+G.cardBorder,background:"transparent",color:G.red,fontSize:11,fontWeight:600,cursor:"pointer"}}>Reset</button>
                </div>
              </div>
            )}

            {/* Tab bar — stile v4.3 */}
            <div style={{display:"flex",gap:4,marginBottom:14}}>
              {[
                {id:"home",    label:"Turni"},
                {id:"mese",    label:"Mese"},
                ...(nDevs>0 ? [{id:"linee", label:"Linee"}] : []),
                {id:"storico", label:"Storico"}
              ].map(t=>(
                <button key={t.id} style={tbS(t.id)} onClick={()=>{setTab(t.id);if(t.id==="mese")setDet(null);}}>
                  {t.label}
                </button>
              ))}
            </div>

            {/* Banner ballottaggi */}
            {ballCount>0 && (
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",marginBottom:12,borderRadius:10,background:"rgba(255,209,0,0.15)",border:"1px solid rgba(255,209,0,0.40)"}}>
                <span style={{color:"#003366",fontSize:12,fontWeight:700}}>{ballCount} ballottaggi</span>
                <button onClick={()=>downloadBallottaggiICS(data)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:G.red,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>Salva su Calendario</button>
              </div>
            )}

            {/* Tab: Turni (ex Home) */}
            {tab==="home" && (
              <div>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <input style={Object.assign({},inp,{flex:1})} placeholder="es. 5 marzo, 05/03" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")cerca();}}/>
                  <button onClick={cerca} style={{padding:"0 18px",borderRadius:8,border:"none",background:"#ffd100",color:"#003366",fontWeight:800,fontSize:16,cursor:"pointer"}}>&rarr;</button>
                </div>
                <div style={{display:"flex",gap:5,marginBottom:14}}>
                  <button style={qb} onClick={()=>rapido("oggi")}>Oggi</button>
                  <button style={qb} onClick={()=>rapido("domani")}>Domani</button>
                  <button style={qb} onClick={()=>rapido("week")}>Settimana</button>
                </div>
                {msg && (()=>{
                  if(msg.startsWith("MANCA_PRECO:")){
                    const parts=msg.split(":");
                    const lm=parseInt(parts[1]),ly=parseInt(parts[2]);
                    return (
                      <div style={{padding:"14px 16px",borderRadius:12,background:"rgba(0,51,102,0.05)",border:"2px dashed #003366",marginBottom:10}}>
                        <div style={{fontSize:13,fontWeight:700,color:"#003366",marginBottom:4}}>
                          📄 Preconoscenza {MESI_IT[lm]} {ly} non caricata
                        </div>
                        <div style={{fontSize:12,color:G.t2,marginBottom:12}}>
                          Per vedere i tuoi turni di {MESI_IT[lm]} carica il PDF del nuovo mese.
                        </div>
                        <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                          style={{width:"100%",padding:"12px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:13,fontWeight:800,cursor:"pointer"}}>
                          Carica Preconoscenza {MESI_IT[lm]} {ly}
                        </button>
                      </div>
                    );
                  }
                  return <div style={Object.assign({},glassCard,{padding:"10px 14px",marginBottom:10,fontSize:13,color:G.t2})}>{msg==="nessun_turno"?"Nessun turno trovato per questa data":msg}</div>;
                })()}
                {(()=>{
                  if(!res.length) return null;
                  const items=[];
                  let lastMonth=-1;
                  let shownMissingBanner={};
                  res.forEach((r,i)=>{
                    const m=r.date.getMonth()+1, y=r.date.getFullYear();
                    // Separatore cambio mese
                    if(m!==lastMonth){
                      if(lastMonth!==-1){
                        items.push(
                          <div key={"sep-"+i} style={{display:"flex",alignItems:"center",gap:8,margin:"10px 0 6px"}}>
                            <div style={{flex:1,height:2,background:"linear-gradient(90deg,#003366 0%,transparent 100%)"}}/>
                            <span style={{fontSize:11,fontWeight:700,color:"#003366",background:"#f4f6f9",padding:"2px 10px",borderRadius:10,whiteSpace:"nowrap"}}>
                              {MESI_IT[m]} {y}
                            </span>
                            <div style={{flex:1,height:2,background:"linear-gradient(90deg,transparent 0%,#003366 100%)"}}/>
                          </div>
                        );
                      }
                      lastMonth=m;
                      // Banner carica preconoscenza per mese senza dati
                      const bannerKey=y+"-"+m;
                      if(r.missingPreco && !shownMissingBanner[bannerKey]){
                        shownMissingBanner[bannerKey]=true;
                        items.push(
                          <div key={"banner-"+bannerKey} style={{padding:"14px 16px",borderRadius:12,background:"rgba(0,51,102,0.05)",border:"2px dashed #003366",marginBottom:10}}>
                            <div style={{fontSize:13,fontWeight:700,color:"#003366",marginBottom:4}}>
                              📄 Preconoscenza {MESI_IT[m]} {y}
                            </div>
                            <div style={{fontSize:12,color:G.t2,marginBottom:10}}>
                              Carica il PDF per vedere i tuoi turni di {MESI_IT[m]}.
                            </div>
                            <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                              style={{width:"100%",padding:"11px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:13,fontWeight:800,cursor:"pointer"}}>
                              Carica Preconoscenza {MESI_IT[m]} {y}
                            </button>
                          </div>
                        );
                        return; // non aggiungere la card per questo giorno
                      }
                      if(r.missingPreco) return;
                    } else if(r.missingPreco) return;

                    items.push(<Card key={toIso(r.date)} date={r.date} v={r.v} devs={devs} allDays={days} onPaste={onPasteTurno}/>);
                  });
                  return items;
                })()}
                {/* Banner se la data cercata è in un mese senza preconoscenza */}
                {(()=>{
                  const checkDate = res.length>0 ? res[res.length-1].date : lastSearched;
                  if(!checkDate) return null;
                  const lm=checkDate.getMonth()+1, ly=checkDate.getFullYear();
                  if(lm===refM && ly===refY) return null;
                  const hasNextData = DB.get(precoKey(ly,lm));
                  if(hasNextData) return null;
                  return (
                    <div style={{marginTop:10,padding:"14px 16px",borderRadius:12,background:"rgba(0,51,102,0.06)",border:"2px dashed #003366"}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#003366",marginBottom:4}}>
                        📄 Preconoscenza {MESI_IT[lm]} {ly} non caricata
                      </div>
                      <div style={{fontSize:12,color:G.t2,marginBottom:12}}>
                        Per vedere i turni di {MESI_IT[lm]} devi caricare il PDF del nuovo mese.
                      </div>
                      <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                        style={{width:"100%",padding:"12px 0",borderRadius:10,border:"none",background:"#003366",color:"#ffd100",fontSize:13,fontWeight:800,cursor:"pointer"}}>
                        Carica Preconoscenza {MESI_IT[lm]} {ly}
                      </button>
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Tab: Mese */}
            {tab==="mese" && (
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:12}}>
                  <button onClick={()=>{let nm=viewM-1,ny=viewY;if(nm<1){nm=12;ny--;}setCalY(ny);setCalM(nm);setDet(null);}} style={{padding:"8px 14px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:16,fontWeight:700,cursor:"pointer"}}>&lsaquo;</button>
                  <div style={{textAlign:"center",minWidth:130}}>
                    <div style={{fontSize:17,fontWeight:700,color:G.tw}}>{MESI_IT[viewM]} {viewY}</div>
                    {!isCurrentMonth && <button onClick={()=>{setCalY(null);setCalM(null);setDet(null);}} style={{fontSize:10,color:G.accent,background:"transparent",border:"none",cursor:"pointer",marginTop:2}}>Torna a {MESI_IT[refM]} {refY}</button>}
                  </div>
                  <button onClick={()=>{let nm=viewM+1,ny=viewY;if(nm>12){nm=1;ny++;}setCalY(ny);setCalM(nm);setDet(null);}} style={{padding:"8px 14px",borderRadius:10,border:"1px solid "+G.cardBorder,background:"transparent",color:G.tw,fontSize:16,fontWeight:700,cursor:"pointer"}}>&rsaquo;</button>
                </div>
                {(()=>{
                  const rc=loadRiposiCycle(),riposiSet=rc?projectRiposi(rc,viewY,viewM):{};
                  const hasDays=Object.keys(calDays).length>0,hasRiposi=Object.keys(riposiSet).length>0;
                  if(!hasDays&&!hasRiposi) return (
                    <div style={{textAlign:"center",padding:"20px 0"}}>
                      <div style={{fontSize:36,marginBottom:10}}>📄</div>
                      <div style={{color:G.tw,fontSize:15,fontWeight:700,marginBottom:4}}>
                        Nessuna preconoscenza per {MESI_IT[viewM]} {viewY}
                      </div>
                      <div style={{color:G.t2,fontSize:12,marginBottom:20}}>
                        Carica il PDF del mese per vedere i tuoi turni
                      </div>
                      <button onClick={()=>{if(fileRef1.current){fileRef1.current.value="";fileRef1.current.click();}}}
                        style={{display:"inline-block",padding:"14px 28px",borderRadius:12,border:"none",background:"#003366",color:"#ffd100",fontSize:14,fontWeight:800,cursor:"pointer",marginBottom:10}}>
                        📄 Carica Preconoscenza {MESI_IT[viewM]}
                      </button>
                      <div style={{color:G.t3,fontSize:11,marginTop:6}}>
                        oppure aprila dallo <button onClick={()=>setTab("storico")} style={{background:"none",border:"none",color:G.accent,fontSize:11,fontWeight:600,cursor:"pointer",padding:0}}>Storico</button> se già caricata
                      </div>
                    </div>
                  );
                  return(
                    <div>
                      <Grid days={calDays} yr={viewY} mo={viewM} riposiSet={riposiSet} onTap={(d,v)=>setDet({date:d,v:v})}/>
                      {!hasDays&&hasRiposi&&<div style={{fontSize:10,color:G.t3,marginTop:4,textAlign:"center"}}>Riposi proiettati (ciclo {rc.cycle} giorni)</div>}
                      {det&&<div style={{marginTop:12}}><Card date={det.date} v={det.v} devs={calDevsActive} allDays={calDays} onPaste={onPasteTurno}/></div>}
                    </div>
                  );
                })()}
              </div>
            )}

            {tab==="linee" && nDevs>0 && <LineeBrowser devs={devs}/>}
            {tab==="storico" && <Storico onLoadPreco={onLoadPreco} onLoadOrari={onLoadOrari} onUploadPreco={uploadPreco} onUploadOrari={uploadOrari}/>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

</body>
</html>
