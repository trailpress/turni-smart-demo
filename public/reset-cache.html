<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Turni Smart</title>
    <style>
      body {
        margin: 0;
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #07111f;
        color: #eaf4ff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 12px;
        max-width: 520px;
        padding: 28px;
        text-align: center;
      }

      strong {
        color: #ffd100;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Turni Smart</h1>
      <p><strong>Pulizia cache in corso...</strong></p>
      <p>Tra un istante torno alla versione aggiornata.</p>
    </main>
    <script>
      async function reset() {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith('turni-smart')).map((key) => caches.delete(key)));
        }

        window.location.replace('./?cache-reset=' + Date.now());
      }

      reset();
    </script>
  </body>
</html>
